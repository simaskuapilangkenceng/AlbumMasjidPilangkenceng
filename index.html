    // ════════════════════════════════════════════════════════════

    // ════════════════════════════════════════════════════════════
    const cv = (row, idx) => {
      const v = row[idx];
      if (v === undefined || v === null) return "";
      return String(v).trim();
    };

    const gabung = (row, idxList) =>
      idxList.map(i => cv(row, i)).filter(Boolean).join(", ");

    // Konversi URL Google Drive ke format thumbnail yang bisa ditampilkan sebagai <img>
    const fixImgUrl = (url) => {
      if (!url) return "";
      url = url.trim();
      // Format: https://drive.google.com/file/d/FILE_ID/view
      let m = url.match(/\/file\/d\/([^/\?]+)/);
      if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w600`;
      // Format: https://drive.google.com/open?id=FILE_ID
      m = url.match(/[?&]id=([^&]+)/);
      if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w600`;
      // Format: https://lh3.googleusercontent.com/... atau sudah berupa URL gambar langsung
      return url;
    };

    // Konversi semua URL dalam string yang dipisah koma
    const fixImgUrls = (urlString) =>
      (urlString || "").split(",").map(u => fixImgUrl(u.trim())).filter(Boolean).join(",");

    // Parse koordinat dari dua kolom terpisah (KOORDINAT_LS & KOORDINAT_BT) → [lat, lng]
    const parseLatLng = (ls, bt) => {
      const lat = parseFloat(ls);
      const lng = parseFloat(bt);
      if (isNaN(lat) || isNaN(lng)) return null;
      if (lat < -8.5 || lat > -6.5 || lng < 110.5 || lng > 112.5) return null;
      // Lintang Selatan = nilai negatif; jika input positif, negasikan
      const latFix = lat > 0 ? -lat : lat;
      return [latFix, lng];
    };

    // ════════════════════════════════════════════════════════════
    //  HOOK: FETCH DATA
    // ════════════════════════════════════════════════════════════
    function useSheetData() {
      const [data,     setData]     = useState([]);
      const [loading,  setLoading]  = useState(true);
      const [error,    setError]    = useState(null);
      const [lastSync, setLastSync] = useState(null);

      const fetchData = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const range = encodeURIComponent(`${SHEETS_CONFIG.SHEET_NAME}!A2:DP`);
          const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_CONFIG.SPREADSHEET_ID}/values/${range}?key=${SHEETS_CONFIG.API_KEY}`;
          const res   = await fetch(url);
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err?.error?.message || "Gagal mengambil data dari Sheets");
          }
          const json = await res.json();
          const rows = (json.values || []).map((row, i) => rowToMasjid(row, i + 1))
                         .filter(m => !m.statusProses || m.statusProses === "Selesai");
          setData(rows);
          setLastSync(new Date());
        } catch(e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);
      return { data, loading, error, lastSync, refetch: fetchData };
    }

      "Rusak Berat":  { bg:"#fee2e2", color:"#b91c1c", dot:"#ef4444" },
    };
    function KondisiBadge({ kondisi }) {
      const s = KS[kondisi] || { bg:"#f3f4f6", color:"#6b7280", dot:"#9ca3af" };
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:5,
          background:s.bg, color:s.color, fontSize:11, fontWeight:600,
          padding:"3px 9px", borderRadius:20 }}>
          <span style={{ width:6, height:6, borderRadius:"50%", background:s.dot, display:"inline-block" }}/>
          {kondisi || "—"}
        </span>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  KOMPONEN: FIELD ROW
    // ════════════════════════════════════════════════════════════
    function FR({ label, value, mono=false, full=false }) {
      if (!value) return null;
      return (
        <div style={{ display:"flex", gap:10, marginBottom:7, alignItems:"flex-start",
          flexDirection: full ? "column" : "row" }}>
          <span style={{ fontSize:12, color:"#9ca3af", minWidth: full ? 0 : 140,
            flexShrink:0, paddingTop:1 }}>{label}</span>
          <span style={{ fontSize:13, color:"#1a1a1a", lineHeight:1.5, flex:1,
            fontFamily: mono ? "'Courier New',monospace" : "inherit",
            wordBreak:"break-word" }}>{value}</span>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  KOMPONEN: ACCORDION
    // ════════════════════════════════════════════════════════════
    function AccordionSeksi({ icon, judul, badge, children, defaultOpen=false }) {
      const [open, setOpen] = useState(defaultOpen);
      const ref = useRef(null);

      const handleToggle = () => {
        const willOpen = !open;
        setOpen(willOpen);
        if (willOpen) {
          setTimeout(() => {
            ref.current?.scrollIntoView({ behavior: "smooth", block: "start" });
          }, 80);
        }
      };

      return (
        <div ref={ref} style={{ borderBottom:"1px solid #e2d9c8" }}>
          <button onClick={handleToggle} style={{
            width:"100%", display:"flex", alignItems:"center", gap:12,
            padding:"14px 20px", background: open ? "#f8f4ed" : "white",
            border:"none", cursor:"pointer", textAlign:"left", transition:"background .2s",
          }}>
            <span style={{ width:32, height:32, borderRadius:"50%", flexShrink:0,
              background: open ? "#1B4332" : "#f0e8d8",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:15, transition:"background .2s" }}>{icon}</span>
            <span style={{ flex:1, fontFamily:"'Playfair Display',serif",

    // ════════════════════════════════════════════════════════════
    //  KOMPONEN: FOTO THUMBNAIL SEDERHANA (tanpa lightbox)
    //  Klik thumbnail → buka di tab baru langsung dari Drive
    // ════════════════════════════════════════════════════════════
    function FotoGrid({ label, urlString, icon }) {
      const urls = (urlString || "").split(",").map(u => u.trim()).filter(Boolean);
      if (urls.length === 0) return null;

      // Konversi URL thumbnail ke URL view (buka di Drive saat diklik)
      const toViewUrl = (thumbUrl) => {
        const m = thumbUrl.match(/[?&]id=([^&]+)/);
        return m ? `https://drive.google.com/file/d/${m[1]}/view` : thumbUrl;
      };

      return (
        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:11, color:"#9ca3af", marginBottom:6,
            display:"flex", alignItems:"center", gap:5 }}>
            <span>{icon} {label}</span>
            <span style={{ background:"#f0e8d8", color:"#1B4332", fontWeight:700,
              fontSize:10, borderRadius:20, padding:"1px 6px" }}>{urls.length} foto</span>
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {urls.map((url, i) => (
              <a key={i} href={toViewUrl(url)} target="_blank" rel="noreferrer"
                title={`${label} ${i+1} — klik untuk buka`}
                style={{ display:"block", flexShrink:0 }}>
                <img src={url} alt={`${label} ${i+1}`}
                  style={{ width:90, height:68, objectFit:"cover",
                    borderRadius:7, border:"1px solid #e2d9c8",
                    display:"block" }}
                  onError={e => { e.target.parentNode.style.display="none"; }}
                />
              </a>
            ))}
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  [ADMIN-05] KOMPONEN: FotoManagerModal
    //  Upload, lihat, dan hapus foto per kategori
    // ════════════════════════════════════════════════════════════
    const FOTO_KATEGORI = [
      { key:"depan",        label:"Tampak Depan",      icon:"🏛️" },
      { key:"dalam",        label:"Dalam Masjid",      icon:"🕌" },
      { key:"wudhu",        label:"Tempat Wudhu",      icon:"💧" },
      { key:"wc",           label:"Kamar Mandi/WC",    icon:"🚿" },
      { key:"lain",         label:"Foto Lainnya",      icon:"📸" },
      { key:"sertifWakaf",  label:"Sertifikat Wakaf",  icon:"📄" },
      { key:"fotoAIW",      label:"Akta Ikrar Wakaf",  icon:"📜" },
      { key:"sertifKiblat", label:"Sertif. Kiblat",    icon:"🧭" },
    ];

    // Peta key komponen → properti masjid (urlFoto*)
    const FOTO_KEY_TO_PROP = {
      depan:        "urlFotoDepan",
      dalam:        "urlFotoDalam",
      wudhu:        "urlFotoWudhu",
      wc:           "urlFotoWC",
      lain:         "urlFotoLain",
      sertifWakaf:  "urlFotoSertifWakaf",
      fotoAIW:      "urlFotoAIW",
      sertifKiblat: "urlFotoKiblat",
    };

    // Konversi URL Drive view→thumbnail (sama seperti fixImgUrl di atas)
    const toThumb = (url) => {
      if (!url) return "";
      const m1 = url.match(/\/file\/d\/([^\/\?]+)/);
      if (m1) return `https://drive.google.com/thumbnail?id=${m1[1]}&sz=w300`;
      const m2 = url.match(/[?&]id=([^&]+)/);
      if (m2) return `https://drive.google.com/thumbnail?id=${m2[1]}&sz=w300`;
      return url;
    };
    const toViewUrl = (url) => {
      const m = url.match(/[?&]id=([^&]+)/);
      return m ? `https://drive.google.com/file/d/${m[1]}/view` : url;
    };

    function FotoManagerModal({ masjid, adminSession, onClose, onFotoUpdated }) {
      const [activeKat,   setActiveKat]   = useState("depan");
      const [localUrls,   setLocalUrls]   = useState(() => {
        // Buat salinan URL semua kategori dari props masjid
        const init = {};
        FOTO_KATEGORI.forEach(k => {
          init[k.key] = (masjid[FOTO_KEY_TO_PROP[k.key]] || "")
            .split(",").map(u => u.trim()).filter(Boolean);
        });
        return init;
      });
      const [uploading,   setUploading]   = useState(false);
      const [deleting,    setDeleting]    = useState(null); // URL yang sedang dihapus
      const [toast,       setToast]       = useState(null); // { ok, text }
      const fileInputRef  = useRef(null);

      const showToast = (ok, text) => {
        setToast({ ok, text });
        setTimeout(() => setToast(null), 3500);
      };

      // ── Upload handler ──────────────────────────────────────
      const handleFileChange = async (e) => {
        const files = Array.from(e.target.files);
        if (files.length === 0) return;
        setUploading(true);

        for (const file of files) {
          // Validasi tipe & ukuran
          if (!file.type.startsWith("image/")) {
            showToast(false, `${file.name}: hanya file gambar yang diizinkan.`);
            continue;
          }
          if (file.size > 5 * 1024 * 1024) {
            showToast(false, `${file.name}: ukuran melebihi 5MB.`);
            continue;
          }

          // Baca sebagai base64
          const base64 = await new Promise((res, rej) => {
            const reader = new FileReader();
            reader.onload  = () => res(reader.result.split(",")[1]);
            reader.onerror = () => rej(new Error("Gagal baca file"));
            reader.readAsDataURL(file);
          }).catch(err => { showToast(false, err.message); return null; });

          if (!base64) continue;

          try {
            const resp = await fetch(WEBAPP_URL, {
              method:  "POST",
              headers: { "Content-Type": "text/plain" },
              body:    JSON.stringify({
                action:   "uploadFoto",
                token:    adminSession.token,
                idSimas:  masjid.idSimas,
                kategori: activeKat,
                fileName: file.name,
                mimeType: file.type,
                base64,
                mode:     "append",
              }),
            });
            const json = await resp.json();
            if (json.ok) {
              // Update state lokal dengan URL baru
              setLocalUrls(prev => ({
                ...prev,
                [activeKat]: [...prev[activeKat], json.fileUrl],
              }));
              showToast(true, `${file.name} berhasil diupload.`);
              if (onFotoUpdated) onFotoUpdated(activeKat, json.updatedUrl);
            } else {
              showToast(false, json.error || "Upload gagal.");
            }
          } catch(err) {
            showToast(false, "Gagal menghubungi server.");
          }
        }

        setUploading(false);
        // Reset file input agar file yang sama bisa dipilih lagi
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      // ── Delete handler ──────────────────────────────────────
      const handleDelete = async (url) => {
        if (!window.confirm("Hapus foto ini dari Drive & Spreadsheet?")) return;
        setDeleting(url);
        try {
          const resp = await fetch(WEBAPP_URL, {
            method:  "POST",
            headers: { "Content-Type": "text/plain" },
            body:    JSON.stringify({
              action:   "deleteFoto",
              token:    adminSession.token,
              idSimas:  masjid.idSimas,
              kategori: activeKat,
              fileUrl:  url,
            }),
          });
          const json = await resp.json();
          if (json.ok) {
            setLocalUrls(prev => ({
              ...prev,
              [activeKat]: prev[activeKat].filter(u => u !== url),
            }));
            showToast(true, "Foto berhasil dihapus.");
            if (onFotoUpdated) onFotoUpdated(activeKat, json.updatedUrl);
          } else {
            showToast(false, json.error || "Hapus gagal.");
          }
        } catch(err) {
          showToast(false, "Gagal menghubungi server.");
        } finally {
          setDeleting(null);
        }
      };

      const activeUrls = localUrls[activeKat] || [];
      const activeInfo = FOTO_KATEGORI.find(k => k.key === activeKat);

      return (
        <div onClick={e => e.stopPropagation()} style={{
          position:"fixed", inset:0, zIndex:2200,
          background:"rgba(0,0,0,.65)", backdropFilter:"blur(4px)",
          display:"flex", alignItems:"flex-start", justifyContent:"center",
          padding:"16px", overflowY:"auto",
        }}>
          <div style={{
            width:"100%", maxWidth:680, background:"#FAFAF7",
            borderRadius:18, overflow:"hidden", margin:"auto",
            boxShadow:"0 32px 80px rgba(0,0,0,.3)", animation:"fadeIn .2s ease",
          }}>

            {/* Header */}
            <div style={{ background:"#1B4332", padding:"16px 20px",
              display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif",
                  fontSize:16, fontWeight:700, color:"white" }}>📷 Kelola Foto</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.85)", marginTop:2 }}>
                  {masjid.namaMasjid}
                </div>
              </div>
              <button onClick={onClose} style={{ background:"rgba(255,255,255,.12)",
                border:"none", color:"white", width:32, height:32, borderRadius:"50%",
                cursor:"pointer", fontSize:16 }}>✕</button>
            </div>

            {/* Tab kategori — scroll horizontal di mobile */}
            <div style={{ display:"flex", overflowX:"auto", borderBottom:"2px solid #e2d9c8",
              background:"white", padding:"0 4px", gap:2 }}>
              {FOTO_KATEGORI.map(k => {
                const count = localUrls[k.key]?.length || 0;
                return (
                  <button key={k.key} onClick={() => setActiveKat(k.key)} style={{
                    flexShrink:0, padding:"10px 12px", border:"none", cursor:"pointer",
                    fontSize:12, fontWeight:600, fontFamily:"'DM Sans',sans-serif",
                    background:"none", whiteSpace:"nowrap",
                    color:      activeKat === k.key ? "#1B4332" : "#9ca3af",
                    borderBottom: activeKat === k.key ? "2px solid #1B4332" : "2px solid transparent",
                    marginBottom: -2,
                  }}>
                    {k.icon} {k.label}
                    {count > 0 && (
                      <span style={{ marginLeft:5, background:"#1B4332", color:"white",
                        fontSize:10, fontWeight:700, borderRadius:20, padding:"1px 6px" }}>
                        {count}
                      </span>
                    )}
                  </button>
                );
              })}
            </div>

            {/* Area konten */}
            <div style={{ padding:"16px 20px", minHeight:280 }}>

              {/* Tombol upload */}
              <div style={{ marginBottom:16 }}>
                <input
                  ref={fileInputRef}
                  type="file" accept="image/*" multiple
                  onChange={handleFileChange}
                  style={{ display:"none" }}
                  id="foto-upload-input"
                />
                <label htmlFor="foto-upload-input" style={{
                  display:"inline-flex", alignItems:"center", gap:8,
                  padding:"10px 20px", borderRadius:10,
                  background: uploading ? "#9ca3af" : "#1B4332",
                  color:"white", cursor: uploading ? "not-allowed" : "pointer",
                  fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif",
                  pointerEvents: uploading ? "none" : "auto",
                }}>
                  {uploading ? "⏳ Mengupload..." : `⬆️ Upload Foto ${activeInfo?.label}`}
                </label>
                <span style={{ marginLeft:12, fontSize:11, color:"#9ca3af" }}>
                  JPG/PNG/WebP · maks 5MB · bisa pilih beberapa sekaligus
                </span>
              </div>

              {/* Grid foto existing */}
              {activeUrls.length === 0 ? (
                <div style={{ textAlign:"center", padding:"40px 20px",
                  color:"#9ca3af", fontSize:13, background:"#f8f4ed",
                  borderRadius:12, border:"2px dashed #e2d9c8" }}>
                  {activeInfo?.icon} Belum ada foto {activeInfo?.label}.<br/>
                  <span style={{ fontSize:11 }}>Klik tombol Upload di atas untuk menambahkan.</span>
                </div>
              ) : (
                <div style={{ display:"grid",
                  gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))",
                  gap:10 }}>
                  {activeUrls.map((url, i) => {
                    const isDel = deleting === url;
                    return (
                      <div key={i} style={{ position:"relative", borderRadius:10, overflow:"hidden",
                        border:"1px solid #e2d9c8", background:"#f8f4ed" }}>
                        <a href={toViewUrl(url)} target="_blank" rel="noreferrer">
                          <img src={toThumb(url)} alt={`foto ${i+1}`}
                            style={{ width:"100%", height:110, objectFit:"cover", display:"block" }}
                            onError={e => { e.target.src=""; e.target.style.background="#e2d9c8"; }}
                          />
                        </a>
                        {/* Tombol hapus */}
                        <button
                          onClick={() => handleDelete(url)}
                          disabled={isDel}
                          title="Hapus foto ini"
                          style={{
                            position:"absolute", top:5, right:5,
                            width:24, height:24, borderRadius:"50%",
                            background: isDel ? "rgba(100,100,100,.7)" : "rgba(220,38,38,.85)",
                            border:"none", color:"white", cursor: isDel ? "not-allowed" : "pointer",
                            fontSize:12, fontWeight:700, display:"flex",
                            alignItems:"center", justifyContent:"center",
                            boxShadow:"0 1px 4px rgba(0,0,0,.3)",
                          }}>
                          {isDel ? "⏳" : "✕"}
                        </button>
                        <div style={{ padding:"4px 6px", fontSize:10, color:"#9ca3af",
                          textAlign:"center" }}>foto {i+1}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* Toast notifikasi */}
            {toast && (
              <div style={{
                margin:"0 20px 16px",
                padding:"10px 14px", borderRadius:8, fontSize:13,
                background: toast.ok ? "#dcfce7" : "#fee2e2",
                color:      toast.ok ? "#15803d" : "#b91c1c",
                animation:"fadeIn .2s ease",
              }}>
                {toast.ok ? "✅ " : "⚠️ "}{toast.text}
              </div>
            )}

            {/* Footer */}
            <div style={{ padding:"12px 20px", borderTop:"1px solid #e2d9c8",
              display:"flex", justifyContent:"flex-end" }}>
              <button onClick={onClose} style={{
                padding:"9px 24px", borderRadius:10,
                background:"#1B4332", color:"white", border:"none",
                cursor:"pointer", fontSize:13, fontWeight:600,
                fontFamily:"'DM Sans',sans-serif",
              }}>Selesai</button>
            </div>
          </div>
        </div>
      );
    }

        },
        {
          judul: "🏠 Tanah & Wakaf", fields: [
            { label:"Status Tanah",     key:"statusTanah",     apiField:"STATUS_TANAH",   superOnly:true },
            { label:"No. Sertif. Wakaf",key:"nomorSertifWakaf",apiField:"NOMOR_SERTIF_WAKAF" },
            { label:"Tgl. Sertifikat",  key:"tglSertifWakaf",  apiField:"TGL_SERTIF_WAKAF" },
            { label:"No. AIW",          key:"nomorAIW",        apiField:"NOMOR_AIW" },
            { label:"Tgl. AIW",         key:"tglAIW",          apiField:"TGL_AIW" },
            { label:"Nama Wakif",       key:"namaWakif",       apiField:"NAMA_WAKIF" },
            { label:"Nama Nadzir",      key:"namaNadzir",      apiField:"NAMA_NADZIR" },
            { label:"Rekening Bantuan", key:"rekening",        apiField:"REKENING" },
          ]
        },
        {
          judul: "📞 Kontak", fields: [
            { label:"Email",            key:"email",           apiField:"EMAIL" },
            { label:"Media Sosial",     key:"medsos",          apiField:"MEDSOS",         full:true },
          ]
        },
      ];

      // Kumpulkan field yang bisa diedit oleh level user ini
      const editableFields = () => {
        const result = [];
        SEKSI.forEach(s => s.fields.forEach(f => {
          // showReadOnly: selalu masuk (untuk read-only display), tapi only super bisa ubah
          if (!f.superOnly || isSuper || f.showReadOnly) result.push(f);
        }));
        return result;
      };

      // Build initial form values
      const buildInitial = () => {
        const init = {};
        editableFields().forEach(f => {
          // Ambil nilai dari masjid object; koordinat & linkGmaps ada di sana
          init[f.key] = masjid[f.key] || "";
        });
        return init;
      };

      const [values,    setValues]    = useState(buildInitial);
      const [loading,   setLoading]   = useState(false);
      const [result,    setResult]    = useState(null);
      const [openSeksi, setOpenSeksi] = useState(0);
      const [showFoto,  setShowFoto]  = useState(false);
      const [localMasjidFoto, setLocalMasjidFoto] = useState(masjid);

      // Hitung field yang berubah (hanya yang ada apiField & berubah)
      const getChanges = () => {
        const initial = buildInitial();
        const changes = {};
        editableFields().forEach(f => {
          // Skip superOnly (termasuk showReadOnly) jika bukan super
          if (f.superOnly && !isSuper) return;
          const newVal = (values[f.key] || "").trim();
          const oldVal = (initial[f.key] || "").trim();
          if (newVal !== oldVal && f.apiField) {
            changes[f.apiField] = newVal;
          }
        });
        return changes;
      };

      const handleSave = async () => {
        const changes = getChanges();
        if (Object.keys(changes).length === 0) {
          setResult({ ok: false, message: "Tidak ada perubahan yang dibuat." });
          return;
        }

        // Validasi: ID SIMAS wajib ada untuk non-super.
        // Super boleh menyimpan meski idSimas kosong (karena mereka mungkin sedang mengisi ID SIMAS).
        // Dalam kasus itu, gunakan NAMA_MASJID sebagai identifier fallback di Apps Script.
        const idSimasKosong = !masjid.idSimas || masjid.idSimas.trim() === "";
        if (idSimasKosong && !isSuper) {
          setResult({
            ok: false,
            message: "⚠️ ID SIMAS belum terisi di data ini. Minta Super Admin untuk mengisi ID SIMAS terlebih dahulu sebelum bisa menyimpan perubahan.",
          });
          return;
        }

        // Untuk super dengan idSimas kosong: pastikan changes mengandung ID_SIMAS baru,
        // atau setidaknya nama masjid tersedia untuk pencarian fallback
        if (idSimasKosong && isSuper && !changes["ID_SIMAS"]) {
          setResult({
            ok: false,
            message: "⚠️ ID SIMAS masih kosong. Isi field ID SIMAS terlebih dahulu sebelum menyimpan.",
          });
          return;
        }

        setLoading(true);
        setResult(null);
        try {
          const payload = {
            action:   "updateBatch",
            token:    adminSession.token,
            changes,
          };
          // Gunakan idSimas jika ada; fallback ke namaMasjid untuk super (saat pertama kali isi ID SIMAS)
          if (!idSimasKosong) {
            payload.idSimas = masjid.idSimas;
          } else {
            // Fallback: cari baris berdasarkan nama masjid (hanya super, sudah divalidasi di atas)
            payload.namaMasjidFallback = masjid.namaMasjid;
          }

          const res = await fetch(WEBAPP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload),
          });
          const json = await res.json();
          if (json.ok) {
            // Build updated masjid fields untuk optimistic update
            const updatedFields = {};
            const fieldToKey = {};
            editableFields().forEach(f => { if (f.apiField) fieldToKey[f.apiField] = f.key; });
            fieldToKey["KOORDINAT_LS"] = "koordinatLS";
            fieldToKey["KOORDINAT_BT"] = "koordinatBT";
            fieldToKey["LINK_GMAPS"]   = "linkGmaps";
            fieldToKey["ALAMAT"]       = "alamat";
            fieldToKey["TIPOLOGI"]     = "tipologi";
            fieldToKey["AFILIASI"]     = "afiliasi";
            fieldToKey["TAHUN_BERDIRI"]= "tahunBerdiri";
            fieldToKey["ID_SIMAS"]     = "idSimas";
            fieldToKey["NAMA_MASJID"]  = "namaMasjid";
            fieldToKey["DESA"]         = "desa";
            Object.entries(changes).forEach(([field, val]) => {
              if (fieldToKey[field]) updatedFields[fieldToKey[field]] = val;
            });
            setResult({ ok: true, message: json.message + (json.pdfStatus === "ok" ? " PDF diperbarui." : "") });
            setTimeout(() => {
              onSaved(updatedFields);
              onClose();
            }, 1500);
          } else {
            setResult({ ok: false, message: json.error || "Gagal menyimpan." });
          }
        } catch(e) {
          setResult({ ok: false, message: "Gagal menghubungi server: " + e.message });
        } finally {
          setLoading(false);
        }
      };

      const changedCount = Object.keys(getChanges()).length;
      // Super admin bisa menyimpan meski ID SIMAS kosong (karena bisa sedang mengisinya)
      const noIdSimas    = (!masjid.idSimas || masjid.idSimas.trim() === "") && !isSuper;

      const inpStyle = {
        width:"100%", padding:"8px 11px", borderRadius:8,
        border:"1.5px solid #e2d9c8", fontSize:13,
        fontFamily:"'DM Sans',sans-serif", outline:"none",
        background:"white", color:"#1a1a1a", transition:"border-color .2s",
      };

      return (
        <>
        <div onClick={e => e.stopPropagation()} style={{
          position:"fixed", inset:0, zIndex:2100,
          background:"rgba(0,0,0,.6)", backdropFilter:"blur(4px)",
          display:"flex", alignItems:"flex-start", justifyContent:"center",
          padding:"16px", overflowY:"auto",
        }}>
          <div style={{
            width:"100%", maxWidth:640, background:"#FAFAF7",
            borderRadius:18, overflow:"hidden", margin:"auto",
            boxShadow:"0 32px 80px rgba(0,0,0,.3)",
            animation:"fadeIn .2s ease",
          }}>

            {/* Header */}
            <div style={{ background:"#1B4332", padding:"16px 20px",
              display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif",
                  fontSize:16, fontWeight:700, color:"white" }}>✏️ Edit Data Masjid</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.85)", marginTop:2 }}>
                  {masjid.namaMasjid} · {adminSession?.nama}
                </div>
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                <button onClick={() => setShowFoto(true)} style={{
                  padding:"6px 12px", borderRadius:20,
                  background:"rgba(212,168,83,.2)", border:"1px solid rgba(212,168,83,.4)",
                  color:"#D4A853", cursor:"pointer", fontSize:11, fontWeight:600,
                  fontFamily:"'DM Sans',sans-serif",
                }}>📷 Kelola Foto</button>
                <button onClick={onClose} style={{ background:"rgba(255,255,255,.12)",
                  border:"none", color:"white", width:32, height:32, borderRadius:"50%",
                  cursor:"pointer", fontSize:16 }}>✕</button>
              </div>
            </div>

            {/* Peringatan ID SIMAS kosong */}
            {(!masjid.idSimas || masjid.idSimas.trim() === "") && (
              <div style={{ background: isSuper ? "#fef3c7" : "#fef3c7", borderBottom:"1px solid #fde68a",
                padding:"9px 20px", fontSize:12, color:"#92400e", display:"flex", alignItems:"flex-start", gap:6 }}>
                <span style={{ fontSize:14 }}>⚠️</span>
                {isSuper
                  ? <span><strong>ID SIMAS belum terisi.</strong> Isi field <strong>ID SIMAS</strong> di seksi "📍 Lokasi & Identitas" lalu simpan untuk mengaktifkan pencarian berbasis ID.</span>
                  : <span><strong>ID SIMAS belum terisi.</strong> Data bisa dilihat, tapi <strong>tidak bisa disimpan</strong> sampai Super Admin mengisi ID SIMAS terlebih dahulu.</span>
                }
              </div>
            )}

            {/* Info perubahan */}
            {changedCount > 0 && !noIdSimas && (
              <div style={{ background:"#fffbeb", borderBottom:"1px solid #fde68a",
                padding:"8px 20px", fontSize:12, color:"#92400e" }}>
                ✏️ {changedCount} field diubah — belum disimpan
              </div>
            )}

            {/* Seksi accordion */}
            <div style={{ maxHeight:"60vh", overflowY:"auto" }}>
              {SEKSI.map((seksi, si) => {
                // visibleFields: tampilkan semua field yang editable ATAU showReadOnly
                const visibleFields = seksi.fields.filter(f =>
                  !f.superOnly || isSuper || f.showReadOnly
                );
                if (visibleFields.length === 0) return null;
                return (
                  <div key={si} style={{ borderBottom:"1px solid #e2d9c8" }}>
                    <button onClick={() => setOpenSeksi(openSeksi === si ? -1 : si)}
                      style={{ width:"100%", padding:"12px 20px", background: openSeksi===si ? "#f8f4ed" : "white",
                        border:"none", cursor:"pointer", textAlign:"left", fontSize:13,
                        fontWeight:600, color:"#1B4332", fontFamily:"'DM Sans',sans-serif",
                        display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      {seksi.judul}
                      <span style={{ fontSize:11, color:"#9ca3af" }}>{openSeksi===si ? "▲" : "▼"}</span>
                    </button>
                    {openSeksi === si && (
                      <div style={{ padding:"12px 20px 16px", display:"grid",
                        gridTemplateColumns:"1fr 1fr", gap:"10px 16px" }}>
                        {visibleFields.map(f => {
                          // Tentukan apakah field ini read-only untuk user saat ini
                          const isReadOnly = f.superOnly && !isSuper;
                          return (
                            <div key={f.key} style={{ gridColumn: f.full ? "1/-1" : "auto" }}>
                              <label style={{ fontSize:11,
                                color: f.superOnly ? (isSuper ? "#b45309" : "#6b7280") : "#6b7280",
                                fontWeight:500, display:"block", marginBottom:4 }}>
                                {f.label}
                                {f.superOnly && isSuper && <span style={{ marginLeft:4, fontSize:10, color:"#d97706" }}>👑 Super</span>}
                                {isReadOnly && <span style={{ marginLeft:4, fontSize:10, color:"#9ca3af" }}>🔒 Hanya Super</span>}
                              </label>
                              {isReadOnly ? (
                                /* Read-only display untuk non-super */
                                <div style={{
                                  width:"100%", padding:"8px 11px", borderRadius:8,
                                  border:"1.5px solid #e2d9c8", fontSize:13,
                                  background:"#f3f4f6", color: (masjid[f.key] || "") ? "#374151" : "#c0c4cc",
                                  fontFamily:"'DM Sans',sans-serif", minHeight:36,
                                  wordBreak:"break-all",
                                }}>
                                  {masjid[f.key] || <span style={{ fontStyle:"italic", color:"#c0c4cc" }}>—</span>}
                                </div>
                              ) : (
                                <input
                                  value={values[f.key] !== undefined ? values[f.key] : ""}
                                  onChange={e => setValues(v => ({ ...v, [f.key]: e.target.value }))}
                                  placeholder={f.placeholder || ""}
                                  style={{
                                    ...inpStyle,
                                    borderColor: (values[f.key] || "") !== (masjid[f.key] || "") ? "#D4A853" : "#e2d9c8",
                                    background: f.superOnly ? "#fffbeb" : "white",
                                  }}
                                />
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {/* Result message */}
            {result && (
              <div style={{
                margin:"12px 20px 0",
                background: result.ok ? "#dcfce7" : "#fee2e2",
                color:      result.ok ? "#15803d" : "#b91c1c",
                borderRadius:8, padding:"10px 14px", fontSize:13,
              }}>
                {result.ok ? "✅ " : "⚠️ "}{result.message}
              </div>
            )}

            {/* Tombol aksi */}
            <div style={{ padding:"16px 20px", display:"flex", gap:10, borderTop:"1px solid #e2d9c8" }}>
              <button onClick={onClose} style={{
                flex:1, padding:"11px", borderRadius:10, border:"1.5px solid #e2d9c8",
                background:"white", color:"#6b7280", cursor:"pointer",
                fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif",
              }}>Batal</button>
              <button onClick={handleSave} disabled={loading || changedCount === 0 || noIdSimas} style={{
                flex:2, padding:"11px", borderRadius:10, border:"none",
                background: (changedCount > 0 && !noIdSimas) ? "#1B4332" : "#e2d9c8",
                color:      (changedCount > 0 && !noIdSimas) ? "white"   : "#9ca3af",
                cursor: (loading || changedCount === 0 || noIdSimas) ? "not-allowed" : "pointer",
                fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif",
                transition:"all .2s",
              }}>
                {loading ? "⏳ Menyimpan..." : noIdSimas ? "⚠️ ID SIMAS belum ada" : changedCount > 0 ? `💾 Simpan (${changedCount} perubahan)` : "Tidak ada perubahan"}
              </button>
            </div>

          </div>
        </div>

        {/* [ADMIN-05] FotoManagerModal */}
        {showFoto && (
          <FotoManagerModal
            masjid={localMasjidFoto}
            adminSession={adminSession}
            onClose={() => setShowFoto(false)}
            onFotoUpdated={(kategori, updatedUrl) => {
              const propKey = {
                depan:"urlFotoDepan", dalam:"urlFotoDalam", wudhu:"urlFotoWudhu",
                wc:"urlFotoWC", lain:"urlFotoLain", sertifWakaf:"urlFotoSertifWakaf",
                fotoAIW:"urlFotoAIW", sertifKiblat:"urlFotoKiblat",
              }[kategori];
              if (propKey) {
                const updated = { ...localMasjidFoto, [propKey]: updatedUrl };
                setLocalMasjidFoto(updated);
                if (onSaved) onSaved({ [propKey]: updatedUrl });
              }
            }}
          />
        )}
        </>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  KOMPONEN: KARTU MASJID
    // ════════════════════════════════════════════════════════════
    function KartuMasjid({ masjid, onClick }) {
      const [hover, setHover] = useState(false);
      const isMusholla = masjid.lokasiSurvey?.toUpperCase().includes("MUSHOLLA");
      return (
        <div onClick={() => onClick(masjid)}
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{
            background:"white", borderRadius:14, overflow:"hidden",
            cursor:"pointer", border:"1px solid #e8e0d0",
            boxShadow: hover ? "0 10px 32px rgba(27,67,50,.15)" : "0 2px 12px rgba(0,0,0,.06)",
            transform: hover ? "translateY(-4px)" : "translateY(0)",
            transition:"all .22s ease", fontFamily:"'DM Sans',sans-serif",
          }}>
          <div style={{ position:"relative", height:176, background:"#e8e0d0", overflow:"hidden" }}>
            {masjid.fotoUtama ? (
              <img src={masjid.fotoUtama} alt={masjid.namaMasjid}
                style={{ width:"100%", height:"100%", objectFit:"cover",
                  transform: hover ? "scale(1.05)" : "scale(1)", transition:"transform .4s ease" }}
                onError={e => { e.target.style.display="none"; }}
              />
            ) : (
              <div style={{ width:"100%", height:"100%", display:"flex",
                alignItems:"center", justifyContent:"center", fontSize:52, opacity:.25 }}>🕌</div>
            )}
            <div style={{ position:"absolute", inset:0,
              background:"linear-gradient(to top,rgba(27,67,50,.5) 0%,transparent 60%)" }}/>
            <div style={{ position:"absolute", top:10, left:10,
              background:"rgba(27,67,50,.85)", backdropFilter:"blur(4px)",
              borderRadius:20, padding:"3px 10px",
              fontSize:10, fontWeight:700, color:"#D4A853", letterSpacing:".5px" }}>
              {isMusholla ? "MUSHOLLA" : "MASJID"}
            </div>
            <div style={{ position:"absolute", top:10, right:10 }}>
              <KondisiBadge kondisi={masjid.kondisiBgn}/>
            </div>
            {masjid.jumlahFoto && Number(masjid.jumlahFoto) > 0 && (
              <div style={{ position:"absolute", bottom:8, right:10,
                fontSize:11, color:"rgba(255,255,255,.85)", display:"flex", alignItems:"center", gap:3 }}>
                📷 {masjid.jumlahFoto}
              </div>
            )}
            {masjid.latLng && (
              <div style={{ position:"absolute", bottom:8, left:10,
                fontSize:11, color:"rgba(255,255,255,.75)" }}>🗺️</div>
            )}
          </div>
          <div style={{ padding:"12px 14px" }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:15,
              fontWeight:700, color:"#1B4332", lineHeight:1.3, marginBottom:3 }}>
              {masjid.namaMasjid}
            </div>
            <div style={{ fontSize:11, color:"#9ca3af", marginBottom:9 }}>
              📍 {masjid.desa} · {masjid.tahunBerdiri || "—"}
            </div>
            <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:10 }}>
              {masjid.afiliasi?.includes("NU") && (
                <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20,
                  background:"#ecfdf5", color:"#047857", fontWeight:600 }}>NU</span>
              )}
              {masjid.afiliasi?.includes("Muhammadiyah") && (
                <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20,
                  background:"#eff6ff", color:"#1d4ed8", fontWeight:600 }}>Muhammadiyah</span>
              )}
              {(masjid.statusTanah?.includes("Bersertifikat") || masjid.nomorSertifWakaf) && (
                <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20,
                  background:"#f0fdf4", color:"#166534", fontWeight:600 }}>Wakaf ✓</span>
              )}
              {masjid.tpqAnak?.toLowerCase().startsWith("ada") && (
                <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20,
                  background:"#fdf4ff", color:"#7e22ce", fontWeight:600 }}>TPQ</span>
              )}
              {masjid.kondisiBgn?.includes("Rusak") && (
                <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20,
                  background:"#fff7ed", color:"#c2410c", fontWeight:600 }}>⚠️ Perlu Perhatian</span>
              )}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between",
              alignItems:"center", paddingTop:8, borderTop:"1px solid #f3f4f6" }}>
              <div style={{ fontSize:11, color:"#9ca3af" }}>
                👥 Jumat: {masjid.jamaahJumat ? "±"+masjid.jamaahJumat : "—"}
              </div>
              <span style={{ fontSize:11, color:"#1B4332", fontWeight:600 }}>Detail →</span>
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  TAB ALBUM
    // ════════════════════════════════════════════════════════════
    function TabAlbum({ data, loading, error, onSelect }) {
      const [search,        setSearch]        = useState("");
      const [filterDesa,    setFilterDesa]    = useState("");
      const [filterKlas,    setFilterKlas]    = useState("");
      const [filterKondisi, setFilterKondisi] = useState("");
      const [showFilter,    setShowFilter]    = useState(false);

      const desaList    = useMemo(() => [...new Set(data.map(m => m.desa).filter(Boolean))].sort(), [data]);
      const klasList    = useMemo(() => [...new Set(data.map(m => m.lokasiSurvey).filter(Boolean))].sort(), [data]);
      const kondisiList = ["Baik","Sedang","Rusak Ringan","Rusak Berat"];

      const filtered = useMemo(() => data.filter(m => {
        const q = search.toLowerCase();
        if (q && !m.namaMasjid.toLowerCase().includes(q)
               && !m.desa.toLowerCase().includes(q)
               && !m.idSimas.toLowerCase().includes(q)) return false;
        if (filterDesa    && m.desa         !== filterDesa)    return false;
        if (filterKlas    && m.lokasiSurvey !== filterKlas)    return false;
        if (filterKondisi && m.kondisiBgn   !== filterKondisi) return false;
        return true;
      }), [data, search, filterDesa, filterKlas, filterKondisi]);

      const af = [filterDesa, filterKlas, filterKondisi].filter(Boolean).length;
      const reset = () => { setSearch(""); setFilterDesa(""); setFilterKlas(""); setFilterKondisi(""); };

      return (
        <div>
          <div style={{ display:"flex", gap:10, marginBottom:12, flexWrap:"wrap", alignItems:"center" }}>
            <div style={{ position:"relative", flex:1, minWidth:200 }}>
              <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", fontSize:14 }}>🔍</span>
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Cari nama masjid, desa, atau ID SIMAS..."
                style={{ width:"100%", padding:"8px 12px 8px 32px", borderRadius:24,
                  border:"1px solid #e2d9c8", background:"white", fontSize:13, outline:"none", color:"#1a1a1a" }}/>
            </div>
            <button onClick={() => setShowFilter(!showFilter)} style={{
              padding:"8px 14px", borderRadius:24, border:"1px solid #e2d9c8",
              background: af > 0 ? "#1B4332" : "white", color: af > 0 ? "white" : "#1B4332",
              cursor:"pointer", fontSize:12, fontWeight:600
            }}>⚙ Filter {af > 0 && `(${af})`}</button>
          </div>
          {showFilter && (
            <div style={{ background:"white", borderRadius:12, padding:"12px 14px",
              marginBottom:12, border:"1px solid #e2d9c8",
              display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
              {[
                { label:"Desa",       value:filterDesa,    set:setFilterDesa,    opts:[["","Semua Desa"],       ...desaList.map(d=>[d,d])] },
                { label:"Klasifikasi",value:filterKlas,    set:setFilterKlas,    opts:[["","Semua Klasifikasi"],...klasList.map(k=>[k,k])] },
                { label:"Kondisi",    value:filterKondisi, set:setFilterKondisi, opts:[["","Semua Kondisi"],    ...kondisiList.map(k=>[k,k])] },
              ].map(f => (
                <div key={f.label} style={{ position:"relative" }}>
                  <span style={{ position:"absolute", right:10, top:"50%",
                    transform:"translateY(-50%)", fontSize:11, pointerEvents:"none", color:"#6b7280" }}>▼</span>

                </div>
              ))}

                <button onClick={reset} style={{ padding:"7px 14px", borderRadius:8,

                  color:"#dc2626", fontSize:13, cursor:"pointer", fontWeight:500 }}>✕ Reset</button>

          )}
          <div style={{ fontSize:12, color:"#9ca3af", marginBottom:14 }}>

          </div>
          {error && (
            <div style={{ background:"#fef2f2", border:"1px solid #fca5a5",
              borderRadius:12, padding:"14px 18px", color:"#dc2626", fontSize:13, marginBottom:16 }}>
              <strong>Gagal memuat:</strong> {error}
            </div>
          )}
          {loading && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>
              {[1,2,3,4,5,6].map(i => (
                <div key={i} style={{ background:"white", borderRadius:14, overflow:"hidden", border:"1px solid #e8e0d0" }}>
                  <div style={{ height:176, background:"linear-gradient(90deg,#f0ebe0 25%,#e8e0d0 50%,#f0ebe0 75%)",
                    backgroundSize:"200% 100%", animation:"shimmer 1.5s infinite" }}/>

                    {[80,60,90].map((w,j) => (
                      <div key={j} style={{ height:12, background:"#f0ebe0", borderRadius:6, marginBottom:8, width:w+"%" }}/>
                    ))}

                </div>
              ))}
            </div>
          )}
          {!loading && !error && filtered.length === 0 && (
            <div style={{ textAlign:"center", padding:"60px 20px", color:"#9ca3af" }}>
              <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
              <div style={{ fontSize:16, fontWeight:500, marginBottom:4 }}>Tidak ditemukan</div>
              <button onClick={reset} style={{ marginTop:14, padding:"8px 20px",
                borderRadius:8, border:"none", background:"#1B4332",
                color:"white", fontSize:13, cursor:"pointer" }}>Reset</button>

            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>

    //  TAB PETA (Leaflet)
    //  Koordinat v3.9: KOORDINAT_BT & KOORDINAT_LS sudah terpisah
    // ════════════════════════════════════════════════════════════
    function TabPeta({ data, onSelect }) {
      const mapRef     = useRef(null);
      const leafletRef = useRef(null);
      const markersRef = useRef([]);

      const denganLL = useMemo(() => data.filter(m => m.latLng), [data]);
      const tanpaLL  = useMemo(() => data.filter(m => !m.latLng), [data]);

      // Init Leaflet map sekali
      useEffect(() => {
        if (!mapRef.current || leafletRef.current) return;
        const map = L.map(mapRef.current, { center: SHEETS_CONFIG.CENTER, zoom: 13 });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19
        }).addTo(map);
        leafletRef.current = map;
        return () => { map.remove(); leafletRef.current = null; };
      }, []);

      // Render marker setiap data berubah
      useEffect(() => {
        const map = leafletRef.current;
        if (!map) return;
        markersRef.current.forEach(m => m.remove());
        markersRef.current = [];

        denganLL.forEach(masjid => {
          const isMusholla = masjid.lokasiSurvey?.toUpperCase().includes("MUSHOLLA");
          const k = masjid.kondisiBgn || "";
          const warna = k.includes("Rusak Berat") ? "#ef4444"
                      : k.includes("Rusak Ringan") ? "#f97316"
                      : k.includes("Sedang") ? "#eab308"
                      : "#1B4332";

          const icon = L.divIcon({
            html: `<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;background:${warna};border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,.3);transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;">
                     <span style="transform:rotate(45deg);font-size:13px;">${isMusholla ? "🏠" : "🕌"}</span>
                   </div>`,
            className: "", iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-36],
          });

          const fotoHtml = masjid.fotoUtama
            ? `<img src="${masjid.fotoUtama}" style="width:100%;height:88px;object-fit:cover;border-radius:8px;margin-bottom:8px;" onerror="this.style.display='none'"/>`
            : "";

          const popup = L.popup({ maxWidth: 230 }).setContent(`
            <div style="font-family:'DM Sans',sans-serif;min-width:190px;">
              ${fotoHtml}
              <div style="font-size:10px;color:#D4A853;font-weight:700;letter-spacing:.5px;margin-bottom:2px;">${isMusholla ? "MUSHOLLA" : "MASJID"}</div>
              <div style="font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#1B4332;margin-bottom:4px;">${masjid.namaMasjid}</div>
              <div style="font-size:11px;color:#6b7280;margin-bottom:8px;">📍 ${masjid.desa}</div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:11px;color:#6b7280;">Jumat: ${masjid.jamaahJumat ? "±"+masjid.jamaahJumat : "—"}</span>
                <button onclick="window.__pilih(${masjid.id})" style="font-size:11px;padding:4px 10px;background:#1B4332;color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600;">Detail →</button>
              </div>
            </div>`);

          const marker = L.marker(masjid.latLng, { icon }).addTo(map).bindPopup(popup);
          markersRef.current.push(marker);
        });

        if (denganLL.length > 1) {
          map.fitBounds(L.latLngBounds(denganLL.map(m => m.latLng)), { padding:[40,40] });
        }
      }, [denganLL]);

      useEffect(() => {
        window.__pilih = (id) => { const m = data.find(x => x.id === id); if (m) onSelect(m); };
        return () => { delete window.__pilih; };
      }, [data, onSelect]);

      return (
        <div>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:12,
            background:"white", borderRadius:12, padding:"10px 14px",
            border:"1px solid #e2d9c8", alignItems:"center" }}>
            <span style={{ fontSize:12, color:"#6b7280", fontWeight:500 }}>Legenda:</span>
            {[["#1B4332","Baik"],["#eab308","Sedang"],["#f97316","Rusak Ringan"],["#ef4444","Rusak Berat"]].map(([c,l]) => (
              <span key={l} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12 }}>
                <span style={{ width:10, height:10, borderRadius:"50%", background:c, display:"inline-block" }}/>

                ⚠️ {tanpaLL.length} belum ada koordinat GPS:

        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ flex:1, height:8, background:"#f0ebe0", borderRadius:4, overflow:"hidden" }}>
            <div style={{ width:pct+"%", height:"100%", background:color, borderRadius:4, transition:"width .6s ease" }}/>
          </div>
          <span style={{ fontSize:12, fontWeight:600, color, minWidth:24, textAlign:"right" }}>{value}</span>
        </div>
      );
    }

              * Berdasarkan {data.length} entri terverifikasi
