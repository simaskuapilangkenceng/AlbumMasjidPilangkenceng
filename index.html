                <div style={{marginBottom:14}}><label style={{fontSize:12,color:"#6b7280",fontWeight:500,display:"block",marginBottom:5}}>Username</label><input type="text" value={username} autoComplete="username" placeholder="Masukkan username" onChange={e=>setUsername(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!loading)handleLogin();}} style={inpStyle}/></div>
                <div style={{marginBottom:18}}><label style={{fontSize:12,color:"#6b7280",fontWeight:500,display:"block",marginBottom:5}}>Password</label><div style={{position:"relative"}}><input type={showPass?"text":"password"} value={password} autoComplete="current-password" placeholder="Masukkan password" onChange={e=>setPassword(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!loading)handleLogin();}} style={{...inpStyle,paddingRight:44}}/><button onClick={()=>setShowPass(!showPass)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#9ca3af",padding:0}}>{showPass?"🙈":"👁"}</button></div></div>
                {error&&<div style={{background:"#fee2e2",color:"#b91c1c",borderRadius:8,padding:"10px 14px",fontSize:13,marginBottom:14}}>⚠️ {error}</div>}
                <button onClick={handleLogin} disabled={loading} style={btn(true)}>{loading?"⏳ Memverifikasi...":"🔐 Masuk"}</button>
              </>)}
              {tab==="register"&&(<>
                <p style={{fontSize:12,color:"#6b7280",marginBottom:16,lineHeight:1.6}}>Khusus surveyor yang sudah menginput data di Google Form. Nama harus sama persis.</p>
                {[{label:"Nama Lengkap (sesuai Form)",val:regNama,set:setRegNama,type:"text",ph:"Nama seperti di Google Form"},{label:"Username baru (4–20 karakter)",val:regUsername,set:setRegUsername,type:"text",ph:"huruf, angka, underscore"},{label:"Password baru (min. 6 karakter)",val:regPassword,set:setRegPassword,type:"password",ph:"Minimal 6 karakter"}].map(({label,val,set,type,ph})=>(<div key={label} style={{marginBottom:14}}><label style={{fontSize:12,color:"#6b7280",fontWeight:500,display:"block",marginBottom:5}}>{label}</label><input type={type} value={val} placeholder={ph} onChange={e=>set(e.target.value)} style={inpStyle}/></div>))}
                {regMsg&&<div style={{background:regMsg.ok?"#dcfce7":"#fee2e2",color:regMsg.ok?"#15803d":"#b91c1c",borderRadius:8,padding:"10px 14px",fontSize:13,marginBottom:14}}>{regMsg.ok?"✅ ":"⚠️ "}{regMsg.text}</div>}
                <button onClick={handleRegister} disabled={regLoading} style={btn(true)}>{regLoading?"⏳ Mendaftar...":"📝 Daftar Akun"}</button>
                {regMsg?.ok&&<button onClick={()=>setTab("login")} style={{...btn(false),marginTop:8}}>Lanjut ke Login →</button>}
              </>)}
            </div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  ADMIN BADGE
    // ════════════════════════════════════════════════════════════
    // ════════════════════════════════════════════════════════════
    //  TAB KENDALI DATA
    // ════════════════════════════════════════════════════════════
    const KD_GROUPS = [
      { id:"identitas",    label:"Identitas",  icon:"🕌", color:"#DC2626",
        fields:["Nomor ID SIMAS (Sistem Informasi Masjid Kemenag)","Nama Masjid / Musholla","Desa","Alamat Lengkap","Link Google Maps","Koordinat","Email Masjid/Musholla","Media Sosial"] },
      { id:"kepengurusan", label:"Pengurus",   icon:"👥", color:"#D97706",
        fields:["Nama Ketua Takmir","Nomor WhatsApp Ketua Takmir (jika diizinkan)","Nama Sekretaris Takmir","SK Takmir \u2014 Periode (Tahun Mulai s/d Tahun Akhir)","SK Takmir Diketahui / Ditandatangani Oleh","Jumlah Imam Masjid","Nama Imam 1 ","Jumlah Muadzin Masjid","Nama Muadzin 1 ","Jumlah Khotib Masjid","Nama Khotib 1","Jumlah Marbot Masjid","Nama Marbot 1 "] },
      { id:"jamaah",       label:"Jamaah",     icon:"📋", color:"#059669",
        fields:["Luas Tanah (m\u00b2)","Luas Bangunan (m\u00b2)","Daya tampung jamaah","Jumlah Seluruh Jamaah Tercatat (orang dewasa)","Jumlah Jamaah Sholat Jumat rata-rata","Jumlah Jamaah Subuh rata-rata","Jumlah Anggota Remaja Masjid","Nama Ketua Remaja Masjid","Nama Majelis Taklim","Nama Pengasuh","TPQ Anak-Anak / Remaja","TPQ Dewasa / Lansia","Kondisi Bangunan Masjid & Fasilitas Penunjang"] },
      { id:"legalitas",    label:"Legalitas",  icon:"📜", color:"#7C3AED",
        fields:["Status Tanah","Nomor Sertifikat  Wakaf","Tanggal Sertifikat  Wakaf","Nomor Akta Ikrar Wakaf (AIW)  ","Tanggal Akta Ikrar Wakaf (AIW)  ","Nama Wakif  ","Nama Nadzir  ","Wakaf Produktif","Nomor Rekening Bantuan (atas nama lembaga/masjid)"] },
      { id:"foto",         label:"Foto",       icon:"📷", color:"#0284C7",
        fields:["Foto Tampak Depan Masjid (tampak jelas nama masjidnya)","Foto Dalam Masjid (mihrab / mimbar kelihatan)","Foto Tempat Wudhu","Foto Kamar Mandi / WC","Foto Lainnya (tampak samping, kegiatan, fasilitas lain, dll)","Nomor Sertifikat Kalibrasi","Foto Dokumen Sertifikat Kalibrasi","Foto Sertifikat Wakaf  ","Foto Akta Ikrar Wakaf"] },
    ];

    function KdBadge({ pct }) {
      const c  = pct===100?"#059669":pct>=75?"#D97706":pct>=50?"#F59E0B":"#DC2626";
      const bg = pct===100?"#ECFDF5":pct>=75?"#FFFBEB":pct>=50?"#FEF3C7":"#FEF2F2";
      return <span style={{display:"inline-block",padding:"2px 8px",borderRadius:999,fontSize:11,fontWeight:700,color:c,background:bg,border:`1px solid ${c}33`,minWidth:40,textAlign:"center"}}>{pct}%</span>;
    }
    function KdBar({ pct, color }) {
      return <div style={{width:"100%",height:4,background:"#E5E7EB",borderRadius:3,marginTop:3}}><div style={{width:`${pct}%`,height:"100%",background:color,borderRadius:3}}/></div>;
    }

    function TabKendaliData({ session, allData = [], onOpenDetail }) {
      const isAdmin = session.level === "super";

      const [kdData,    setKdData]    = useState([]);
      const [kdLoad,    setKdLoad]    = useState(true);
      const [kdErr,     setKdErr]     = useState("");
      const [search,    setSearch]    = useState("");
      const [fStatus,   setFStatus]   = useState("semua");
      const [fGrup,     setFGrup]     = useState("semua");
      const [fSurveyor, setFSurveyor] = useState("semua");
      const [fDesa,     setFDesa]     = useState("semua");
      const [sortBy,    setSortBy]    = useState("nama");
      const [modal,     setModal]     = useState(null);
      const [modalGrup, setModalGrup] = useState("identitas");

      const muat = useCallback(() => {
        setKdLoad(true); setKdErr("");
        const action = isAdmin ? "getKendaliDataAdmin" : "getKendaliData";
      const muat = useCallback(async () => {
        setKdLoad(true); setKdErr("");
        const action = isAdmin ? "getKendaliDataAdmin" : "getKendaliData";
        try {
          const r = await fetchWithTimeout(WEBAPP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify({ action, token: session.token })
          });
          const resp = await r.json();
          if (!resp || !resp.ok) { setKdErr(resp?.error || "Data tidak ditemukan."); setKdLoad(false); return; }
          setKdData(resp.masjid || []);
          setKdLoad(false);
        } catch(err) { setKdErr(err.message || "Gagal menghubungi server."); setKdLoad(false); }
      }, [session.token, isAdmin]);

      useEffect(() => { muat(); }, [muat]);

      // Daftar unik surveyor & desa untuk filter admin
      const daftarSurveyor = useMemo(() => {
        const s = [...new Set(kdData.map(m => m.surveyor).filter(Boolean))].sort();
        return s;
      }, [kdData]);
      const daftarDesa = useMemo(() => {
        const d = [...new Set(kdData.map(m => m.desa).filter(Boolean))].sort();
        return d;
      }, [kdData]);

      const processed = useMemo(() => {
        return kdData.filter(m => {
          const q = search.toLowerCase();
          if (q && !m.nama.toLowerCase().includes(q) && !(m.desa||"").toLowerCase().includes(q) && !(m.surveyor||"").toLowerCase().includes(q)) return false;
          if (fStatus==="lengkap" && m.overallPct!==100) return false;
          if (fStatus==="hampir"  && !(m.overallPct>=75&&m.overallPct<100)) return false;
          if (fStatus==="perlu"   && m.overallPct>=75) return false;
          if (fGrup!=="semua") { const g=m.groups.find(x=>x.id===fGrup); if(!g||g.pct===100) return false; }
          if (isAdmin && fSurveyor!=="semua" && m.surveyor!==fSurveyor) return false;
          if (isAdmin && fDesa!=="semua"     && m.desa!==fDesa)         return false;
          return true;
        }).sort((a,b) => {
          if (sortBy==="nama")      return a.nama.localeCompare(b.nama);
          if (sortBy==="pct_asc")   return a.overallPct - b.overallPct;
          if (sortBy==="pct_desc")  return b.overallPct - a.overallPct;
          if (sortBy==="surveyor")  return (a.surveyor||"").localeCompare(b.surveyor||"");
          if (sortBy==="desa")      return (a.desa||"").localeCompare(b.desa||"");
          return 0;
        });
      }, [kdData,search,fStatus,fGrup,fSurveyor,fDesa,sortBy,isAdmin]);

      const summary = useMemo(() => ({
        total:   kdData.length,
        lengkap: kdData.filter(m=>m.overallPct===100).length,
        hampir:  kdData.filter(m=>m.overallPct>=75&&m.overallPct<100).length,
        perlu:   kdData.filter(m=>m.overallPct<75).length,
        avg:     kdData.length ? Math.round(kdData.reduce((a,m)=>a+m.overallPct,0)/kdData.length) : 0,
      }), [kdData]);

      const selSt = {padding:"8px 10px",border:"1px solid #E2E8F0",borderRadius:8,fontSize:13,background:"#fff",fontFamily:"'DM Sans',sans-serif"};
      const thSt  = {flex:1,padding:"0 6px",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:".07em"};

      if (kdLoad) return <div style={{textAlign:"center",padding:60,color:"#94A3B8"}}><div style={{fontSize:36,marginBottom:12}}>⏳</div><p style={{margin:0}}>Memuat Kendali Data…</p></div>;
      if (kdErr)  return (
        <div style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:12,padding:20,color:"#991B1B",fontSize:13,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
          <span>⚠️ {kdErr}</span>
          <button onClick={muat} style={{padding:"6px 14px",background:"#991B1B",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>🔄 Coba Lagi</button>
        </div>
      );

      return (
        <div>
          {/* Judul */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:12}}>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:19,fontWeight:700,color:"#1B4332"}}>
                {isAdmin ? "📋 Kendali Data — Semua Surveyor" : "📋 Kendali Data"}
              </div>
              <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>
                {isAdmin
                  ? `Review kelengkapan data seluruh masjid & musholla · ${summary.total} lokasi dari ${daftarSurveyor.length} surveyor`
                  : `Monitor kelengkapan data masjid & musholla · ${session.nama}`}
              </div>
            </div>
            <button onClick={muat} style={{padding:"7px 14px",background:"#1B4332",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>🔄 Refresh</button>
          </div>

          {/* Summary Cards */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:12,marginBottom:20}}>
            {[
              {label:"Total Lokasi",   val:summary.total,   color:"#0EA5E9",icon:"🕌"},
              {label:"Lengkap",        val:summary.lengkap, color:"#059669",icon:"✅"},
              {label:"Hampir Lengkap", val:summary.hampir,  color:"#D97706",icon:"⚠️"},
              {label:"Perlu Diisi",    val:summary.perlu,   color:"#DC2626",icon:"❌"},
              {label:"Rata-rata",      val:summary.avg+"%", color:"#7C3AED",icon:"📊"},
              ...(isAdmin ? [{label:"Surveyor",val:daftarSurveyor.length,color:"#0284C7",icon:"👥"}] : []),
            ].map((c,i)=>(
              <div key={i} style={{background:"#fff",borderRadius:12,padding:"14px 16px",border:"1px solid #E2E8F0",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
                  <span style={{fontSize:15}}>{c.icon}</span>
                  <span style={{fontSize:9,fontWeight:700,color:"#94A3B8",textTransform:"uppercase",letterSpacing:".06em"}}>{c.label}</span>
                </div>
                <div style={{fontSize:22,fontWeight:800,color:c.color}}>{c.val}</div>
              </div>
            ))}
          </div>

          {/* Filter Bar */}
          <div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:12,padding:"12px 16px",marginBottom:14,display:"flex",gap:10,flexWrap:"wrap",alignItems:"center"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder={isAdmin ? "🔍 Cari nama, desa, atau surveyor…" : "🔍 Cari nama masjid atau desa…"}
              style={{flex:"1 1 180px",padding:"8px 12px",border:"1px solid #E2E8F0",borderRadius:8,fontSize:13,outline:"none",fontFamily:"'DM Sans',sans-serif",minWidth:0}}/>
            <select value={fStatus} onChange={e=>setFStatus(e.target.value)} style={selSt}>
              <option value="semua">Semua Status</option>
              <option value="lengkap">✅ Lengkap (100%)</option>
              <option value="hampir">⚠️ Hampir (≥75%)</option>
              <option value="perlu">❌ Perlu Dilengkapi</option>
            </select>
            <select value={fGrup} onChange={e=>setFGrup(e.target.value)} style={selSt}>
              <option value="semua">Semua Grup</option>
              {KD_GROUPS.map(g=><option key={g.id} value={g.id}>{g.icon} {g.label} — ada yg kosong</option>)}
            </select>
            {isAdmin && (
              <select value={fSurveyor} onChange={e=>setFSurveyor(e.target.value)} style={selSt}>
                <option value="semua">👥 Semua Surveyor</option>
                {daftarSurveyor.map(s=><option key={s} value={s}>{s}</option>)}
              </select>
            )}
            {isAdmin && (
              <select value={fDesa} onChange={e=>setFDesa(e.target.value)} style={selSt}>
                <option value="semua">🏘️ Semua Desa</option>
                {daftarDesa.map(d=><option key={d} value={d}>{d}</option>)}
              </select>
            )}
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={selSt}>
              <option value="nama">Nama A–Z</option>
              <option value="pct_asc">Kelengkapan ↑</option>
              <option value="pct_desc">Kelengkapan ↓</option>
              {isAdmin && <option value="surveyor">Surveyor A–Z</option>}
              {isAdmin && <option value="desa">Desa A–Z</option>}
            </select>
            <span style={{fontSize:12,color:"#94A3B8",marginLeft:"auto",whiteSpace:"nowrap"}}><b style={{color:"#1B4332"}}>{processed.length}</b> lokasi</span>
          </div>

          {/* Tabel */}
          <div style={{background:"#fff",border:"1px solid #E2E8F0",borderRadius:12,overflow:"auto",boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
            {/* Header */}
            <div style={{display:"flex",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0",padding:"10px 14px",minWidth:isAdmin?960:800}}>
              <div style={{...thSt,flex:2}}>Nama & Lokasi</div>
              {isAdmin && <div style={{...thSt,flex:1.2}}>Surveyor</div>}
              <div style={{...thSt,flex:.85,textAlign:"center"}}>Total</div>
              {KD_GROUPS.map(g=><div key={g.id} style={{...thSt,textAlign:"center"}}>{g.icon} {g.label}</div>)}
              <div style={{...thSt,flex:.65,textAlign:"center"}}>Aksi</div>
            </div>
            {/* Rows */}
            {processed.length===0
              ? <div style={{padding:"48px 24px",textAlign:"center",color:"#94A3B8"}}><div style={{fontSize:36,marginBottom:10}}>🔍</div><p style={{margin:0}}>Tidak ada data yang cocok.</p></div>
              : processed.map((m,idx)=>(
                <div key={idx} style={{display:"flex",alignItems:"center",padding:"11px 14px",borderBottom:idx<processed.length-1?"1px solid #F1F5F9":"none",background:idx%2===0?"#fff":"#FAFBFF",minWidth:isAdmin?960:800,transition:"background .1s"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#EFF6FF"}
                  onMouseLeave={e=>e.currentTarget.style.background=idx%2===0?"#fff":"#FAFBFF"}>
                  {/* Nama & Lokasi */}
                  <div style={{flex:2,padding:"0 6px",minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#0F172A",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.nama}</div>
                    <div style={{fontSize:11,color:"#94A3B8",marginTop:2}}>{m.desa} · {m.tipologi}</div>
                  </div>
                  {/* Kolom Surveyor (admin only) */}
                  {isAdmin && (
                    <div style={{flex:1.2,padding:"0 6px",minWidth:0}}>
                      <div style={{fontSize:11,color:"#374151",fontWeight:500,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.surveyor||"—"}</div>
                    </div>
                  )}
                  {/* Total */}
                  <div style={{flex:.85,padding:"0 6px",textAlign:"center"}}>
                    <KdBadge pct={m.overallPct}/>
                    <KdBar pct={m.overallPct} color={m.overallPct===100?"#059669":m.overallPct>=75?"#D97706":m.overallPct>=50?"#F59E0B":"#DC2626"}/>
                    <div style={{fontSize:10,color:"#94A3B8",marginTop:2}}>{m.totalFilled}/{m.totalFields}</div>
                  </div>
                  {/* Per Grup */}
                  {m.groups.map(g=>(
                    <div key={g.id} style={{flex:1,padding:"0 6px",textAlign:"center"}}>
                      <KdBadge pct={g.pct}/>
                      <KdBar pct={g.pct} color={KD_GROUPS.find(x=>x.id===g.id)?.color||"#64748B"}/>
                      <div style={{fontSize:10,color:"#94A3B8",marginTop:2}}>{g.filled}/{g.total}</div>
                    </div>
                  ))}
                  {/* Aksi */}
                  <div style={{flex:.65,padding:"0 6px",textAlign:"center",display:"flex",flexDirection:"column",gap:4,alignItems:"center"}}>
                    <button onClick={()=>{setModal(m);setModalGrup("identitas");}}
                      style={{padding:"4px 10px",background:"#EFF6FF",color:"#1D4ED8",border:"1px solid #BFDBFE",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",width:"100%"}}>
                      Detail →
                    </button>
                    {onOpenDetail && (() => {
                      const found = allData.find(d => d.namaMasjid === m.nama && d.desa === m.desa);
                      return found ? (
                        <button onClick={()=>{ setModal(null); onOpenDetail(found); }}
                          style={{padding:"4px 10px",background:"#ECFDF5",color:"#065F46",border:"1px solid #6EE7B7",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",whiteSpace:"nowrap",width:"100%"}}>
                          ✏️ Edit
                        </button>
                      ) : null;
                    })()}
                  </div>
                </div>
              ))
            }
          </div>

          {/* Legend */}
          <div style={{marginTop:14,display:"flex",gap:16,flexWrap:"wrap",fontSize:11,color:"#64748B"}}>
            <span style={{color:"#059669"}}>● Lengkap (100%)</span>
            <span style={{color:"#D97706"}}>● Hampir (75–99%)</span>
            <span style={{color:"#F59E0B"}}>● Sedang (50–74%)</span>
            <span style={{color:"#DC2626"}}>● Perlu Dilengkapi (&lt;50%)</span>
          </div>

          {/* Modal Detail */}
          {modal&&(
            <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
              <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,width:"100%",maxWidth:680,maxHeight:"90vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 60px rgba(0,0,0,.25)"}}>
                <div style={{padding:"20px 24px 14px",borderBottom:"1px solid #F1F5F9",display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexShrink:0}}>
                  <div>
                    <div style={{fontSize:10,fontWeight:700,color:"#64748B",letterSpacing:".08em",textTransform:"uppercase"}}>Detail Kendali Data</div>
                    <div style={{fontSize:17,fontWeight:800,color:"#0F172A",marginTop:4}}>{modal.nama}</div>
                    <div style={{fontSize:12,color:"#94A3B8",marginTop:2}}>
                      {modal.desa} · {modal.tipologi}
                      {isAdmin && modal.surveyor && <span style={{marginLeft:8,background:"#EFF6FF",color:"#1D4ED8",padding:"1px 8px",borderRadius:20,fontSize:11,fontWeight:600}}>👤 {modal.surveyor}</span>}
                    </div>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    {onOpenDetail && (() => {
                      const found = allData.find(d => d.namaMasjid === modal.nama && d.desa === modal.desa);
                      return found ? (
                        <button onClick={()=>{ setModal(null); onOpenDetail(found); }}
                          style={{padding:"6px 14px",background:"#1B4332",color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:5}}>
                          ✏️ Edit Data
                        </button>
                      ) : null;
                    })()}
                    <button onClick={()=>setModal(null)} style={{background:"#F1F5F9",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",fontSize:16,color:"#64748B",lineHeight:1}}>✕</button>
                  </div>
                </div>
                <div style={{display:"flex",gap:6,padding:"12px 24px",borderBottom:"1px solid #F1F5F9",flexWrap:"wrap",flexShrink:0}}>
                  {modal.groups.map(g=>{
                    const gd=KD_GROUPS.find(x=>x.id===g.id);
                    const act=modalGrup===g.id;
                    return <button key={g.id} onClick={()=>setModalGrup(g.id)}
                      style={{display:"flex",alignItems:"center",gap:5,padding:"6px 11px",borderRadius:8,border:`1.5px solid ${act?(gd?.color||"#1D4ED8"):"#E2E8F0"}`,background:act?"#EFF6FF":"#fff",cursor:"pointer",fontSize:12,fontWeight:act?700:500,color:act?(gd?.color||"#1D4ED8"):"#64748B",whiteSpace:"nowrap",fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>
                      {gd?.icon} {g.label} <KdBadge pct={g.pct}/>
                    </button>;
                  })}
                </div>
                <div style={{overflowY:"auto",padding:"16px 24px 24px",flex:1}}>
                  <div style={{display:"grid",gap:7}}>
                    {(modal.groups.find(g=>g.id===modalGrup)?.detail||[]).map((f,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",padding:"9px 12px",borderRadius:10,background:f.filled?"#F8FAFF":"#FFF7F7",border:`1px solid ${f.filled?"#DBEAFE":"#FEE2E2"}`,gap:10}}>
                        <span style={{fontSize:14,flexShrink:0}}>{f.filled?"✅":"❌"}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:600,color:f.filled?"#1E40AF":"#991B1B"}}>{f.label}</div>
                          {f.filled
                            ? <div style={{fontSize:11,color:"#64748B",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.value.startsWith("http")?"📎 File/Link tersedia":f.value}</div>
                            : <div style={{fontSize:11,color:"#EF4444"}}>Belum diisi</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function AdminBadge({ session, onLogout }) {
      const [loading,setLoading]=useState(false), [expand,setExpand]=useState(false);
      const LEVEL_COLOR={super:{bg:"#fef9c3",color:"#a16207"},editor:{bg:"#dcfce7",color:"#15803d"},viewer:{bg:"#f3f4f6",color:"#6b7280"}};
      const lc=LEVEL_COLOR[session.level]||LEVEL_COLOR.viewer;
      const LEVEL_LABEL={super:"👑 Super",editor:"✏️ Editor",viewer:"👁 Viewer"};
      const handleLogout=async()=>{setLoading(true);try{await fetchWithTimeout(WEBAPP_URL,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify({action:"logout",token:session.token})});}catch(e){}sessionStorage.removeItem("albumMasjidAdmin");onLogout();setLoading(false);};
      return(
        <div style={{position:"relative"}}>
          <button onClick={()=>setExpand(!expand)} style={{display:"flex",alignItems:"center",gap:7,padding:"6px 12px",borderRadius:24,border:"1px solid rgba(212,168,83,.4)",background:"rgba(212,168,83,.15)",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
            <span style={{fontSize:16}}>🛡️</span>
            <span style={{fontSize:11,fontWeight:600,color:"#D4A853",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{session.nama.split(" ")[0]}</span>
            <span style={{fontSize:10,color:"rgba(212,168,83,.7)"}}>▾</span>
          </button>
          {expand&&(<div style={{position:"absolute",top:"calc(100% + 8px)",right:0,background:"white",borderRadius:14,minWidth:200,boxShadow:"0 8px 32px rgba(0,0,0,.15)",border:"1px solid #e2d9c8",zIndex:1000,overflow:"hidden",animation:"fadeIn .15s ease"}}>
            <div style={{padding:"14px 16px",borderBottom:"1px solid #e2d9c8"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#1a1a1a",marginBottom:4}}>{session.nama}</div>
              <span style={{...lc,fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:20,display:"inline-block"}}>{LEVEL_LABEL[session.level]||session.level}</span>
              {session.desa&&<div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Desa: {Array.isArray(session.desa)?session.desa.join(", "):session.desa}</div>}
            </div>
            <button onClick={handleLogout} disabled={loading} style={{width:"100%",padding:"12px 16px",border:"none",background:"none",cursor:loading?"not-allowed":"pointer",textAlign:"left",fontSize:13,color:"#b91c1c",fontWeight:500,fontFamily:"'DM Sans',sans-serif",display:"flex",alignItems:"center",gap:8,opacity:loading?.6:1}}>
              {loading?"⏳":"🚪"} {loading?"Keluar...":"Keluar (Logout)"}
            </button>
          </div>)}
          {expand&&<div onClick={()=>setExpand(false)} style={{position:"fixed",inset:0,zIndex:999}}/>}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  APP UTAMA — v4.9
    // ════════════════════════════════════════════════════════════
    function AlbumMasjid() {
      const { data, loading, error, lastSync, refetch } = useSheetData();
      const [tab,          setTab]          = useState("album");
      const [selected,     setSelected]     = useState(null);
      const [adminSession, setAdminSession] = useState(null);
      const [showLogin,    setShowLogin]    = useState(false);
      // v4.9: state modal tambah data baru
      const [showTambah,   setShowTambah]   = useState(false);

      useEffect(() => {
        try {
          const saved = sessionStorage.getItem("albumMasjidAdmin");
          if (saved) {
            const session = JSON.parse(saved);
            if (Date.now() < session.loginAt + 8*3600*1000) setAdminSession(session);
            else sessionStorage.removeItem("albumMasjidAdmin");
          }
        } catch(e) {}
      }, []);

      const totalMasjid    = data.filter(m => !m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")).length;
      const totalMusholla  = data.filter(m =>  m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")).length;
      const perluPerhatian = data.filter(m => m.kondisiBgn?.includes("Rusak")).length;

      const tabs = [
        { id:"album",     icon:"🗂️",  label:"Album"     },
        { id:"peta",      icon:"🗺️",  label:"Peta"      },
        { id:"statistik", icon:"📊",  label:"Statistik" },
        { id:"kiblat",    icon:"🧭",  label:"Kiblat"    },
        ...(adminSession ? [{ id:"kendali", icon:"📋", label:"Kendali Data" }] : []),
      ];

      return (
        <div style={{ minHeight:"100vh", background:"var(--krem)" }}>
          <OfflineBanner />
          <header style={{ background:"#1B4332", position:"sticky", top:0, zIndex:500, boxShadow:"0 2px 20px rgba(27,67,50,.4)" }}>
            <div style={{ height:3, background:"repeating-linear-gradient(90deg,#D4A853 0,#D4A853 8px,transparent 8px,transparent 16px,#D4A853 16px,#D4A853 22px,transparent 22px,transparent 30px)" }}/>
            <div style={{ maxWidth:1120, margin:"0 auto", padding:"10px 20px", display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, flex:1, minWidth:160 }}>
                <div style={{ width:38, height:38, borderRadius:10, background:"rgba(212,168,83,.2)", border:"1px solid rgba(212,168,83,.35)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>🕌</div>
                <div>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:15, fontWeight:700, color:"white", lineHeight:1.1 }}>Album Masjid</div>
                  <div style={{ fontSize:10, color:"rgba(212,168,83,.8)", letterSpacing:".5px" }}>KEC. PILANGKENCENG · v4.9</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:4, background:"rgba(255,255,255,.1)", borderRadius:24, padding:4, flexWrap:"wrap" }}>
                {tabs.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)} style={{ padding:"6px 16px", borderRadius:20, border:"none", cursor:"pointer", fontSize:12, fontWeight:600, transition:"all .2s", background: tab===t.id ? "#D4A853" : "transparent", color: tab===t.id ? "#1B4332" : "rgba(255,255,255,.8)" }}>
                    {t.icon} {t.label}
                  </button>
                ))}
              </div>
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                {lastSync && !loading && (
                  <span style={{ fontSize:11, color:"rgba(255,255,255,.5)" }}>🔄 {lastSync.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})}</span>
                )}
                <button onClick={refetch} disabled={loading} style={{ padding:"6px 12px", borderRadius:24, border:"1px solid rgba(255,255,255,.2)", background:"rgba(255,255,255,.08)", color:"rgba(255,255,255,.8)", cursor:loading?"not-allowed":"pointer", fontSize:12, fontFamily:"'DM Sans',sans-serif" }}>
                  {loading ? "⏳" : "🔄"} Sinkron
                </button>

                {/* v4.9: Tombol ➕ Tambah — muncul jika sudah login */}
                {adminSession && (
                  <button onClick={() => setShowTambah(true)} style={{ padding:"6px 14px", borderRadius:24, border:"1px solid rgba(212,168,83,.5)", background:"rgba(212,168,83,.2)", color:"#D4A853", cursor:"pointer", fontSize:12, fontWeight:600, fontFamily:"'DM Sans',sans-serif", display:"flex", alignItems:"center", gap:5 }}>
                    ➕ Tambah
                  </button>
                )}

                {adminSession ? (
                  <AdminBadge session={adminSession} onLogout={() => setAdminSession(null)}/>
                ) : (
                  <button onClick={() => setShowLogin(true)} style={{ padding:"6px 12px", borderRadius:24, border:"1px solid rgba(212,168,83,.4)", background:"rgba(212,168,83,.1)", color:"rgba(212,168,83,.9)", cursor:"pointer", fontSize:12, fontWeight:500, fontFamily:"'DM Sans',sans-serif" }}>🔐 Admin</button>
                )}
              </div>
            </div>
          </header>

          <main style={{ maxWidth:1120, margin:"0 auto", padding:"20px" }}>
            {tab === "album" && (
              <>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
                  <div>
                    <div style={{ fontFamily:"'Playfair Display',serif", fontSize:19, fontWeight:700, color:"#1B4332" }}>Direktori Masjid & Musholla</div>
                    <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>{loading ? "Memuat data..." : `${data.length} data terverifikasi · auto-refresh 5 menit`}</div>
                  </div>
                  <div style={{ display:"flex", gap:12, fontSize:12 }}>
                    <span style={{ color:"#1B4332", fontWeight:500 }}>🕌 {totalMasjid} Masjid</span>
                    <span style={{ color:"#6b7280" }}>🏠 {totalMusholla} Musholla</span>
                    {perluPerhatian > 0 && <span style={{ color:"#c2410c", fontWeight:500 }}>⚠️ {perluPerhatian} Perlu Perhatian</span>}
                  </div>
                </div>
                <TabAlbum data={data} loading={loading} error={error} onSelect={setSelected}/>
              </>
            )}
            {tab === "peta"      && <TabPeta      data={data} onSelect={setSelected}/>}
            {tab === "statistik" && <TabStatistik data={data}/>}
            {tab === "kiblat"    && <TabKiblat/>}
            {tab === "kendali"   && adminSession && <TabKendaliData session={adminSession} allData={data} onOpenDetail={setSelected}/>}

            <div style={{ marginTop:40, paddingTop:16, borderTop:"1px solid #e8e0d0", textAlign:"center", fontSize:11, color:"#9ca3af", lineHeight:1.8 }}>
              Direktori Masjid & Musholla · Kecamatan Pilangkenceng, Kabupaten Madiun<br/>
              Kerjasama: KUA Kec. Pilangkenceng · BKM · PW DMI · APRI & IPARI · Kanwil Kemenag Jatim
            </div>
          </main>

          {selected && (
            <ModalDetail
              masjid={selected}
              onClose={() => setSelected(null)}
              onCetak={m => { setSelected(null); setTimeout(() => cetakProfil(m), 300); }}
              adminSession={adminSession}
              onDataUpdated={(updated) => { setSelected(prev => ({ ...prev, ...updated })); }}
            />
          )}

          {showLogin && (
            <AdminLoginModal onClose={() => setShowLogin(false)} onLoginSuccess={(session) => setAdminSession(session)}/>
          )}

          {/* v4.9: Modal Tambah Masjid Baru */}
          {showTambah && adminSession && (
            <TambahMasjidModal
              adminSession={adminSession}
              onClose={() => setShowTambah(false)}
              onBerhasil={() => {
                setShowTambah(false);
                // Auto refresh setelah 3 detik agar data baru muncul
                setTimeout(() => refetch(), 3000);
              }}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AlbumMasjid/>);
  </script>
</body>
</html>
