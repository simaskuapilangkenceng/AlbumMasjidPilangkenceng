          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  TAB KIBLAT
    // ════════════════════════════════════════════════════════════
    function TabKiblat() {
      const KA_LAT = 21.4225, KA_LNG = 39.8263;
      const DEF_LAT = -7.6101, DEF_LNG = 111.4926;

      const [kLat,    setKLat]    = useState(DEF_LAT.toString());
      const [kLng,    setKLng]    = useState(DEF_LNG.toString());
      const [kResult, setKResult] = useState(null);

      const hitungKiblat = () => {
        const lat = parseFloat(kLat), lng = parseFloat(kLng);
        if (isNaN(lat) || isNaN(lng)) return;
        const dLng = (KA_LNG - lng) * Math.PI / 180;
        const latR = lat * Math.PI / 180, kaLatR = KA_LAT * Math.PI / 180;
        const y = Math.sin(dLng) * Math.cos(kaLatR);
        const x = Math.cos(latR) * Math.sin(kaLatR) - Math.sin(latR) * Math.cos(kaLatR) * Math.cos(dLng);
        let az = Math.atan2(y, x) * 180 / Math.PI;
        az = (az + 360) % 360;
        const arahMata = az<=22.5?"Utara":az<=67.5?"Timur Laut":az<=112.5?"Timur":az<=157.5?"Tenggara":az<=202.5?"Selatan":az<=247.5?"Barat Daya":az<=292.5?"Barat":"Barat Laut";
        setKResult({ az: az.toFixed(2), arah: arahMata });
      };

      const [rTgl,    setRTgl]    = useState(() => new Date().toISOString().slice(0,10));
      const [rLng,    setRLng]    = useState(DEF_LNG.toString());
      const [rResult, setRResult] = useState(null);

      const getDeklinasi = (doy) => 23.45 * Math.sin((360/365*(doy-81)) * Math.PI/180);
      const getEOT = (doy) => {
        const B = (360/365*(doy-81)) * Math.PI/180;
        return 9.87*Math.sin(2*B) - 7.53*Math.cos(B) - 1.5*Math.sin(B);
      };
      const getDOY = (dateStr) => {
        const d = new Date(dateStr), s = new Date(d.getFullYear(), 0, 0);
        return Math.floor((d - s) / 86400000);
      };

      const hitungRashdul = () => {
        const lng = parseFloat(rLng);
        if (isNaN(lng) || !rTgl) return;
        const doy = getDOY(rTgl);
        const dekl = getDeklinasi(doy);
        const eot = getEOT(doy);
        if (Math.abs(dekl) > KA_LAT + 0.5) { setRResult({ error:true, dekl:dekl.toFixed(2) }); return; }
        const selisihBujur = (lng - KA_LNG) / 15;
        const totalMenit = 720 - eot + selisihBujur * 60;
        const jamWIB = totalMenit / 60;
        const jam = Math.floor(jamWIB);
        const menit = Math.floor((jamWIB - jam) * 60);
        const detik = Math.round(((jamWIB - jam)*60 - menit) * 60);
        const pad = n => String(n).padStart(2,"0");
        const waktu = `${pad(jam)}:${pad(menit)}:${pad(detik)} WIB`;
        const tglStr = new Date(rTgl).toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
        setRResult({ waktu, tglStr, dekl:dekl.toFixed(2), eot:eot.toFixed(2), error:false });
      };

      const inputStyle = { width:"100%", padding:"10px 14px", borderRadius:10,
        border:"1px solid #e2d9c8", fontSize:14, background:"white",
        fontFamily:"'DM Sans',sans-serif", outline:"none", color:"#1a1a1a", boxSizing:"border-box" };
      const labelStyle = { fontSize:12, color:"#9ca3af", marginBottom:4, display:"block", fontWeight:500 };
      const cardStyle  = { background:"white", borderRadius:16, border:"1px solid #e2d9c8",
        boxShadow:"0 2px 12px rgba(0,0,0,.06)", overflow:"hidden", marginBottom:20 };
      const cardHeader = { background:"#1B4332", padding:"16px 20px", display:"flex", alignItems:"center", gap:12 };
      const btnStyle   = { width:"100%", padding:"11px", borderRadius:10, border:"none",
        background:"#1B4332", color:"white", fontSize:14, fontWeight:600,
        cursor:"pointer", fontFamily:"'DM Sans',sans-serif", marginTop:4, letterSpacing:".3px" };
      const resultBox  = { background:"linear-gradient(135deg,#1B4332 0%,#2d6a4f 100%)",
        borderRadius:14, padding:"20px 24px", marginTop:16, color:"white",
        border:"1px solid rgba(212,168,83,.3)" };

      const CompassSVG = ({ az }) => {
        const r = az * Math.PI / 180;
        const cx=60, cy=60, R=50;
        const nx = cx + R*Math.sin(r), ny = cy - R*Math.cos(r);
        const tx = cx - 18*Math.sin(r), ty = cy + 18*Math.cos(r);
        return (
          <svg width="120" height="120" viewBox="0 0 120 120" style={{ flexShrink:0 }}>
            <circle cx={cx} cy={cy} r={R} fill="rgba(255,255,255,.08)" stroke="rgba(212,168,83,.4)" strokeWidth="1"/>
            {["U","T","S","B"].map((d,i) => {
              const a = i * Math.PI / 2;
              return <text key={d} x={cx+44*Math.sin(a)} y={cy-44*Math.cos(a)+4}
                textAnchor="middle" fill="rgba(255,255,255,.6)" fontSize="9" fontFamily="DM Sans">{d}</text>;
            })}
            <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="#D4A853" strokeWidth="3" strokeLinecap="round"/>
            <line x1={cx} y1={cy} x2={tx} y2={ty} stroke="rgba(255,255,255,.3)" strokeWidth="2" strokeLinecap="round"/>
            <circle cx={cx} cy={cy} r={5} fill="#D4A853"/>
          </svg>
        );
      };

      const tahun = rTgl ? new Date(rTgl).getFullYear() : new Date().getFullYear();
      const rashdulDates = [`${tahun}-05-27`,`${tahun}-05-28`,`${tahun}-07-15`,`${tahun}-07-16`];

      return (
        <div style={{ animation:"fadeIn .3s ease", maxWidth:800, margin:"0 auto" }}>
          <div style={{ textAlign:"center", marginBottom:28, paddingTop:8 }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:24, fontWeight:700, color:"#1B4332", marginBottom:6 }}>
              🧭 Kalkulator Kiblat & Rashdul
            </div>
            <div style={{ fontSize:13, color:"#9ca3af" }}>
              Hitung arah kiblat dan waktu rashdul kiblat untuk lokasi mana pun
            </div>
          </div>

          {/* ── Arah Kiblat ── */}
          <div style={cardStyle}>
            <div style={cardHeader}>
              <div style={{ width:36, height:36, borderRadius:10, background:"rgba(212,168,83,.2)",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🕋</div>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"white" }}>Arah Kiblat</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.8)" }}>Berdasarkan koordinat lokasi pengamat</div>
              </div>
            </div>
            <div style={{ padding:"20px 24px" }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
                <div>
                  <label style={labelStyle}>Lintang (Latitude)</label>
                  <input style={inputStyle} type="number" step="0.0001" value={kLat}
                    onChange={e => setKLat(e.target.value)} placeholder="-7.6101"/>
                  <div style={{ fontSize:11, color:"#9ca3af", marginTop:3 }}>Negatif = Selatan. Pilangkenceng ≈ -7.6101</div>
                </div>
                <div>
                  <label style={labelStyle}>Bujur (Longitude)</label>
                  <input style={inputStyle} type="number" step="0.0001" value={kLng}
                    onChange={e => setKLng(e.target.value)} placeholder="111.4926"/>
                  <div style={{ fontSize:11, color:"#9ca3af", marginTop:3 }}>Positif = Timur. Pilangkenceng ≈ 111.4926</div>
                </div>
              </div>
              <div style={{ background:"#f8f4ed", borderRadius:10, padding:"10px 14px",
                fontSize:12, color:"#6b7280", marginBottom:16 }}>
                📍 <strong>Ka'bah:</strong> 21°25'20" LU, 39°49'34" BT (konstan)
              </div>
              <button style={btnStyle} onClick={hitungKiblat}>Hitung Arah Kiblat →</button>
              {kResult && (
                <div style={resultBox}>
                  <div style={{ display:"flex", alignItems:"center", gap:20 }}>
                    <CompassSVG az={parseFloat(kResult.az)}/>
                    <div>
                      <div style={{ fontSize:12, color:"rgba(212,168,83,.8)", marginBottom:4 }}>
                        Arah Kiblat dari Utara (searah jarum jam)
                      </div>
                      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:40,
                        fontWeight:700, color:"#D4A853", lineHeight:1 }}>{kResult.az}°</div>
                      <div style={{ fontSize:16, fontWeight:600, marginTop:6 }}>{kResult.arah}</div>
                      <div style={{ fontSize:12, color:"rgba(255,255,255,.6)", marginTop:8 }}>
                        Arahkan bayangan tongkat/benda ke arah berlawanan saat rashdul kiblat
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* ── Rashdul Kiblat ── */}
          <div style={cardStyle}>
            <div style={cardHeader}>
              <div style={{ width:36, height:36, borderRadius:10, background:"rgba(212,168,83,.2)",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>☀️</div>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"white" }}>Rashdul Kiblat</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.8)" }}>Waktu matahari tepat di atas Ka'bah</div>
              </div>
            </div>
            <div style={{ padding:"20px 24px" }}>
              <div style={{ background:"#fffbeb", border:"1px solid #fde68a", borderRadius:10,
                padding:"12px 14px", fontSize:12, color:"#92400e", marginBottom:16, lineHeight:1.6 }}>
                ℹ️ Rashdul kiblat terjadi dua kali setahun: sekitar <strong>27–28 Mei</strong> dan <strong>15–16 Juli</strong>,
                saat deklinasi matahari ≈ lintang Ka'bah (21,42°).
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
                <div>
                  <label style={labelStyle}>Tanggal</label>
                  <input style={inputStyle} type="date" value={rTgl} onChange={e => setRTgl(e.target.value)}/>
                </div>
                <div>
                  <label style={labelStyle}>Bujur Lokasi (Longitude)</label>
                  <input style={inputStyle} type="number" step="0.0001" value={rLng}
                    onChange={e => setRLng(e.target.value)} placeholder="111.4926"/>
                  <div style={{ fontSize:11, color:"#9ca3af", marginTop:3 }}>Pilangkenceng ≈ 111.4926</div>
                </div>
              </div>
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:12, color:"#9ca3af", marginBottom:8, fontWeight:500 }}>
                  ⚡ Pilih tanggal rashdul tahun {tahun}:
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {rashdulDates.map(d => {
                    const lbl = new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"short"});
                    return (
                      <button key={d} onClick={() => setRTgl(d)} style={{
                        padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:600,
                        cursor:"pointer", border:"1px solid #D4A853",
                        background: rTgl===d ? "#D4A853" : "white",
                        color: rTgl===d ? "#1B4332" : "#92400e",
                        fontFamily:"'DM Sans',sans-serif", transition:"all .2s"
                      }}>{lbl}</button>
                    );
                  })}
                </div>
              </div>
              <button style={btnStyle} onClick={hitungRashdul}>Hitung Waktu Rashdul →</button>
              {rResult && (rResult.error
                ? (
                  <div style={{ ...resultBox, background:"linear-gradient(135deg,#7f1d1d,#991b1b)" }}>
                    <div style={{ fontSize:14, fontWeight:600, marginBottom:4 }}>⚠️ Rashdul Kiblat tidak terjadi pada tanggal ini</div>
                    <div style={{ fontSize:12, color:"rgba(255,255,255,.7)" }}>
                      Deklinasi matahari = {rResult.dekl}°. Pilih tanggal sekitar 27–28 Mei atau 15–16 Juli.
                    </div>
                  </div>
                ) : (
                  <div style={resultBox}>
                    <div style={{ marginBottom:12, paddingBottom:12, borderBottom:"1px solid rgba(255,255,255,.15)" }}>
                      <div style={{ fontSize:11, color:"rgba(212,168,83,.8)", marginBottom:2 }}>Waktu Rashdul Kiblat</div>
                      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:36,
                        fontWeight:700, color:"#D4A853", lineHeight:1 }}>{rResult.waktu}</div>
                      <div style={{ fontSize:13, color:"rgba(255,255,255,.75)", marginTop:4 }}>{rResult.tglStr}</div>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, fontSize:12 }}>
                      {[
                        { label:"Deklinasi Matahari", val:rResult.dekl+"°" },
                        { label:"Equation of Time",   val:rResult.eot+" menit" },
                        { label:"Zona Waktu",         val:"WIB (UTC+7)" },
                      ].map(s => (
                        <div key={s.label} style={{ background:"rgba(255,255,255,.08)", borderRadius:8, padding:"10px 12px" }}>
                          <div style={{ color:"rgba(212,168,83,.8)", marginBottom:2 }}>{s.label}</div>
                          <div style={{ fontWeight:700, fontSize:14 }}>{s.val}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ marginTop:12, padding:"10px 12px", background:"rgba(212,168,83,.12)",
                      borderRadius:8, fontSize:12, color:"rgba(255,255,255,.8)", lineHeight:1.5 }}>
                      💡 Dirikan tongkat tegak. Bayangan yang terbentuk menunjuk tepat ke arah kiblat.
                    </div>
                  </div>
                )
              )}
            </div>
          </div>

          <div style={{ background:"white", borderRadius:14, border:"1px solid #e2d9c8",
            padding:"16px 20px", fontSize:12, color:"#6b7280", lineHeight:1.7 }}>
            <strong style={{ color:"#1B4332" }}>📐 Metode Perhitungan:</strong> Arah kiblat menggunakan formula
            Spherical Trigonometry. Rashdul kiblat dihitung menggunakan deklinasi matahari dan Equation of Time.
            Koordinat Ka'bah: 21°25'21" LU, 39°49'35" BT.
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  [ADMIN-03] KOMPONEN: AdminLoginModal
    //  Modal login admin — tampil saat tombol 🔐 Admin diklik
    // ════════════════════════════════════════════════════════════
    function AdminLoginModal({ onClose, onLoginSuccess }) {
      const [username,   setUsername]   = useState("");
      const [password,   setPassword]   = useState("");
      const [showPass,   setShowPass]   = useState(false);
      const [loading,    setLoading]    = useState(false);
      const [error,      setError]      = useState("");
      const [tab,        setTab]        = useState("login");  // "login" | "register"

      // Register state
      const [regUsername, setRegUsername] = useState("");
      const [regPassword, setRegPassword] = useState("");
      const [regNama,     setRegNama]     = useState("");
      const [regLoading,  setRegLoading]  = useState(false);
      const [regMsg,      setRegMsg]      = useState(null);  // { ok, text }

      // Tutup modal saat klik backdrop
      const handleBackdrop = (e) => {
        if (e.target === e.currentTarget) onClose();
      };

      // ── Handler Login ─────────────────────────────────────────
      const handleLogin = async () => {
        if (!username.trim() || !password) {
          setError("Username dan password wajib diisi.");
          return;
        }
        setLoading(true);
        setError("");
        try {
          const res = await fetch(WEBAPP_URL, {
            method:  "POST",
            headers: { "Content-Type": "text/plain" },
            body:    JSON.stringify({ action: "login", username: username.trim(), password }),
          });
          const json = await res.json();
          if (json.ok) {
            const session = {
              token:   json.token,
              nama:    json.nama,
              level:   json.level,
              desa:    json.desa || null,
              loginAt: Date.now(),
            };
            sessionStorage.setItem("albumMasjidAdmin", JSON.stringify(session));
            onLoginSuccess(session);
            onClose();
          } else {
            setError(json.error || "Login gagal.");
          }
        } catch(e) {
          setError("Gagal menghubungi server. Periksa koneksi internet.");
        } finally {
          setLoading(false);
        }
      };

      // Enter key di form login
      const handleKeyDown = (e) => {
        if (e.key === "Enter" && !loading) handleLogin();
      };

      // ── Handler Register ──────────────────────────────────────
      const handleRegister = async () => {
        if (!regUsername.trim() || !regPassword || !regNama.trim()) {
          setRegMsg({ ok: false, text: "Semua field wajib diisi." });
          return;
        }
        setRegLoading(true);
        setRegMsg(null);
        try {
          const res = await fetch(WEBAPP_URL, {
            method:  "POST",
            headers: { "Content-Type": "text/plain" },
            body:    JSON.stringify({
              action:       "register",
              username:     regUsername.trim(),
              password:     regPassword,
              namaSurveyor: regNama.trim(),
            }),
          });
          const json = await res.json();
          if (json.ok) {
            setRegMsg({
              ok:   true,
              text: json.message +
                    (json.daftarDesa?.length
                      ? " Akses desa: " + json.daftarDesa.join(", ") + "."
                      : ""),
            });
            setRegUsername(""); setRegPassword(""); setRegNama("");
          } else {
            setRegMsg({ ok: false, text: json.error || "Pendaftaran gagal." });
          }
        } catch(e) {
          setRegMsg({ ok: false, text: "Gagal menghubungi server." });
        } finally {
          setRegLoading(false);
        }
      };

      // ── Style helpers ─────────────────────────────────────────
      const overlay = {
        position:"fixed", inset:0, zIndex:2000,
        background:"rgba(0,0,0,.55)", backdropFilter:"blur(3px)",
        display:"flex", alignItems:"center", justifyContent:"center",
        padding:"16px",
      };
      const modal = {
        background:"#FAFAF7", borderRadius:20,
        boxShadow:"0 24px 64px rgba(27,67,50,.25)",
        width:"100%", maxWidth:420, overflow:"hidden",
        animation:"fadeIn .2s ease",
      };
      const inpStyle = {
        width:"100%", padding:"11px 14px", borderRadius:10,
        border:"1.5px solid #e2d9c8", fontSize:14,
        fontFamily:"'DM Sans',sans-serif", outline:"none",
        background:"white", color:"#1a1a1a", boxSizing:"border-box",
        transition:"border-color .2s",
      };
      const btn = (primary=true) => ({
        width:"100%", padding:"12px", borderRadius:10, border:"none",
        cursor:"pointer", fontSize:14, fontWeight:600,
        fontFamily:"'DM Sans',sans-serif", transition:"opacity .2s",
        background: primary ? "#1B4332" : "#f0e8d8",
        color:      primary ? "white"   : "#1B4332",
        opacity: loading || regLoading ? .7 : 1,
      });

      const LEVEL_BADGE = { super:"👑 Super Admin", editor:"✏️ Editor", viewer:"👁 Viewer" };

      return (
        <div style={overlay} onClick={handleBackdrop}>
          <div style={modal}>

            {/* ── Header modal ── */}
            <div style={{ background:"#1B4332", padding:"20px 24px",
              display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif",
                  fontSize:17, fontWeight:700, color:"white" }}>🔐 Admin Area</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.85)", marginTop:2 }}>
                  Album Masjid Pilangkenceng
                </div>
              </div>
              <button onClick={onClose} style={{ background:"rgba(255,255,255,.12)",
                border:"none", color:"white", width:32, height:32, borderRadius:"50%",
                cursor:"pointer", fontSize:16, display:"flex",
                alignItems:"center", justifyContent:"center" }}>✕</button>
            </div>

            {/* ── Tab switcher ── */}
            <div style={{ display:"flex", borderBottom:"1px solid #e2d9c8" }}>
              {[["login","Masuk"],["register","Daftar Surveyor"]].map(([id,label]) => (
                <button key={id} onClick={() => { setTab(id); setError(""); setRegMsg(null); }}
                  style={{ flex:1, padding:"12px", border:"none", cursor:"pointer",
                    fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif",
                    background: tab===id ? "white" : "#f8f4ed",
                    color:      tab===id ? "#1B4332" : "#9ca3af",
                    borderBottom: tab===id ? "2px solid #1B4332" : "2px solid transparent",
                  }}>{label}</button>
              ))}
            </div>

            <div style={{ padding:"24px" }}>

              {/* ── TAB LOGIN ── */}
              {tab === "login" && (
                <>
                  <div style={{ marginBottom:14 }}>
                    <label style={{ fontSize:12, color:"#6b7280", fontWeight:500,
                      display:"block", marginBottom:5 }}>Username</label>
                    <input
                      type="text" value={username} autoComplete="username"
                      placeholder="Masukkan username"
                      onChange={e => setUsername(e.target.value)}
                      onKeyDown={handleKeyDown}
                      style={inpStyle}
                    />
                  </div>
                  <div style={{ marginBottom:18 }}>
                    <label style={{ fontSize:12, color:"#6b7280", fontWeight:500,
                      display:"block", marginBottom:5 }}>Password</label>
                    <div style={{ position:"relative" }}>
                      <input
                        type={showPass ? "text" : "password"}
                        value={password} autoComplete="current-password"
                        placeholder="Masukkan password"
                        onChange={e => setPassword(e.target.value)}
                        onKeyDown={handleKeyDown}
                        style={{ ...inpStyle, paddingRight:44 }}
                      />
                      <button onClick={() => setShowPass(!showPass)}
                        style={{ position:"absolute", right:12, top:"50%",
                          transform:"translateY(-50%)", background:"none",
                          border:"none", cursor:"pointer", fontSize:16,
                          color:"#9ca3af", padding:0 }}>
                        {showPass ? "🙈" : "👁"}
                      </button>
                    </div>
                  </div>

                  {error && (
                    <div style={{ background:"#fee2e2", color:"#b91c1c",
                      borderRadius:8, padding:"10px 14px", fontSize:13,
                      marginBottom:14, display:"flex", alignItems:"center", gap:8 }}>
                      ⚠️ {error}
                    </div>
                  )}

                  <button onClick={handleLogin} disabled={loading} style={btn(true)}>
                    {loading ? "⏳ Memverifikasi..." : "🔐 Masuk"}
                  </button>

                  {/* Info level */}
                  <div style={{ marginTop:18, padding:"12px 14px",
                    background:"#f8f4ed", borderRadius:10, fontSize:11, color:"#9ca3af",
                    lineHeight:1.7 }}>
                    {Object.entries(LEVEL_BADGE).map(([lvl, lbl]) => (
                      <div key={lvl}><strong style={{ color:"#6b7280" }}>{lbl}</strong>{
                        lvl==="super"  ? " — edit semua data & lihat nomor WA" :
                        lvl==="editor" ? " — edit data operasional desa yang ditugaskan" :
                                         " — akses baca saja + badge terverifikasi"
                      }</div>
                    ))}
                  </div>
                </>
              )}

              {/* ── TAB REGISTER ── */}
              {tab === "register" && (
                <>
                  <p style={{ fontSize:12, color:"#6b7280", marginBottom:16, lineHeight:1.6 }}>
                    Khusus surveyor yang sudah menginput data di Google Form. Nama harus
                    sama persis dengan yang ditulis saat survey.
                  </p>

                  {[
                    { label:"Nama Lengkap (sesuai Form)", val:regNama,     set:setRegNama,     type:"text",     ph:"Nama seperti di Google Form" },
                    { label:"Username baru (4–20 karakter)", val:regUsername, set:setRegUsername, type:"text",   ph:"huruf, angka, underscore" },
                    { label:"Password baru (min. 6 karakter)", val:regPassword, set:setRegPassword, type:"password", ph:"Minimal 6 karakter" },
                  ].map(({ label, val, set, type, ph }) => (
                    <div key={label} style={{ marginBottom:14 }}>
                      <label style={{ fontSize:12, color:"#6b7280", fontWeight:500,
                        display:"block", marginBottom:5 }}>{label}</label>
                      <input type={type} value={val} placeholder={ph}
                        onChange={e => set(e.target.value)}
                        style={inpStyle}
                      />
                    </div>
                  ))}

                  {regMsg && (
                    <div style={{
                      background: regMsg.ok ? "#dcfce7" : "#fee2e2",
                      color:      regMsg.ok ? "#15803d" : "#b91c1c",
                      borderRadius:8, padding:"10px 14px", fontSize:13,
                      marginBottom:14,
                    }}>
                      {regMsg.ok ? "✅ " : "⚠️ "}{regMsg.text}
                    </div>
                  )}

                  <button onClick={handleRegister} disabled={regLoading} style={btn(true)}>
                    {regLoading ? "⏳ Mendaftar..." : "📝 Daftar Akun"}
                  </button>

                  {regMsg?.ok && (
                    <button onClick={() => setTab("login")} style={{ ...btn(false), marginTop:8 }}>
                      Lanjut ke Login →
                    </button>
                  )}
                </>
              )}

            </div>
          </div>
        </div>
      );
    }


    // ════════════════════════════════════════════════════════════
    //  [ADMIN-03] KOMPONEN: AdminBadge
    //  Badge di header jika sudah login — tampilkan nama + tombol logout
    // ════════════════════════════════════════════════════════════
    function AdminBadge({ session, onLogout }) {
      const [loading, setLoading] = useState(false);
      const [expand,  setExpand]  = useState(false);

      const LEVEL_COLOR = {
        super:  { bg:"#fef9c3", color:"#a16207" },
        editor: { bg:"#dcfce7", color:"#15803d" },
        viewer: { bg:"#f3f4f6", color:"#6b7280" },
      };
      const lc = LEVEL_COLOR[session.level] || LEVEL_COLOR.viewer;

      const handleLogout = async () => {
        setLoading(true);
        try {
          await fetch(WEBAPP_URL, {
            method:  "POST",
            headers: { "Content-Type": "text/plain" },
            body:    JSON.stringify({ action: "logout", token: session.token }),
          });
        } catch(e) { /* ignore network error saat logout */ }
        sessionStorage.removeItem("albumMasjidAdmin");
        onLogout();
        setLoading(false);
      };

      const LEVEL_LABEL = { super:"👑 Super", editor:"✏️ Editor", viewer:"👁 Viewer" };

      return (
        <div style={{ position:"relative" }}>
          <button onClick={() => setExpand(!expand)} style={{
            display:"flex", alignItems:"center", gap:7,
            padding:"6px 12px", borderRadius:24,
            border:"1px solid rgba(212,168,83,.4)",
            background:"rgba(212,168,83,.15)", cursor:"pointer",
            fontFamily:"'DM Sans',sans-serif",
          }}>
            <span style={{ fontSize:16 }}>🛡️</span>
            <span style={{ fontSize:11, fontWeight:600, color:"#D4A853",
              maxWidth:100, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>
              {session.nama.split(" ")[0]}
            </span>
            <span style={{ fontSize:10, color:"rgba(212,168,83,.7)" }}>▾</span>
          </button>

          {expand && (
            <div style={{
              position:"absolute", top:"calc(100% + 8px)", right:0,
              background:"white", borderRadius:14, minWidth:200,
              boxShadow:"0 8px 32px rgba(0,0,0,.15)",
              border:"1px solid #e2d9c8", zIndex:1000,
              overflow:"hidden", animation:"fadeIn .15s ease",
            }}>
              {/* Info user */}
              <div style={{ padding:"14px 16px", borderBottom:"1px solid #e2d9c8" }}>
                <div style={{ fontSize:13, fontWeight:700, color:"#1a1a1a",
                  marginBottom:4 }}>{session.nama}</div>
                <span style={{ ...lc, fontSize:11, fontWeight:600,
                  padding:"2px 8px", borderRadius:20, display:"inline-block" }}>
                  {LEVEL_LABEL[session.level] || session.level}
                </span>
                {session.desa && (
                  <div style={{ fontSize:11, color:"#9ca3af", marginTop:4 }}>
                    Desa: {Array.isArray(session.desa) ? session.desa.join(", ") : session.desa}
                  </div>
                )}
              </div>

              {/* Waktu login */}
              <div style={{ padding:"8px 16px", borderBottom:"1px solid #e2d9c8",
                fontSize:11, color:"#9ca3af" }}>
                Login: {new Date(session.loginAt).toLocaleTimeString("id-ID",
                  { hour:"2-digit", minute:"2-digit" })}
                {" · sesi berakhir "}
                {new Date(session.loginAt + 8*3600*1000).toLocaleTimeString("id-ID",
                  { hour:"2-digit", minute:"2-digit" })}
              </div>

              {/* Tombol logout */}
              <button onClick={handleLogout} disabled={loading}
                style={{ width:"100%", padding:"12px 16px", border:"none",
                  background:"none", cursor: loading ? "not-allowed" : "pointer",
                  textAlign:"left", fontSize:13, color:"#b91c1c", fontWeight:500,
                  fontFamily:"'DM Sans',sans-serif", display:"flex",
                  alignItems:"center", gap:8,
                  opacity: loading ? .6 : 1,
                }}>
                {loading ? "⏳" : "🚪"} {loading ? "Keluar..." : "Keluar (Logout)"}
              </button>
            </div>
          )}

          {/* Klik luar untuk tutup dropdown */}
          {expand && (
            <div onClick={() => setExpand(false)}
              style={{ position:"fixed", inset:0, zIndex:999 }}/>
          )}
        </div>
      );
    }



    // ════════════════════════════════════════════════════════════
    //  APP UTAMA
    // ════════════════════════════════════════════════════════════
    function AlbumMasjid() {
      const { data, loading, error, lastSync, refetch } = useSheetData();
      const [tab,          setTab]          = useState("album");
      const [selected,     setSelected]     = useState(null);
      // [ADMIN-03] State admin session
      const [adminSession, setAdminSession] = useState(null);
      const [showLogin,    setShowLogin]    = useState(false);

      // [ADMIN-03] Pulihkan session dari sessionStorage saat mount
      useEffect(() => {
        try {
          const saved = sessionStorage.getItem("albumMasjidAdmin");
          if (saved) {
            const session = JSON.parse(saved);
            const expiry = session.loginAt + 8 * 3600 * 1000;
            if (Date.now() < expiry) {
              setAdminSession(session);
            } else {
              sessionStorage.removeItem("albumMasjidAdmin");
            }
          }
        } catch(e) { /* ignore */ }
      }, []);

      const totalMasjid    = data.filter(m => !m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")).length;
      const totalMusholla  = data.filter(m =>  m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")).length;
      const perluPerhatian = data.filter(m => m.kondisiBgn?.includes("Rusak")).length;

      const tabs = [
        { id:"album",     icon:"🗂️",  label:"Album"     },
        { id:"peta",      icon:"🗺️",  label:"Peta"      },
        { id:"statistik", icon:"📊",  label:"Statistik" },
        { id:"kiblat",    icon:"🧭",  label:"Kiblat"    },
      ];

      return (
        <div style={{ minHeight:"100vh", background:"var(--krem)" }}>

          {/* ── HEADER ──────────────────────────────────── */}
          <header style={{ background:"#1B4332", position:"sticky", top:0, zIndex:500,
            boxShadow:"0 2px 20px rgba(27,67,50,.4)" }}>
            <div style={{ height:3, background:
              "repeating-linear-gradient(90deg,#D4A853 0,#D4A853 8px,transparent 8px,transparent 16px,#D4A853 16px,#D4A853 22px,transparent 22px,transparent 30px)" }}/>
            <div style={{ maxWidth:1120, margin:"0 auto", padding:"10px 20px",
              display:"flex", alignItems:"center", gap:12, flexWrap:"wrap" }}>
              <div style={{ display:"flex", alignItems:"center", gap:10, flex:1, minWidth:160 }}>
                <div style={{ width:38, height:38, borderRadius:10,
                  background:"rgba(212,168,83,.2)", border:"1px solid rgba(212,168,83,.35)",
                  display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>🕌</div>
                <div>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:15,
                    fontWeight:700, color:"white", lineHeight:1.1 }}>Album Masjid</div>
                  <div style={{ fontSize:10, color:"rgba(212,168,83,.8)", letterSpacing:".5px" }}>
                    KEC. PILANGKENCENG · KAB. MADIUN
                  </div>
                </div>
              </div>

              {/* Tab Navigasi */}
              <div style={{ display:"flex", gap:4, background:"rgba(255,255,255,.1)",
                borderRadius:24, padding:4, flexWrap:"wrap" }}>
                {tabs.map(t => (
                  <button key={t.id} onClick={() => setTab(t.id)} style={{
                    padding:"6px 16px", borderRadius:20, border:"none", cursor:"pointer",
                    fontSize:12, fontWeight:600, transition:"all .2s",
                    background: tab===t.id ? "#D4A853" : "transparent",
                    color: tab===t.id ? "#1B4332" : "rgba(255,255,255,.8)"
                  }}>{t.icon} {t.label}</button>
                ))}
              </div>

              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                {lastSync && !loading && (
                  <span style={{ fontSize:11, color:"rgba(255,255,255,.5)" }}>
                    🔄 {lastSync.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})}
                  </span>
                )}
                <button onClick={refetch} disabled={loading} style={{
                  padding:"6px 12px", borderRadius:24,
                  border:"1px solid rgba(255,255,255,.2)",
                  background:"rgba(255,255,255,.08)", color:"rgba(255,255,255,.8)",
                  cursor: loading ? "not-allowed" : "pointer", fontSize:12,
                  fontFamily:"'DM Sans',sans-serif",
                }}>{loading ? "⏳" : "🔄"} Sinkron</button>

                {/* [ADMIN-03] Tombol Admin / Badge jika sudah login */}
                {adminSession ? (
                  <AdminBadge
                    session={adminSession}
                    onLogout={() => setAdminSession(null)}
                  />
                ) : (
                  <button onClick={() => setShowLogin(true)} style={{
                    padding:"6px 12px", borderRadius:24,
                    border:"1px solid rgba(212,168,83,.4)",
                    background:"rgba(212,168,83,.1)", color:"rgba(212,168,83,.9)",
                    cursor:"pointer", fontSize:12, fontWeight:500,
                    fontFamily:"'DM Sans',sans-serif", transition:"all .2s",
                  }}>🔐 Admin</button>
                )}
              </div>
            </div>
          </header>

          {/* ── MAIN ─────────────────────────────────────── */}
          <main style={{ maxWidth:1120, margin:"0 auto", padding:"20px" }}>
            {tab === "album" && (
              <>
                <div style={{ display:"flex", justifyContent:"space-between",
                  alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
                  <div>
                    <div style={{ fontFamily:"'Playfair Display',serif", fontSize:19,
                      fontWeight:700, color:"#1B4332" }}>Direktori Masjid & Musholla</div>
                    <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>
                      {loading ? "Memuat data..." : `${data.length} data terverifikasi`}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:12, fontSize:12 }}>
                    <span style={{ color:"#1B4332", fontWeight:500 }}>🕌 {totalMasjid} Masjid</span>
                    <span style={{ color:"#6b7280" }}>🏠 {totalMusholla} Musholla</span>
                    {perluPerhatian > 0 && (
                      <span style={{ color:"#c2410c", fontWeight:500 }}>⚠️ {perluPerhatian} Perlu Perhatian</span>
                    )}
                  </div>
                </div>
                <TabAlbum data={data} loading={loading} error={error} onSelect={setSelected}/>
              </>
            )}
            {tab === "peta"      && <TabPeta      data={data} onSelect={setSelected}/>}
            {tab === "statistik" && <TabStatistik data={data}/>}
            {tab === "kiblat"    && <TabKiblat/>}

            <div style={{ marginTop:40, paddingTop:16, borderTop:"1px solid #e8e0d0",
              textAlign:"center", fontSize:11, color:"#9ca3af", lineHeight:1.8 }}>
              Direktori Masjid & Musholla · Kecamatan Pilangkenceng, Kabupaten Madiun<br/>
              Kerjasama: KUA Kec. Pilangkenceng · BKM · PW DMI · APRI & IPARI · Kanwil Kemenag Jatim
            </div>
          </main>

          {selected && (
            <ModalDetail
              masjid={selected}
              onClose={() => setSelected(null)}
              onCetak={m => { setSelected(null); setTimeout(() => cetakProfil(m), 300); }}
              adminSession={adminSession}
              onDataUpdated={(updated) => {
                setSelected(prev => ({ ...prev, ...updated }));
              }}
            />
          )}

          {/* [ADMIN-03] Modal login admin */}
          {showLogin && (
            <AdminLoginModal
              onClose={() => setShowLogin(false)}
              onLoginSuccess={(session) => setAdminSession(session)}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AlbumMasjid/>);
  </script>
</body>
</html>
