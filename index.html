    // ════════════════════════════════════════════════════════════
    //  HELPER
    // ════════════════════════════════════════════════════════════
    const cv = (row, idx) => {
      const v = row[idx];
      if (v === undefined || v === null) return "";
      return String(v).trim();
    };

    const gabung = (row, idxList) =>
      idxList.map(i => cv(row, i)).filter(Boolean).join(", ");

    // Konversi URL Google Drive ke format thumbnail yang bisa ditampilkan sebagai <img>
    const fixImgUrl = (url) => {
      if (!url) return "";
      url = url.trim();
      // Format: https://drive.google.com/file/d/FILE_ID/view
      let m = url.match(/\/file\/d\/([^/\?]+)/);
      if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w600`;
      // Format: https://drive.google.com/open?id=FILE_ID
      m = url.match(/[?&]id=([^&]+)/);
      if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w600`;
      // Format: https://lh3.googleusercontent.com/... atau sudah berupa URL gambar langsung
      return url;
    };

    // Konversi semua URL dalam string yang dipisah koma
    const fixImgUrls = (urlString) =>
      (urlString || "").split(",").map(u => fixImgUrl(u.trim())).filter(Boolean).join(",");

    // Parse koordinat dari dua kolom terpisah (KOORDINAT_LS & KOORDINAT_BT) → [lat, lng]
    const parseLatLng = (ls, bt) => {
      const lat = parseFloat(ls);
      const lng = parseFloat(bt);
      if (isNaN(lat) || isNaN(lng)) return null;
      if (lat < -8.5 || lat > -6.5 || lng < 110.5 || lng > 112.5) return null;
      // Lintang Selatan = nilai negatif; jika input positif, negasikan
      const latFix = lat > 0 ? -lat : lat;
      return [latFix, lng];
    };

    // ════════════════════════════════════════════════════════════
    //  MAPPER row → objek masjid
    //  🔒 waKetua, waSekretaris, waKetuaRemaja TIDAK disertakan
    // ════════════════════════════════════════════════════════════
    const rowToMasjid = (row, id) => {
      const ls = cv(row, IDX.KOORDINAT_LS);
      const bt = cv(row, IDX.KOORDINAT_BT);
      const latLng = parseLatLng(ls, bt);
      // Koordinat gabungan untuk tampil & cetak
      const koordinatGabung = ls && bt ? `LS: ${ls}  |  BT: ${bt}` : "";
      return {
        id,
        latLng,
        koordinatGabung,
        timestamp:          cv(row, IDX.TIMESTAMP),
        lokasiSurvey:       cv(row, IDX.LOKASI_SURVEY),
        idSimas:            cv(row, IDX.ID_SIMAS),

        skLevel:            cv(row, IDX.SK_LEVEL),

        jamaahSubuh:        cv(row, IDX.JAMAAH_SUBUH),

        urlFotoKiblat:      fixImgUrls(cv(row, IDX.URL_FOTO_SERTIF_KIBLAT)),
        jumlahFoto:         cv(row, IDX.JUMLAH_FOTO),
        statusProses:       cv(row, IDX.STATUS_PROSES),
        fotoUtama:          fixImgUrl(cv(row, IDX.URL_FOTO_DEPAN).split(",")[0].trim()),
      };

    // ════════════════════════════════════════════════════════════
    //  HOOK: FETCH DATA
    // ════════════════════════════════════════════════════════════
    function useSheetData() {
      const [data,     setData]     = useState([]);
      const [loading,  setLoading]  = useState(true);
      const [error,    setError]    = useState(null);
      const [lastSync, setLastSync] = useState(null);

      const fetchData = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const range = encodeURIComponent(`${SHEETS_CONFIG.SHEET_NAME}!A2:DP`);
          const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_CONFIG.SPREADSHEET_ID}/values/${range}?key=${SHEETS_CONFIG.API_KEY}`;
          const res   = await fetch(url);
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err?.error?.message || "Gagal mengambil data dari Sheets");
          }
          const json = await res.json();
          const rows = (json.values || []).map((row, i) => rowToMasjid(row, i + 1))
                         .filter(m => !m.statusProses || m.statusProses === "Selesai");
          setData(rows);
          setLastSync(new Date());
        } catch(e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchData(); }, [fetchData]);
      return { data, loading, error, lastSync, refetch: fetchData };
    }

    // ════════════════════════════════════════════════════════════

    const KS = {
      "Baik":         { bg:"#dcfce7", color:"#15803d", dot:"#22c55e" },

      "Rusak Ringan": { bg:"#ffedd5", color:"#c2410c", dot:"#f97316" },
      "Rusak Berat":  { bg:"#fee2e2", color:"#b91c1c", dot:"#ef4444" },
    };
    function KondisiBadge({ kondisi }) {
      const s = KS[kondisi] || { bg:"#f3f4f6", color:"#6b7280", dot:"#9ca3af" };
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:5,
          background:s.bg, color:s.color, fontSize:11, fontWeight:600,
          padding:"3px 9px", borderRadius:20 }}>
          <span style={{ width:6, height:6, borderRadius:"50%", background:s.dot, display:"inline-block" }}/>
          {kondisi || "—"}
        </span>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  KOMPONEN: FIELD ROW
    // ════════════════════════════════════════════════════════════
    function FR({ label, value, mono=false, full=false }) {
      if (!value) return null;
      return (
        <div style={{ display:"flex", gap:10, marginBottom:7, alignItems:"flex-start",
          flexDirection: full ? "column" : "row" }}>
          <span style={{ fontSize:12, color:"#9ca3af", minWidth: full ? 0 : 140,
            flexShrink:0, paddingTop:1 }}>{label}</span>
          <span style={{ fontSize:13, color:"#1a1a1a", lineHeight:1.5, flex:1,
            fontFamily: mono ? "'Courier New',monospace" : "inherit",
            wordBreak:"break-word" }}>{value}</span>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  KOMPONEN: ACCORDION
    // ════════════════════════════════════════════════════════════
    function AccordionSeksi({ icon, judul, badge, children, defaultOpen=false }) {
      const [open, setOpen] = useState(defaultOpen);
      return (
        <div style={{ borderBottom:"1px solid #e2d9c8" }}>
          <button onClick={() => setOpen(!open)} style={{
            width:"100%", display:"flex", alignItems:"center", gap:12,
            padding:"14px 20px", background: open ? "#f8f4ed" : "white",
            border:"none", cursor:"pointer", textAlign:"left", transition:"background .2s",
          }}>
            <span style={{ width:32, height:32, borderRadius:"50%", flexShrink:0,
              background: open ? "#1B4332" : "#f0e8d8",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:15, transition:"background .2s" }}>{icon}</span>
            <span style={{ flex:1, fontFamily:"'Playfair Display',serif",
              fontSize:14, fontWeight:700, color:"#1B4332" }}>{judul}</span>
            {badge && <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20,
              background:"#e8f5e9", color:"#1B4332", fontWeight:600, marginRight:6 }}>{badge}</span>}
            <span style={{ color:"#1B4332", transform: open?"rotate(180deg)":"rotate(0deg)",
              transition:"transform .25s", fontSize:12 }}>▼</span>
          </button>
          <div style={{ maxHeight: open ? 2000 : 0, overflow:"hidden", transition:"max-height .4s ease" }}>
            <div style={{ padding:"4px 20px 18px 64px" }}>{children}</div>
          </div>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  KOMPONEN: FOTO GRID (Galeri 2 kolom)
    // ════════════════════════════════════════════════════════════
    function FotoGrid({ label, urlString, icon }) {
      const [lightbox, setLightbox] = useState(null);
      const urls = (urlString || "").split(",").map(u => u.trim()).filter(Boolean);
      if (urls.length === 0) return null;

      // Layout: 1 foto → full width, 2+ foto → 2 kolom
      const cols = urls.length === 1 ? 1 : 2;

      return (
        <div style={{ marginBottom:16 }}>
          <div style={{ fontSize:12, color:"#9ca3af", marginBottom:8, display:"flex", alignItems:"center", gap:6 }}>
            <span>{icon} {label}</span>
            <span style={{ background:"#f0e8d8", color:"#1B4332", fontWeight:700,
              fontSize:10, borderRadius:20, padding:"1px 7px" }}>{urls.length} foto</span>
          </div>
          <div style={{ display:"grid", gridTemplateColumns:`repeat(${cols},1fr)`, gap:6 }}>
            {urls.map((url, i) => (
              <div key={i} onClick={() => setLightbox(i)}
                style={{ position:"relative", borderRadius:10, overflow:"hidden",
                  aspectRatio: urls.length === 1 ? "16/9" : "1",
                  background:"#f3f4f6", border:"1px solid #e5e7eb", cursor:"zoom-in" }}>
                <img src={url} alt={label + " " + (i+1)}
                  style={{ width:"100%", height:"100%", objectFit:"cover",
                    transition:"transform .3s ease" }}
                  onMouseEnter={e => e.target.style.transform="scale(1.05)"}
                  onMouseLeave={e => e.target.style.transform="scale(1)"}
                  onError={e => { e.target.parentNode.style.background="#f0e8d8";
                    e.target.style.display="none"; }}
                />
                <div style={{ position:"absolute", bottom:4, right:6,
                  fontSize:10, color:"rgba(255,255,255,.85)",
                  textShadow:"0 1px 3px rgba(0,0,0,.6)" }}>
                  {i+1}/{urls.length}
                </div>
              </div>
            ))}
          </div>

          {/* Lightbox */}
          {lightbox !== null && (
            <div onClick={() => setLightbox(null)}
              style={{ position:"fixed", inset:0, zIndex:2000,
                background:"rgba(0,0,0,.92)", display:"flex",
                alignItems:"center", justifyContent:"center", padding:16 }}>
              <button onClick={e => { e.stopPropagation(); setLightbox(l => l > 0 ? l-1 : urls.length-1); }}
                style={{ position:"absolute", left:16, top:"50%", transform:"translateY(-50%)",
                  background:"rgba(255,255,255,.15)", border:"none", color:"white",
                  width:44, height:44, borderRadius:"50%", fontSize:20, cursor:"pointer" }}>‹</button>
              <img src={urls[lightbox]} alt={label}
                style={{ maxWidth:"90vw", maxHeight:"88vh", borderRadius:12,
                  objectFit:"contain", boxShadow:"0 24px 64px rgba(0,0,0,.6)" }}
                onClick={e => e.stopPropagation()}
              />
              <button onClick={e => { e.stopPropagation(); setLightbox(l => l < urls.length-1 ? l+1 : 0); }}
                style={{ position:"absolute", right:16, top:"50%", transform:"translateY(-50%)",
                  background:"rgba(255,255,255,.15)", border:"none", color:"white",
                  width:44, height:44, borderRadius:"50%", fontSize:20, cursor:"pointer" }}>›</button>
              <div style={{ position:"absolute", bottom:20, left:"50%", transform:"translateX(-50%)",
                fontSize:12, color:"rgba(255,255,255,.6)", background:"rgba(0,0,0,.4)",
                padding:"4px 12px", borderRadius:20 }}>
                {icon} {label} · {lightbox+1} / {urls.length}
              </div>
              <button onClick={() => setLightbox(null)}
                style={{ position:"absolute", top:16, right:16,
                  background:"rgba(255,255,255,.15)", border:"none", color:"white",
                  width:36, height:36, borderRadius:"50%", fontSize:18, cursor:"pointer" }}>×</button>
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  FUNGSI CETAK PROFIL (tanpa PDF)
    // ════════════════════════════════════════════════════════════
    function cetakProfil(masjid) {
      const tgl = new Date().toLocaleDateString("id-ID", {
        weekday:"long", year:"numeric", month:"long", day:"numeric"
      });
      const isMusholla = masjid.lokasiSurvey?.toUpperCase().includes("MUSHOLLA");
      const r = (label, value) => value ? `
        <tr>
          <td style="padding:5px 10px;font-size:12px;color:#6b7280;width:160px;vertical-align:top;">${label}</td>
          <td style="padding:5px 10px;font-size:12px;color:#1a1a1a;">: ${value}</td>
        </tr>` : "";
      const s = (judul, isi) => `
        <div style="margin-bottom:16px;">
          <div style="background:#1B4332;color:white;padding:5px 12px;font-size:12px;font-weight:700;border-radius:6px;margin-bottom:6px;">${judul}</div>
          <table style="width:100%;border-collapse:collapse;">${isi}</table>
        </div>`;

      const koordinatTeks = masjid.koordinatLS && masjid.koordinatBT
        ? `LS: ${masjid.koordinatLS}  |  BT: ${masjid.koordinatBT}` : "";

      const html = `
        <style>
          @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap');
          body{font-family:'DM Sans',sans-serif;color:#1a1a1a;}
          @media print{@page{size:A4;margin:15mm;}}
        </style>
        <div style="max-width:720px;margin:0 auto;">
          <div style="background:#1B4332;color:white;padding:20px 24px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;gap:16px;">
            <div style="font-size:48px;">🕌</div>
            <div>
              <div style="font-size:10px;color:#D4A853;font-weight:700;letter-spacing:1px;margin-bottom:4px;">
                PROFIL ${isMusholla?"MUSHOLLA":"MASJID"} · KEC. PILANGKENCENG, KAB. MADIUN
              </div>
              <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.2;">${masjid.namaMasjid}</div>
              <div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:4px;">${masjid.desa} · Dicetak: ${tgl}</div>
            </div>
          </div>
          ${s("IDENTITAS & LOKASI",
            r("Nama", masjid.namaMasjid) +
            r("Jenis", [masjid.lokasiSurvey, masjid.tipologi].filter(Boolean).join(" — ")) +
            r("ID SIMAS", masjid.idSimas) +
            r("Afiliasi", masjid.afiliasi) +
            r("Tahun Berdiri", masjid.tahunBerdiri) +
            r("Desa", masjid.desa) +
            r("Alamat", masjid.alamat) +
            r("Koordinat GPS", koordinatTeks) +
            r("Email", masjid.email) +
            r("Media Sosial", masjid.medsos)
          )}
          ${s("ADMINISTRASI",
            r("SK Takmir", masjid.skTakmir) +
            r("Diketahui oleh", masjid.skLevel) +
            r("Luas Tanah", masjid.luasTanah ? masjid.luasTanah+" m²" : "") +
            r("Luas Bangunan", masjid.luasBangunan ? masjid.luasBangunan+" m²" : "") +
            r("Daya Tampung", masjid.dayaTampung ? masjid.dayaTampung+" orang" : "")
          )}
          ${s("PENGURUS & PETUGAS",
            r("Ketua Takmir", masjid.namaKetua) +
            r("Sekretaris", masjid.namaSekretaris) +
            r("Pengurus Lain", masjid.pengurusLain) +
            r("Imam", masjid.namaImamGabung) +
            r("Muadzin", masjid.namaMuadzinGabung) +
            r("Khotib", masjid.namaKhotibGabung) +
            r("Marbot", masjid.namaMarbotGabung)
          )}
          ${s("DATA JAMAAH & IBADAH",
            r("Total Jamaah", masjid.jamaahTotal ? masjid.jamaahTotal+" orang" : "") +
            r("Jamaah Jumat", masjid.jamaahJumat ? "±"+masjid.jamaahJumat+" orang" : "") +
            r("Maghrib/Isya", masjid.jamaahMaghrib ? "±"+masjid.jamaahMaghrib+" orang" : "") +
            r("Dhuhur/Ashar", masjid.jamaahDhuhur ? "±"+masjid.jamaahDhuhur+" orang" : "") +
            r("Subuh", masjid.jamaahSubuh ? "±"+masjid.jamaahSubuh+" orang" : "") +
            r("Remaja Masjid", masjid.jumlahRemaja ? masjid.jumlahRemaja+" orang — Ketua: "+masjid.namaKetuaRemaja : "") +
            r("Majelis Taklim", masjid.namaMajelis ? masjid.namaMajelis+(masjid.namaMajelis2 ? "; "+masjid.namaMajelis2 : "") : "")
          )}
          ${s("STATUS TANAH & WAKAF",
            r("Status Tanah", masjid.statusTanah) +
            r("Nomor Sertifikat", masjid.nomorSertifWakaf) +
            r("Tgl. Sertifikat", masjid.tglSertifWakaf) +
            r("No. AIW", masjid.nomorAIW) +
            r("Tgl. AIW", masjid.tglAIW) +
            r("Nama Wakif", masjid.namaWakif) +
            r("Nama Nadzir", masjid.namaNadzir) +
            r("Wakaf Produktif", masjid.wakafProduktif) +
            r("Usaha Produktif", masjid.usahaProduktif)
          )}
          ${s("FASILITAS & KONDISI",
            r("Kondisi Bangunan", masjid.kondisiBgn) +
            r("Kalibrasi Kiblat", masjid.kiblat) +
            r("No. Sertif. Kiblat", masjid.nomorSertifKiblat) +
            r("Aula / R. Rapat", masjid.aula) +
            r("Perpustakaan", masjid.perpustakaan) +
            r("TPQ Anak-Remaja", masjid.tpqAnak) +
            r("TPQ Dewasa", masjid.tpqDewasa) +
            r("Program Sosial", masjid.programSosial) +
            r("Rekening Bantuan", masjid.rekening) +
            r("WA Bantuan", masjid.waBantuan)
          )}
          ${s("SURVEYOR", r("Nama Surveyor", masjid.namaSurveyor))}
          <div style="margin-top:24px;padding-top:14px;border-top:2px solid #e2d9c8;font-size:10px;color:#9ca3af;text-align:center;line-height:1.8;">
            Direktori Masjid & Musholla · Kecamatan Pilangkenceng, Kabupaten Madiun<br/>
            Kerjasama: KUA Kec. Pilangkenceng · BKM · PW DMI · APRI & IPARI · Kanwil Kemenag Jatim
          </div>
        </div>`;

      const pa = document.getElementById("print-area");
      pa.innerHTML = html;
      pa.style.display = "block";
      window.print();
      setTimeout(() => { pa.style.display = "none"; pa.innerHTML = ""; }, 1500);
    }

    // ════════════════════════════════════════════════════════════
    //  KOMPONEN: MODAL DETAIL
    // ════════════════════════════════════════════════════════════
    function ModalDetail({ masjid, onClose, onCetak }) {
      if (!masjid) return null;
      const isMusholla     = masjid.lokasiSurvey?.toUpperCase().includes("MUSHOLLA");
      const wakafBersertif = masjid.statusTanah?.includes("Bersertifikat") || !!masjid.nomorSertifWakaf;
      const adaRemaja      = !!masjid.jumlahRemaja || !!masjid.namaKetuaRemaja;
      const adaMajelis     = !!masjid.namaMajelis;
      const adaMajelis2    = !!masjid.namaMajelis2;
      const koordinatLink  = masjid.linkGmaps ||
        (masjid.koordinatBT && masjid.koordinatLS
          ? `https://maps.google.com/?q=${masjid.koordinatLS},${masjid.koordinatBT}`
          : null);

      // Subfolder foto: FOLDER_URL mengarah ke folder masjid; subfolder foto ada di dalamnya
      // Link ke Drive menampilkan subfolder foto langsung jika ada (Apps Script membuat subfolder "foto_masjid")
      const fotoFolderUrl = masjid.folderUrl
        ? masjid.folderUrl + "?usp=sharing"
        : null;

      return (
        <div onClick={onClose} style={{
          position:"fixed", inset:0, zIndex:1000,
          background:"rgba(15,30,20,0.65)", backdropFilter:"blur(6px)",
          display:"flex", alignItems:"flex-start", justifyContent:"center",
          padding:"16px", overflowY:"auto",
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            width:"100%", maxWidth:700, background:"white",
            borderRadius:18, overflow:"hidden", margin:"auto",
            boxShadow:"0 32px 80px rgba(0,0,0,.3)",
            animation:"fadeIn .25s ease", fontFamily:"'DM Sans',sans-serif",
          }}>

            {/* ── Header Foto ─────────────────────────────── */}
            <div style={{ position:"relative", height:220, background:"#1B4332", overflow:"hidden" }}>
              {masjid.fotoUtama ? (
                <img src={masjid.fotoUtama} alt={masjid.namaMasjid}
                  style={{ width:"100%", height:"100%", objectFit:"cover", opacity:.7 }}
                  onError={e => { e.target.style.display="none"; }}
                />
              ) : (
                <div style={{ display:"flex", alignItems:"center",
                  justifyContent:"center", height:"100%", fontSize:64, opacity:.2 }}>🕌</div>
              )}
              <div style={{ position:"absolute", inset:0,
                background:"linear-gradient(to top,rgba(27,67,50,.95) 0%,rgba(27,67,50,.3) 60%,transparent 100%)"
              }}/>
              <div style={{ position:"absolute", top:12, right:12, display:"flex", gap:8 }}>
                <button onClick={() => onCetak(masjid)} style={{
                  padding:"5px 12px", borderRadius:20,
                  background:"rgba(212,168,83,.9)", border:"none",
                  color:"#1B4332", cursor:"pointer", fontSize:11, fontWeight:700
                }}>🖨️ Cetak Profil</button>
                <button onClick={onClose} style={{
                  width:32, height:32, borderRadius:"50%",
                  background:"rgba(255,255,255,.15)", border:"1px solid rgba(255,255,255,.2)",
                  color:"white", cursor:"pointer", fontSize:16,
                  display:"flex", alignItems:"center", justifyContent:"center"
                }}>×</button>
              </div>
              <div style={{ position:"absolute", bottom:0, left:0, right:0, padding:"0 20px 18px" }}>
                <div style={{ fontSize:10, color:"#D4A853", fontWeight:700,
                  letterSpacing:"1px", marginBottom:4 }}>
                  {isMusholla ? "MUSHOLLA" : "MASJID"}
                  {masjid.tipologi ? " · " + masjid.tipologi.toUpperCase() : ""}
                </div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20,
                  fontWeight:700, color:"white", lineHeight:1.2, marginBottom:4 }}>
                  {masjid.namaMasjid}
                </div>
                <div style={{ fontSize:12, color:"rgba(255,255,255,.75)" }}>
                  📍 {masjid.desa}, Kec. {masjid.kecamatan}, {masjid.kabkota}
                </div>
              </div>
            </div>

            {/* ── Statistik Ringkas ─────────────────────── */}
            <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)",
              borderBottom:"1px solid #e2d9c8" }}>
              {[
                { lbl:"Berdiri",      val: masjid.tahunBerdiri || "—" },
                { lbl:"Jamaah Jumat", val: masjid.jamaahJumat ? "±"+masjid.jamaahJumat : "—" },
                { lbl:"Kondisi",      val: <KondisiBadge kondisi={masjid.kondisiBgn}/> },

                <div key={i} style={{ padding:"12px 10px", textAlign:"center",
                  borderRight: i<3 ? "1px solid #e2d9c8" : "none" }}>
                  <div style={{ fontSize:10, color:"#9ca3af", marginBottom:3 }}>{s.lbl}</div>
                  <div style={{ fontSize:12, fontWeight:600, color:"#1B4332" }}>{s.val}</div>
                </div>
              ))}
            </div>

            {/* ── 1. Identitas & Lokasi ─────────────────── */}
            <AccordionSeksi icon="🕌" judul="Identitas & Lokasi" defaultOpen>
              <FR label="Nama"          value={masjid.namaMasjid}/>
              <FR label="Tipologi"      value={[masjid.lokasiSurvey, masjid.tipologi].filter(Boolean).join(" — ")}/>
              <FR label="ID SIMAS"      value={masjid.idSimas} mono/>
              <FR label="Afiliasi"      value={masjid.afiliasi}/>
              <FR label="Tahun Berdiri" value={masjid.tahunBerdiri}/>
              <FR label="Alamat"        value={masjid.alamat}/>
              {(masjid.koordinatBT || masjid.koordinatLS) && (
                <FR label="Koordinat GPS"
                  value={[masjid.koordinatLS && "LS: "+masjid.koordinatLS,
                          masjid.koordinatBT && "BT: "+masjid.koordinatBT].filter(Boolean).join("  |  ")}
                  mono/>
              )}
              {koordinatLink && (
                <div style={{ marginTop:4, marginBottom:8 }}>
                  <a href={koordinatLink} target="_blank" rel="noreferrer"
                    style={{ fontSize:12, color:"#1B4332", fontWeight:500,
                      textDecoration:"none", padding:"4px 10px",
                      background:"#e8f5e9", borderRadius:20, display:"inline-block" }}>
                    🗺️ Buka di Google Maps
                  </a>
                </div>
              )}
              <FR label="Email"        value={masjid.email}/>
              <FR label="Media Sosial" value={masjid.medsos}/>
            </AccordionSeksi>

            {/* ── 2. Administrasi ───────────────────────── */}
            <AccordionSeksi icon="📋" judul="Administrasi"
              badge={masjid.skTakmir && !masjid.skTakmir.includes("Tidak punya") ? "Ada SK" : null}>
              <FR label="SK Takmir"     value={masjid.skTakmir}/>
              <FR label="Diketahui oleh" value={masjid.skLevel}/>
              <FR label="Luas Tanah"    value={masjid.luasTanah    ? masjid.luasTanah    + " m²" : ""}/>
              <FR label="Luas Bangunan" value={masjid.luasBangunan ? masjid.luasBangunan + " m²" : ""}/>
              <FR label="Daya Tampung"  value={masjid.dayaTampung  ? masjid.dayaTampung  + " orang" : ""}/>
            </AccordionSeksi>

            {/* ── 3. Pengurus & Petugas ─────────────────── */}
            <AccordionSeksi icon="👥" judul="Pengurus & Petugas">
              <FR label="Ketua Takmir"  value={masjid.namaKetua}/>
              <FR label="Sekretaris"    value={masjid.namaSekretaris}/>
              <FR label="Pengurus Lain" value={masjid.pengurusLain} full/>
              {masjid.jumlahImam    && <FR label={`Imam (${masjid.jumlahImam})`}    value={masjid.namaImamGabung}    full/>}
              {masjid.jumlahMuadzin && <FR label={`Muadzin (${masjid.jumlahMuadzin})`} value={masjid.namaMuadzinGabung} full/>}
              {masjid.jumlahKhotib  && <FR label={`Khotib (${masjid.jumlahKhotib})`}  value={masjid.namaKhotibGabung}  full/>}
              {masjid.jumlahMarbot  && <FR label={`Marbot (${masjid.jumlahMarbot})`}   value={masjid.namaMarbotGabung}  full/>}
            </AccordionSeksi>

            {/* ── 4. Data Jamaah & Ibadah ───────────────── */}
            <AccordionSeksi icon="📊" judul="Data Jamaah & Ibadah">
              {masjid.jamaahTotal && (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)",
                  gap:8, marginBottom:14 }}>
                  {[
                    { label:"Total Jamaah",   val: masjid.jamaahTotal + " org" },
                    { label:"Jamaah Jumat",   val: masjid.jamaahJumat   ? "±"+masjid.jamaahJumat   +" org" : "—" },
                    { label:"Maghrib / Isya", val: masjid.jamaahMaghrib ? "±"+masjid.jamaahMaghrib +" org" : "—" },
                    { label:"Dhuhur / Ashar", val: masjid.jamaahDhuhur  ? "±"+masjid.jamaahDhuhur  +" org" : "—" },
                    { label:"Subuh",          val: masjid.jamaahSubuh   ? "±"+masjid.jamaahSubuh   +" org" : "—" },
                  ].map((s,i) => (
                    <div key={i} style={{ background:"#f8faf8", borderRadius:8,
                      padding:"8px 12px", textAlign:"center" }}>
                      <div style={{ fontSize:10, color:"#9ca3af" }}>{s.label}</div>
                      <div style={{ fontSize:14, fontWeight:600, color:"#1B4332", marginTop:2 }}>{s.val}</div>
                    </div>
                  ))}
                </div>
              )}
              {adaRemaja && (
                <div style={{ marginTop:6, padding:"10px 12px", background:"#f8faf8",
                  borderRadius:8, marginBottom:8 }}>
                  <div style={{ fontSize:11, fontWeight:600, color:"#1B4332", marginBottom:6 }}>🌙 Remaja Masjid</div>
                  <FR label="Jumlah Anggota" value={masjid.jumlahRemaja ? masjid.jumlahRemaja+" orang" : ""}/>
                  <FR label="Ketua"          value={masjid.namaKetuaRemaja}/>
                  <FR label="Pengurus Lain"  value={masjid.pengurusRemajaLain} full/>
                </div>
              )}
              {adaMajelis && (
                <div style={{ marginTop:6, padding:"10px 12px", background:"#f8faf8",
                  borderRadius:8, marginBottom:8 }}>
                  <div style={{ fontSize:11, fontWeight:600, color:"#1B4332", marginBottom:6 }}>📚 Majelis Taklim</div>
                  <FR label="Nama Majelis" value={masjid.namaMajelis}/>
                  <FR label="Pengasuh"     value={masjid.namaPengasuh}/>
                  <FR label="Kitab Dikaji" value={masjid.kitabDikaji}/>
                  <FR label="Jamaah Rutin" value={masjid.jamaahRutin ? masjid.jamaahRutin+" orang" : ""}/>
                </div>
              )}
              {adaMajelis2 && (
                <div style={{ marginTop:6, padding:"10px 12px", background:"#f8faf8",
                  borderRadius:8, marginBottom:8 }}>
                  <div style={{ fontSize:11, fontWeight:600, color:"#1B4332", marginBottom:6 }}>📚 Majelis Taklim ke-2</div>
                  <FR label="Nama Majelis" value={masjid.namaMajelis2}/>
                  <FR label="Pengasuh"     value={masjid.namaPengasuh2}/>
                  <FR label="Kitab Dikaji" value={masjid.kitabDikaji2}/>
                  <FR label="Jamaah Rutin" value={masjid.jamaahRutin2 ? masjid.jamaahRutin2+" orang" : ""}/>
                </div>
              )}
            </AccordionSeksi>

            {/* ── 5. Status Tanah & Wakaf ───────────────── */}
            <AccordionSeksi icon="🏠" judul="Status Tanah & Wakaf"
              badge={wakafBersertif ? "✅ Bersertifikat" : null}>
              <FR label="Status Tanah"    value={masjid.statusTanah}/>
              <FR label="No. Sertifikat"  value={masjid.nomorSertifWakaf} mono/>
              <FR label="Tgl. Sertifikat" value={masjid.tglSertifWakaf}/>
              <FR label="No. AIW"         value={masjid.nomorAIW} mono/>
              <FR label="Tgl. AIW"        value={masjid.tglAIW}/>
              <FR label="Nama Wakif"      value={masjid.namaWakif}/>
              <FR label="Nama Nadzir"     value={masjid.namaNadzir}/>
              <FR label="Wakaf Produktif" value={masjid.wakafProduktif}/>
              <FR label="Usaha Produktif" value={masjid.usahaProduktif} full/>
            </AccordionSeksi>

            {/* ── 6. Fasilitas & Kegiatan ───────────────── */}
            <AccordionSeksi icon="🏗️" judul="Fasilitas & Kegiatan">
              <div style={{ marginBottom:10 }}><KondisiBadge kondisi={masjid.kondisiBgn}/></div>
              <FR label="Kalibrasi Kiblat"  value={masjid.kiblat}/>
              <FR label="No. Sertif Kiblat" value={masjid.nomorSertifKiblat} mono/>
              <FR label="Aula / R. Rapat"   value={masjid.aula}/>
              <FR label="Perpustakaan"      value={masjid.perpustakaan}/>

              <FotoGrid label="Foto Wudhu"        urlString={masjid.urlFotoWudhu}       icon="💧"/>
              <FotoGrid label="Foto WC"           urlString={masjid.urlFotoWC}          icon="🚿"/>
              <FotoGrid label="Foto Lainnya"      urlString={masjid.urlFotoLain}        icon="📸"/>
              <FotoGrid label="Sertifikat Wakaf"  urlString={masjid.urlFotoSertifWakaf} icon="📄"/>
              <FotoGrid label="Akta Ikrar Wakaf"  urlString={masjid.urlFotoAIW}         icon="📜"/>

          </div>
        </div>
      );

      return (
        <div onClick={() => onClick(masjid)}
          onMouseEnter={() => setHover(true)}
          onMouseLeave={() => setHover(false)}
          style={{
            background:"white", borderRadius:14, overflow:"hidden",
            cursor:"pointer", border:"1px solid #e8e0d0",
            boxShadow: hover ? "0 10px 32px rgba(27,67,50,.15)" : "0 2px 12px rgba(0,0,0,.06)",
            transform: hover ? "translateY(-4px)" : "translateY(0)",
            transition:"all .22s ease", fontFamily:"'DM Sans',sans-serif",
          }}>
          <div style={{ position:"relative", height:176, background:"#e8e0d0", overflow:"hidden" }}>
            {masjid.fotoUtama ? (
              <img src={masjid.fotoUtama} alt={masjid.namaMasjid}

              background:"rgba(27,67,50,.85)", backdropFilter:"blur(4px)",

              fontSize:10, fontWeight:700, color:"#D4A853", letterSpacing:".5px" }}>

            <div style={{ position:"absolute", top:10, right:10 }}>

    // ════════════════════════════════════════════════════════════
    //  TAB ALBUM
    // ════════════════════════════════════════════════════════════
    function TabAlbum({ data, loading, error, onSelect }) {
      const [search,        setSearch]        = useState("");
      const [filterDesa,    setFilterDesa]    = useState("");
      const [filterKlas,    setFilterKlas]    = useState("");
      const [filterKondisi, setFilterKondisi] = useState("");
      const [showFilter,    setShowFilter]    = useState(false);

      const desaList    = useMemo(() => [...new Set(data.map(m => m.desa).filter(Boolean))].sort(), [data]);
      const klasList    = useMemo(() => [...new Set(data.map(m => m.lokasiSurvey).filter(Boolean))].sort(), [data]);
      const kondisiList = ["Baik","Sedang","Rusak Ringan","Rusak Berat"];

      const filtered = useMemo(() => data.filter(m => {
        const q = search.toLowerCase();
        if (q && !m.namaMasjid.toLowerCase().includes(q)
               && !m.desa.toLowerCase().includes(q)
               && !m.idSimas.toLowerCase().includes(q)) return false;
        if (filterDesa    && m.desa         !== filterDesa)    return false;
        if (filterKlas    && m.lokasiSurvey !== filterKlas)    return false;
        if (filterKondisi && m.kondisiBgn   !== filterKondisi) return false;
        return true;
      }), [data, search, filterDesa, filterKlas, filterKondisi]);

      const af = [filterDesa, filterKlas, filterKondisi].filter(Boolean).length;
      const reset = () => { setSearch(""); setFilterDesa(""); setFilterKlas(""); setFilterKondisi(""); };

      return (
        <div>
          <div style={{ display:"flex", gap:10, marginBottom:12, flexWrap:"wrap", alignItems:"center" }}>
            <div style={{ position:"relative", flex:1, minWidth:200 }}>
              <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", fontSize:14 }}>🔍</span>
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Cari nama masjid, desa, atau ID SIMAS..."
                style={{ width:"100%", padding:"8px 12px 8px 32px", borderRadius:24,
                  border:"1px solid #e2d9c8", background:"white", fontSize:13, outline:"none", color:"#1a1a1a" }}/>
            </div>
            <button onClick={() => setShowFilter(!showFilter)} style={{
              padding:"8px 14px", borderRadius:24, border:"1px solid #e2d9c8",
              background: af > 0 ? "#1B4332" : "white", color: af > 0 ? "white" : "#1B4332",
              cursor:"pointer", fontSize:12, fontWeight:600
            }}>⚙ Filter {af > 0 && `(${af})`}</button>
          </div>
          {showFilter && (
            <div style={{ background:"white", borderRadius:12, padding:"12px 14px",
              marginBottom:12, border:"1px solid #e2d9c8",
              display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
              {[
                { label:"Desa",       value:filterDesa,    set:setFilterDesa,    opts:[["","Semua Desa"],       ...desaList.map(d=>[d,d])] },
                { label:"Klasifikasi",value:filterKlas,    set:setFilterKlas,    opts:[["","Semua Klasifikasi"],...klasList.map(k=>[k,k])] },
                { label:"Kondisi",    value:filterKondisi, set:setFilterKondisi, opts:[["","Semua Kondisi"],    ...kondisiList.map(k=>[k,k])] },
              ].map(f => (
                <div key={f.label} style={{ position:"relative" }}>
                  <span style={{ position:"absolute", right:10, top:"50%",
                    transform:"translateY(-50%)", fontSize:11, pointerEvents:"none", color:"#6b7280" }}>▼</span>
                  <select value={f.value} onChange={e => f.set(e.target.value)}
                    style={{ padding:"7px 28px 7px 12px", borderRadius:8, fontSize:13,
                      border:"1px solid #e8e0d0", background:"white", color:"#374151",
                      cursor:"pointer", outline:"none", minWidth:150 }}>
                    {f.opts.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                  </select>
                </div>
              ))}
              {af > 0 && (
                <button onClick={reset} style={{ padding:"7px 14px", borderRadius:8,
                  border:"1px solid #fca5a5", background:"#fef2f2",
                  color:"#dc2626", fontSize:13, cursor:"pointer", fontWeight:500 }}>✕ Reset</button>
              )}
            </div>
          )}
          <div style={{ fontSize:12, color:"#9ca3af", marginBottom:14 }}>
            Menampilkan <strong style={{ color:"#1B4332" }}>{filtered.length}</strong> dari {data.length} data
          </div>
          {error && (
            <div style={{ background:"#fef2f2", border:"1px solid #fca5a5",
              borderRadius:12, padding:"14px 18px", color:"#dc2626", fontSize:13, marginBottom:16 }}>
              <strong>Gagal memuat:</strong> {error}
            </div>
          )}
          {loading && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>
              {[1,2,3,4,5,6].map(i => (
                <div key={i} style={{ background:"white", borderRadius:14, overflow:"hidden", border:"1px solid #e8e0d0" }}>
                  <div style={{ height:176, background:"linear-gradient(90deg,#f0ebe0 25%,#e8e0d0 50%,#f0ebe0 75%)",
                    backgroundSize:"200% 100%", animation:"shimmer 1.5s infinite" }}/>
                  <div style={{ padding:"12px 14px" }}>
                    {[80,60,90].map((w,j) => (
                      <div key={j} style={{ height:12, background:"#f0ebe0", borderRadius:6, marginBottom:8, width:w+"%" }}/>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
          {!loading && !error && filtered.length === 0 && (
            <div style={{ textAlign:"center", padding:"60px 20px", color:"#9ca3af" }}>
              <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
              <div style={{ fontSize:16, fontWeight:500, marginBottom:4 }}>Tidak ditemukan</div>
              <button onClick={reset} style={{ marginTop:14, padding:"8px 20px",
                borderRadius:8, border:"none", background:"#1B4332",
                color:"white", fontSize:13, cursor:"pointer" }}>Reset</button>
            </div>
          )}
          {!loading && !error && filtered.length > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>
              {filtered.map(m => <KartuMasjid key={m.id} masjid={m} onClick={onSelect}/>)}
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  TAB PETA (Leaflet)
    //  Koordinat v3.9: KOORDINAT_BT & KOORDINAT_LS sudah terpisah
    // ════════════════════════════════════════════════════════════
    function TabPeta({ data, onSelect }) {
      const mapRef     = useRef(null);
      const leafletRef = useRef(null);
      const markersRef = useRef([]);

      const denganLL = useMemo(() => data.filter(m => m.latLng), [data]);
      const tanpaLL  = useMemo(() => data.filter(m => !m.latLng), [data]);

      // Init Leaflet map sekali
      useEffect(() => {
        if (!mapRef.current || leafletRef.current) return;
        const map = L.map(mapRef.current, { center: SHEETS_CONFIG.CENTER, zoom: 13 });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
          maxZoom: 19
        }).addTo(map);
        leafletRef.current = map;
        return () => { map.remove(); leafletRef.current = null; };
      }, []);

      // Render marker setiap data berubah
      useEffect(() => {
        const map = leafletRef.current;
        if (!map) return;
        markersRef.current.forEach(m => m.remove());
        markersRef.current = [];

        denganLL.forEach(masjid => {
          const isMusholla = masjid.lokasiSurvey?.toUpperCase().includes("MUSHOLLA");
          const k = masjid.kondisiBgn || "";
          const warna = k.includes("Rusak Berat") ? "#ef4444"
                      : k.includes("Rusak Ringan") ? "#f97316"
                      : k.includes("Sedang") ? "#eab308"
                      : "#1B4332";

          const icon = L.divIcon({
            html: `<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;background:${warna};border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,.3);transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;">
                     <span style="transform:rotate(45deg);font-size:13px;">${isMusholla ? "🏠" : "🕌"}</span>
                   </div>`,
            className: "", iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-36],
          });

          const fotoHtml = masjid.fotoUtama
            ? `<img src="${masjid.fotoUtama}" style="width:100%;height:88px;object-fit:cover;border-radius:8px;margin-bottom:8px;" onerror="this.style.display='none'"/>`
            : "";

          const popup = L.popup({ maxWidth: 230 }).setContent(`
            <div style="font-family:'DM Sans',sans-serif;min-width:190px;">
              ${fotoHtml}
              <div style="font-size:10px;color:#D4A853;font-weight:700;letter-spacing:.5px;margin-bottom:2px;">${isMusholla ? "MUSHOLLA" : "MASJID"}</div>
              <div style="font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#1B4332;margin-bottom:4px;">${masjid.namaMasjid}</div>
              <div style="font-size:11px;color:#6b7280;margin-bottom:8px;">📍 ${masjid.desa}</div>
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:11px;color:#6b7280;">Jumat: ${masjid.jamaahJumat ? "±"+masjid.jamaahJumat : "—"}</span>
                <button onclick="window.__pilih(${masjid.id})" style="font-size:11px;padding:4px 10px;background:#1B4332;color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600;">Detail →</button>
              </div>
            </div>`);

          const marker = L.marker(masjid.latLng, { icon }).addTo(map).bindPopup(popup);
          markersRef.current.push(marker);
        });

        if (denganLL.length > 1) {
          map.fitBounds(L.latLngBounds(denganLL.map(m => m.latLng)), { padding:[40,40] });
        }
      }, [denganLL]);

      useEffect(() => {
        window.__pilih = (id) => { const m = data.find(x => x.id === id); if (m) onSelect(m); };
        return () => { delete window.__pilih; };
      }, [data, onSelect]);

      return (
        <div>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:12,
            background:"white", borderRadius:12, padding:"10px 14px",
            border:"1px solid #e2d9c8", alignItems:"center" }}>
            <span style={{ fontSize:12, color:"#6b7280", fontWeight:500 }}>Legenda:</span>
            {[["#1B4332","Baik"],["#eab308","Sedang"],["#f97316","Rusak Ringan"],["#ef4444","Rusak Berat"]].map(([c,l]) => (
              <span key={l} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12 }}>
                <span style={{ width:10, height:10, borderRadius:"50%", background:c, display:"inline-block" }}/>
                {l}
              </span>
            ))}
            <span style={{ marginLeft:"auto", fontSize:12, color:"#9ca3af" }}>
              🗺️ {denganLL.length}/{data.length} ada koordinat
            </span>
          </div>
          <div ref={mapRef} style={{ width:"100%", height:520, borderRadius:16,
            overflow:"hidden", border:"1px solid #e2d9c8", boxShadow:"0 4px 20px rgba(0,0,0,.08)" }}/>
          {tanpaLL.length > 0 && (
            <div style={{ marginTop:14, background:"#fffbeb", border:"1px solid #fde68a",
              borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:13, fontWeight:600, color:"#92400e", marginBottom:6 }}>
                ⚠️ {tanpaLL.length} belum ada koordinat GPS:
              </div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {tanpaLL.map(m => (
                  <button key={m.id} onClick={() => onSelect(m)} style={{
                    fontSize:11, padding:"3px 10px", borderRadius:20,
                    border:"1px solid #fbbf24", background:"white",
                    color:"#92400e", cursor:"pointer" }}>
                    {m.namaMasjid}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  TAB STATISTIK
    // ════════════════════════════════════════════════════════════
    function StatBar({ value, max, color="#1B4332" }) {
      const pct = max > 0 ? Math.round((value/max)*100) : 0;
      return (
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ flex:1, height:8, background:"#f0ebe0", borderRadius:4, overflow:"hidden" }}>
            <div style={{ width:pct+"%", height:"100%", background:color, borderRadius:4, transition:"width .6s ease" }}/>
          </div>
          <span style={{ fontSize:12, fontWeight:600, color, minWidth:24, textAlign:"right" }}>{value}</span>
        </div>
      );
    }

    function TabStatistik({ data }) {
      const totalMasjid    = data.filter(m => !m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")).length;
      const totalMusholla  = data.filter(m =>  m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")).length;
      const totalJamaah    = data.reduce((s,m) => s + (parseInt(m.jamaahJumat)||0), 0);
      const bersertif      = data.filter(m => m.statusTanah?.includes("Bersertifikat") || !!m.nomorSertifWakaf).length;
      const punyaTPQ       = data.filter(m => m.tpqAnak?.toLowerCase().startsWith("ada")).length;
      const rusak          = data.filter(m => m.kondisiBgn?.includes("Rusak")).length;
      const punyaLL        = data.filter(m => m.latLng).length;

      const perDesa = useMemo(() => {
        const map = {};
        data.forEach(m => {
          if (!m.desa) return;
          if (!map[m.desa]) map[m.desa] = { desa:m.desa, total:0, masjid:0, musholla:0, jamaah:0, bersertif:0, rusak:0, tpq:0 };
          map[m.desa].total++;
          if (m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")) map[m.desa].musholla++;
          else map[m.desa].masjid++;
          map[m.desa].jamaah += parseInt(m.jamaahJumat)||0;
          if (m.statusTanah?.includes("Bersertifikat") || m.nomorSertifWakaf) map[m.desa].bersertif++;
          if (m.kondisiBgn?.includes("Rusak")) map[m.desa].rusak++;
          if (m.tpqAnak?.toLowerCase().startsWith("ada")) map[m.desa].tpq++;
        });
        return Object.values(map).sort((a,b) => b.total - a.total);
      }, [data]);

      const perKondisi = ["Baik","Sedang","Rusak Ringan","Rusak Berat"].map(k => ({
        k, n: data.filter(m => m.kondisiBgn === k).length
      }));

      const afilMap = {};
      data.forEach(m => { const a = m.afiliasi || "Tidak Tercatat"; afilMap[a] = (afilMap[a]||0)+1; });
      const perAfil = Object.entries(afilMap).sort((a,b) => b[1]-a[1]);

      const SC = ({ icon, label, value, sub, color="#1B4332" }) => (
        <div style={{ background:"white", borderRadius:14, padding:"16px 18px",
          border:"1px solid #e2d9c8", boxShadow:"0 2px 8px rgba(0,0,0,.04)" }}>
          <div style={{ fontSize:24, marginBottom:6 }}>{icon}</div>

    // ════════════════════════════════════════════════════════════
    //  TAB KIBLAT
    // ════════════════════════════════════════════════════════════
    function TabKiblat() {
      const KA_LAT = 21.4225, KA_LNG = 39.8263;
      const DEF_LAT = -7.6101, DEF_LNG = 111.4926;

      const [kLat,    setKLat]    = useState(DEF_LAT.toString());
      const [kLng,    setKLng]    = useState(DEF_LNG.toString());
      const [kResult, setKResult] = useState(null);

      const hitungKiblat = () => {
        const lat = parseFloat(kLat), lng = parseFloat(kLng);
        if (isNaN(lat) || isNaN(lng)) return;
        const dLng = (KA_LNG - lng) * Math.PI / 180;
        const latR = lat * Math.PI / 180, kaLatR = KA_LAT * Math.PI / 180;
        const y = Math.sin(dLng) * Math.cos(kaLatR);
        const x = Math.cos(latR) * Math.sin(kaLatR) - Math.sin(latR) * Math.cos(kaLatR) * Math.cos(dLng);
        let az = Math.atan2(y, x) * 180 / Math.PI;
        az = (az + 360) % 360;
        const arahMata = az<=22.5?"Utara":az<=67.5?"Timur Laut":az<=112.5?"Timur":az<=157.5?"Tenggara":az<=202.5?"Selatan":az<=247.5?"Barat Daya":az<=292.5?"Barat":"Barat Laut";
        setKResult({ az: az.toFixed(2), arah: arahMata });
      };

      const [rTgl,    setRTgl]    = useState(() => new Date().toISOString().slice(0,10));
      const [rLng,    setRLng]    = useState(DEF_LNG.toString());
      const [rResult, setRResult] = useState(null);

      const getDeklinasi = (doy) => 23.45 * Math.sin((360/365*(doy-81)) * Math.PI/180);
      const getEOT = (doy) => {
        const B = (360/365*(doy-81)) * Math.PI/180;
        return 9.87*Math.sin(2*B) - 7.53*Math.cos(B) - 1.5*Math.sin(B);
      };
      const getDOY = (dateStr) => {
        const d = new Date(dateStr), s = new Date(d.getFullYear(), 0, 0);
        return Math.floor((d - s) / 86400000);
      };

      const hitungRashdul = () => {
        const lng = parseFloat(rLng);
        if (isNaN(lng) || !rTgl) return;
        const doy = getDOY(rTgl);
        const dekl = getDeklinasi(doy);
        const eot = getEOT(doy);
        if (Math.abs(dekl) > KA_LAT + 0.5) { setRResult({ error:true, dekl:dekl.toFixed(2) }); return; }
        const selisihBujur = (lng - KA_LNG) / 15;
        const totalMenit = 720 - eot + selisihBujur * 60;
        const jamWIB = totalMenit / 60;
        const jam = Math.floor(jamWIB);
        const menit = Math.floor((jamWIB - jam) * 60);
        const detik = Math.round(((jamWIB - jam)*60 - menit) * 60);
        const pad = n => String(n).padStart(2,"0");
        const waktu = `${pad(jam)}:${pad(menit)}:${pad(detik)} WIB`;
        const tglStr = new Date(rTgl).toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
        setRResult({ waktu, tglStr, dekl:dekl.toFixed(2), eot:eot.toFixed(2), error:false });
      };

      const inputStyle = { width:"100%", padding:"10px 14px", borderRadius:10,
        border:"1px solid #e2d9c8", fontSize:14, background:"white",
        fontFamily:"'DM Sans',sans-serif", outline:"none", color:"#1a1a1a", boxSizing:"border-box" };
      const labelStyle = { fontSize:12, color:"#9ca3af", marginBottom:4, display:"block", fontWeight:500 };
      const cardStyle  = { background:"white", borderRadius:16, border:"1px solid #e2d9c8",
        boxShadow:"0 2px 12px rgba(0,0,0,.06)", overflow:"hidden", marginBottom:20 };
      const cardHeader = { background:"#1B4332", padding:"16px 20px", display:"flex", alignItems:"center", gap:12 };
      const btnStyle   = { width:"100%", padding:"11px", borderRadius:10, border:"none",
        background:"#1B4332", color:"white", fontSize:14, fontWeight:600,
        cursor:"pointer", fontFamily:"'DM Sans',sans-serif", marginTop:4, letterSpacing:".3px" };
      const resultBox  = { background:"linear-gradient(135deg,#1B4332 0%,#2d6a4f 100%)",
        borderRadius:14, padding:"20px 24px", marginTop:16, color:"white",
        border:"1px solid rgba(212,168,83,.3)" };

      const CompassSVG = ({ az }) => {
        const r = az * Math.PI / 180;
        const cx=60, cy=60, R=50;
        const nx = cx + R*Math.sin(r), ny = cy - R*Math.cos(r);
        const tx = cx - 18*Math.sin(r), ty = cy + 18*Math.cos(r);
        return (
          <svg width="120" height="120" viewBox="0 0 120 120" style={{ flexShrink:0 }}>
            <circle cx={cx} cy={cy} r={R} fill="rgba(255,255,255,.08)" stroke="rgba(212,168,83,.4)" strokeWidth="1"/>
            {["U","T","S","B"].map((d,i) => {
              const a = i * Math.PI / 2;
              return <text key={d} x={cx+44*Math.sin(a)} y={cy-44*Math.cos(a)+4}
                textAnchor="middle" fill="rgba(255,255,255,.6)" fontSize="9" fontFamily="DM Sans">{d}</text>;
            })}
            <line x1={cx} y1={cy} x2={nx} y2={ny} stroke="#D4A853" strokeWidth="3" strokeLinecap="round"/>
            <line x1={cx} y1={cy} x2={tx} y2={ty} stroke="rgba(255,255,255,.3)" strokeWidth="2" strokeLinecap="round"/>
            <circle cx={cx} cy={cy} r={5} fill="#D4A853"/>
          </svg>
        );
      };

      const tahun = rTgl ? new Date(rTgl).getFullYear() : new Date().getFullYear();
      const rashdulDates = [`${tahun}-05-27`,`${tahun}-05-28`,`${tahun}-07-15`,`${tahun}-07-16`];

      return (
        <div style={{ animation:"fadeIn .3s ease", maxWidth:800, margin:"0 auto" }}>
          <div style={{ textAlign:"center", marginBottom:28, paddingTop:8 }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:24, fontWeight:700, color:"#1B4332", marginBottom:6 }}>
              🧭 Kalkulator Kiblat & Rashdul
            </div>
            <div style={{ fontSize:13, color:"#9ca3af" }}>
              Hitung arah kiblat dan waktu rashdul kiblat untuk lokasi mana pun
            </div>
          </div>

          {/* ── Arah Kiblat ── */}
          <div style={cardStyle}>
            <div style={cardHeader}>
              <div style={{ width:36, height:36, borderRadius:10, background:"rgba(212,168,83,.2)",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🕋</div>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"white" }}>Arah Kiblat</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.8)" }}>Berdasarkan koordinat lokasi pengamat</div>
              </div>
            </div>
            <div style={{ padding:"20px 24px" }}>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
                <div>
                  <label style={labelStyle}>Lintang (Latitude)</label>
                  <input style={inputStyle} type="number" step="0.0001" value={kLat}
                    onChange={e => setKLat(e.target.value)} placeholder="-7.6101"/>
                  <div style={{ fontSize:11, color:"#9ca3af", marginTop:3 }}>Negatif = Selatan. Pilangkenceng ≈ -7.6101</div>
                </div>
                <div>
                  <label style={labelStyle}>Bujur (Longitude)</label>
                  <input style={inputStyle} type="number" step="0.0001" value={kLng}
                    onChange={e => setKLng(e.target.value)} placeholder="111.4926"/>
                  <div style={{ fontSize:11, color:"#9ca3af", marginTop:3 }}>Positif = Timur. Pilangkenceng ≈ 111.4926</div>
                </div>
              </div>
              <div style={{ background:"#f8f4ed", borderRadius:10, padding:"10px 14px",
                fontSize:12, color:"#6b7280", marginBottom:16 }}>
                📍 <strong>Ka'bah:</strong> 21°25'20" LU, 39°49'34" BT (konstan)
              </div>
              <button style={btnStyle} onClick={hitungKiblat}>Hitung Arah Kiblat →</button>
              {kResult && (
                <div style={resultBox}>
                  <div style={{ display:"flex", alignItems:"center", gap:20 }}>
                    <CompassSVG az={parseFloat(kResult.az)}/>
                    <div>
                      <div style={{ fontSize:12, color:"rgba(212,168,83,.8)", marginBottom:4 }}>
                        Arah Kiblat dari Utara (searah jarum jam)
                      </div>
                      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:40,
                        fontWeight:700, color:"#D4A853", lineHeight:1 }}>{kResult.az}°</div>
                      <div style={{ fontSize:16, fontWeight:600, marginTop:6 }}>{kResult.arah}</div>
                      <div style={{ fontSize:12, color:"rgba(255,255,255,.6)", marginTop:8 }}>
                        Arahkan bayangan tongkat/benda ke arah berlawanan saat rashdul kiblat
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>
          </div>

          {/* ── Rashdul Kiblat ── */}
          <div style={cardStyle}>
            <div style={cardHeader}>
              <div style={{ width:36, height:36, borderRadius:10, background:"rgba(212,168,83,.2)",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>☀️</div>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"white" }}>Rashdul Kiblat</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.8)" }}>Waktu matahari tepat di atas Ka'bah</div>
              </div>
            </div>
            <div style={{ padding:"20px 24px" }}>
              <div style={{ background:"#fffbeb", border:"1px solid #fde68a", borderRadius:10,
                padding:"12px 14px", fontSize:12, color:"#92400e", marginBottom:16, lineHeight:1.6 }}>
                ℹ️ Rashdul kiblat terjadi dua kali setahun: sekitar <strong>27–28 Mei</strong> dan <strong>15–16 Juli</strong>,
                saat deklinasi matahari ≈ lintang Ka'bah (21,42°).
              </div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:16 }}>
                <div>
                  <label style={labelStyle}>Tanggal</label>
                  <input style={inputStyle} type="date" value={rTgl} onChange={e => setRTgl(e.target.value)}/>
                </div>
                <div>
                  <label style={labelStyle}>Bujur Lokasi (Longitude)</label>
                  <input style={inputStyle} type="number" step="0.0001" value={rLng}
                    onChange={e => setRLng(e.target.value)} placeholder="111.4926"/>
                  <div style={{ fontSize:11, color:"#9ca3af", marginTop:3 }}>Pilangkenceng ≈ 111.4926</div>
                </div>
              </div>
              <div style={{ marginBottom:16 }}>
                <div style={{ fontSize:12, color:"#9ca3af", marginBottom:8, fontWeight:500 }}>
                  ⚡ Pilih tanggal rashdul tahun {tahun}:
                </div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {rashdulDates.map(d => {
                    const lbl = new Date(d).toLocaleDateString("id-ID",{day:"numeric",month:"short"});
                    return (
                      <button key={d} onClick={() => setRTgl(d)} style={{
                        padding:"6px 14px", borderRadius:20, fontSize:12, fontWeight:600,
                        cursor:"pointer", border:"1px solid #D4A853",
                        background: rTgl===d ? "#D4A853" : "white",
                        color: rTgl===d ? "#1B4332" : "#92400e",
                        fontFamily:"'DM Sans',sans-serif", transition:"all .2s"
                      }}>{lbl}</button>
                    );
                  })}
                </div>
              </div>
              <button style={btnStyle} onClick={hitungRashdul}>Hitung Waktu Rashdul →</button>
              {rResult && (rResult.error
                ? (
                  <div style={{ ...resultBox, background:"linear-gradient(135deg,#7f1d1d,#991b1b)" }}>
                    <div style={{ fontSize:14, fontWeight:600, marginBottom:4 }}>⚠️ Rashdul Kiblat tidak terjadi pada tanggal ini</div>
                    <div style={{ fontSize:12, color:"rgba(255,255,255,.7)" }}>
                      Deklinasi matahari = {rResult.dekl}°. Pilih tanggal sekitar 27–28 Mei atau 15–16 Juli.
                    </div>
                  </div>
                ) : (
                  <div style={resultBox}>
                    <div style={{ marginBottom:12, paddingBottom:12, borderBottom:"1px solid rgba(255,255,255,.15)" }}>
                      <div style={{ fontSize:11, color:"rgba(212,168,83,.8)", marginBottom:2 }}>Waktu Rashdul Kiblat</div>
                      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:36,
                        fontWeight:700, color:"#D4A853", lineHeight:1 }}>{rResult.waktu}</div>
                      <div style={{ fontSize:13, color:"rgba(255,255,255,.75)", marginTop:4 }}>{rResult.tglStr}</div>
                    </div>
                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, fontSize:12 }}>
                      {[
                        { label:"Deklinasi Matahari", val:rResult.dekl+"°" },
                        { label:"Equation of Time",   val:rResult.eot+" menit" },
                        { label:"Zona Waktu",         val:"WIB (UTC+7)" },
                      ].map(s => (
                        <div key={s.label} style={{ background:"rgba(255,255,255,.08)", borderRadius:8, padding:"10px 12px" }}>
                          <div style={{ color:"rgba(212,168,83,.8)", marginBottom:2 }}>{s.label}</div>
                          <div style={{ fontWeight:700, fontSize:14 }}>{s.val}</div>
                        </div>
                      ))}
                    </div>
                    <div style={{ marginTop:12, padding:"10px 12px", background:"rgba(212,168,83,.12)",
                      borderRadius:8, fontSize:12, color:"rgba(255,255,255,.8)", lineHeight:1.5 }}>
                      💡 Dirikan tongkat tegak. Bayangan yang terbentuk menunjuk tepat ke arah kiblat.
                    </div>
                  </div>
                )
              )}
            </div>
          </div>

          <div style={{ background:"white", borderRadius:14, border:"1px solid #e2d9c8",
            padding:"16px 20px", fontSize:12, color:"#6b7280", lineHeight:1.7 }}>
            <strong style={{ color:"#1B4332" }}>📐 Metode Perhitungan:</strong> Arah kiblat menggunakan formula
            Spherical Trigonometry. Rashdul kiblat dihitung menggunakan deklinasi matahari dan Equation of Time.
            Koordinat Ka'bah: 21°25'21" LU, 39°49'35" BT.
          </div>
        </div>
      );
    }

                  <button key={t.id} onClick={() => setTab(t.id)} style={{
                    padding:"6px 16px", borderRadius:20, border:"none", cursor:"pointer",
                    fontSize:12, fontWeight:600, transition:"all .2s",
                    background: tab===t.id ? "#D4A853" : "transparent",
                    color: tab===t.id ? "#1B4332" : "rgba(255,255,255,.8)"
                  }}>{t.icon} {t.label}</button>
                ))}
              </div>

              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                {lastSync && !loading && (
                  <span style={{ fontSize:11, color:"rgba(255,255,255,.5)" }}>
                    🔄 {lastSync.toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"})}
                  </span>
                )}
                <button onClick={refetch} disabled={loading} style={{
                  padding:"6px 12px", borderRadius:24,
                  border:"1px solid rgba(255,255,255,.2)",
                  background:"rgba(255,255,255,.08)", color:"rgba(255,255,255,.8)",
                  cursor: loading ? "not-allowed" : "pointer", fontSize:12
                }}>{loading ? "⏳" : "🔄"} Sinkron</button>
              </div>
            </div>
          </header>

          {/* ── MAIN ─────────────────────────────────────── */}
          <main style={{ maxWidth:1120, margin:"0 auto", padding:"20px" }}>
            {tab === "album" && (
              <>
                <div style={{ display:"flex", justifyContent:"space-between",
                  alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
                  <div>
                    <div style={{ fontFamily:"'Playfair Display',serif", fontSize:19,
                      fontWeight:700, color:"#1B4332" }}>Direktori Masjid & Musholla</div>
                    <div style={{ fontSize:12, color:"#9ca3af", marginTop:2 }}>
                      {loading ? "Memuat data..." : `${data.length} data terverifikasi`}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:12, fontSize:12 }}>
                    <span style={{ color:"#1B4332", fontWeight:500 }}>🕌 {totalMasjid} Masjid</span>
                    <span style={{ color:"#6b7280" }}>🏠 {totalMusholla} Musholla</span>
                    {perluPerhatian > 0 && (
                      <span style={{ color:"#c2410c", fontWeight:500 }}>⚠️ {perluPerhatian} Perlu Perhatian</span>
                    )}
                  </div>
                </div>
                <TabAlbum data={data} loading={loading} error={error} onSelect={setSelected}/>
              </>
            )}
            {tab === "peta"      && <TabPeta      data={data} onSelect={setSelected}/>}
            {tab === "statistik" && <TabStatistik data={data}/>}
            {tab === "kiblat"    && <TabKiblat/>}

            <div style={{ marginTop:40, paddingTop:16, borderTop:"1px solid #e8e0d0",
              textAlign:"center", fontSize:11, color:"#9ca3af", lineHeight:1.8 }}>
              Direktori Masjid & Musholla · Kecamatan Pilangkenceng, Kabupaten Madiun<br/>
              Kerjasama: KUA Kec. Pilangkenceng · BKM · PW DMI · APRI & IPARI · Kanwil Kemenag Jatim
            </div>
          </main>

          {selected && (
            <ModalDetail
              masjid={selected}
              onClose={() => setSelected(null)}
              onCetak={m => { setSelected(null); setTimeout(() => cetakProfil(m), 300); }}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AlbumMasjid/>);
  </script>
</body>
</html>
