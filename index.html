    // ════════════════════════════════════════════════════════════
    //  FASE 2 — PATCH: fetchWithTimeout + Offline Guard

    // ════════════════════════════════════════════════════════════
    const FETCH_TIMEOUT_MS = 30000; // 30 detik

    async function fetchWithTimeout(url, options = {}) {
      // Guard offline terlebih dahulu
      if (!navigator.onLine) {
        throw new Error("OFFLINE: Tidak ada koneksi internet. Pastikan sinyal aktif lalu coba lagi.");
      }
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), FETCH_TIMEOUT_MS);
      try {
        const res = await fetch(url, { ...options, signal: ctrl.signal });
        clearTimeout(timer);
        return res;
      } catch (err) {
        clearTimeout(timer);
        if (err.name === "AbortError") {
          throw new Error("TIMEOUT: Server tidak merespons dalam 30 detik. Coba lagi beberapa saat.");
        }
        throw err;
      }
    }

    // Hook: pantau status koneksi real-time
    function useOnlineStatus() {
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      useEffect(() => {
        const on  = () => setIsOnline(true);
        const off = () => setIsOnline(false);
        window.addEventListener("online",  on);
        window.addEventListener("offline", off);
        return () => { window.removeEventListener("online", on); window.removeEventListener("offline", off); };
      }, []);
      return isOnline;
    }

    // Komponen banner offline — muncul otomatis di atas halaman
    function OfflineBanner() {
      const isOnline = useOnlineStatus();
      if (isOnline) return null;
      return (

        }}>

          <span>Tidak ada koneksi internet — Data belum tersimpan. Periksa sinyal lalu refresh halaman.</span>
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════

      URL_FOTO_LAIN:109,URL_FOTO_SERTIF_WAKAF:110,URL_FOTO_AIW:111,
      URL_FOTO_SERTIF_KIBLAT:112,JUMLAH_FOTO:113,STATUS_PROSES:114,PDF_URL:115,

    // ════════════════════════════════════════════════════════════
    //  HELPER
    // ════════════════════════════════════════════════════════════
    const cv = (row, idx) => {
      const v = row[idx];
      if (v === undefined || v === null) return "";
      return String(v).trim();
    };
    const gabung = (row, idxList) =>
      idxList.map(i => cv(row, i)).filter(Boolean).join(", ");

    // ── v4.9: fixImgUrl — handle semua format URL Google Drive ──────────
    const fixImgUrl = (url) => {
      if (!url) return "";
      url = url.trim();
      // Sudah thumbnail → skip
      if (url.includes("thumbnail?id=")) return url;
      // Sudah lh3 (Workspace) → skip
      if (url.includes("lh3.googleusercontent.com")) return url;
      // Pattern 1: /file/d/FILE_ID/...
      let m = url.match(/\/file\/d\/([a-zA-Z0-9_-]{15,})/);
      if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
      // Pattern 2: ?id= atau &id= atau open?id=
      m = url.match(/[?&]id=([a-zA-Z0-9_-]{15,})/);
      if (m) return `https://drive.google.com/thumbnail?id=${m[1]}&sz=w800`;
      // Pattern 3: raw FILE_ID (25–44 char)
      if (/^[a-zA-Z0-9_-]{25,44}$/.test(url))
        return `https://drive.google.com/thumbnail?id=${url}&sz=w800`;
      return url;
    };

    const fixImgUrls = (urlString) =>
      (urlString || "").split(",").map(u => fixImgUrl(u.trim())).filter(Boolean).join(",");

    const parseLatLng = (gabungan) => {
      if (!gabungan) return null;
      const parts = String(gabungan).split(",");
      if (parts.length < 2) return null;
      const lat = parseFloat(parts[0]), lng = parseFloat(parts[1]);
      if (isNaN(lat) || isNaN(lng)) return null;
      if (lat < -8.5 || lat > -6.5 || lng < 110.5 || lng > 112.5) return null;
      return [lat > 0 ? -lat : lat, lng];
    };

    // ════════════════════════════════════════════════════════════
    //  MAPPER row → objek masjid
    // ════════════════════════════════════════════════════════════

      const latLng = parseLatLng(koordinatRaw);

      const bt = _parts.length >= 2 ? _parts[1].trim() : "";

        id, latLng,
        koordinatGabung: ls && bt ? `LS: ${ls}  |  BT: ${bt}` : (koordinatRaw || ""),
        timestamp: cv(row,IDX.TIMESTAMP), lokasiSurvey: cv(row,IDX.LOKASI_SURVEY),

        koordinatBT: bt, koordinatLS: ls, koordinatRaw,
        email: cv(row,IDX.EMAIL), medsos: cv(row,IDX.MEDSOS),
        namaKetua: cv(row,IDX.NAMA_KETUA), namaSekretaris: cv(row,IDX.NAMA_SEKRETARIS),

        skTakmir: cv(row,IDX.SK_TAKMIR), skLevel: cv(row,IDX.SK_LEVEL),

        dayaTampung: cv(row,IDX.DAYA_TAMPUNG),
        jamaahTotal: cv(row,IDX.JAMAAH_TOTAL), jamaahMaghrib: cv(row,IDX.JAMAAH_MAGHRIB),
        jamaahDhuhur: cv(row,IDX.JAMAAH_DHUHUR), jamaahSubuh: cv(row,IDX.JAMAAH_SUBUH),
        jamaahJumat: cv(row,IDX.JAMAAH_JUMAT),
        imam: cv(row,IDX.IMAM), jumlahImam: cv(row,IDX.JUMLAH_IMAM),
        namaImamGabung: gabung(row,[IDX.NAMA_IMAM_1,IDX.NAMA_IMAM_2,IDX.NAMA_IMAM_3,IDX.NAMA_IMAM_4,IDX.NAMA_IMAM_5,IDX.NAMA_IMAM_LAIN]),
        namaImam1: cv(row,IDX.NAMA_IMAM_1), namaImam2: cv(row,IDX.NAMA_IMAM_2),
        namaImam3: cv(row,IDX.NAMA_IMAM_3), namaImam4: cv(row,IDX.NAMA_IMAM_4),
        namaImam5: cv(row,IDX.NAMA_IMAM_5), namaImamLain: cv(row,IDX.NAMA_IMAM_LAIN),
        muadzin: cv(row,IDX.MUADZIN), jumlahMuadzin: cv(row,IDX.JUMLAH_MUADZIN),
        namaMuadzinGabung: gabung(row,[IDX.NAMA_MUADZIN_1,IDX.NAMA_MUADZIN_2,IDX.NAMA_MUADZIN_3,IDX.NAMA_MUADZIN_4,IDX.NAMA_MUADZIN_5,IDX.NAMA_MUADZIN_LAIN]),
        namaMuadzin1: cv(row,IDX.NAMA_MUADZIN_1), namaMuadzin2: cv(row,IDX.NAMA_MUADZIN_2),
        namaMuadzin3: cv(row,IDX.NAMA_MUADZIN_3), namaMuadzin4: cv(row,IDX.NAMA_MUADZIN_4),
        namaMuadzin5: cv(row,IDX.NAMA_MUADZIN_5), namaMuadzinLain: cv(row,IDX.NAMA_MUADZIN_LAIN),
        khotib: cv(row,IDX.KHOTIB), jumlahKhotib: cv(row,IDX.JUMLAH_KHOTIB),
        namaKhotibGabung: gabung(row,[IDX.NAMA_KHOTIB_1,IDX.NAMA_KHOTIB_2,IDX.NAMA_KHOTIB_3,IDX.NAMA_KHOTIB_LAIN]),
        namaKhotib1: cv(row,IDX.NAMA_KHOTIB_1), namaKhotib2: cv(row,IDX.NAMA_KHOTIB_2),
        namaKhotib3: cv(row,IDX.NAMA_KHOTIB_3), namaKhotibLain: cv(row,IDX.NAMA_KHOTIB_LAIN),
        marbot: cv(row,IDX.MARBOT), jumlahMarbot: cv(row,IDX.JUMLAH_MARBOT),
        namaMarbotGabung: gabung(row,[IDX.NAMA_MARBOT_1,IDX.NAMA_MARBOT_2,IDX.NAMA_MARBOT_LAIN]),
        namaMarbot1: cv(row,IDX.NAMA_MARBOT_1), namaMarbot2: cv(row,IDX.NAMA_MARBOT_2),

        jumlahRemaja: cv(row,IDX.JUMLAH_REMAJA), namaKetuaRemaja: cv(row,IDX.NAMA_KETUA_REMAJA),

        kitabDikaji: cv(row,IDX.KITAB_DIKAJI), jamaahRutin: cv(row,IDX.JAMAAH_RUTIN),
        namaMajelis2: cv(row,IDX.NAMA_MAJELIS_2), namaPengasuh2: cv(row,IDX.NAMA_PENGASUH_2),
        kitabDikaji2: cv(row,IDX.KITAB_DIKAJI_2), jamaahRutin2: cv(row,IDX.JAMAAH_RUTIN_2),

        tglSertifWakaf: cv(row,IDX.TGL_SERTIF_WAKAF), nomorAIW: cv(row,IDX.NOMOR_AIW),

        namaSurveyor: cv(row,IDX.NAMA_SURVEYOR),
        folderUrl: cv(row,IDX.FOLDER_URL),

        jumlahFoto: cv(row,IDX.JUMLAH_FOTO),
        statusProses: cv(row,IDX.STATUS_PROSES),
        waKetua: "", waSekretaris: "",
        fotoUtama: (() => { const u = fixImgUrls(cv(row,IDX.URL_FOTO_DEPAN)); return u ? u.split(",")[0].trim() : ""; })(),

    // ════════════════════════════════════════════════════════════
    //  HOOK: FETCH DATA — v4.9 + auto-refresh 5 menit
    // ════════════════════════════════════════════════════════════
    function useSheetData() {
      const [data,     setData]     = useState([]);
      const [loading,  setLoading]  = useState(true);
      const [error,    setError]    = useState(null);
      const [lastSync, setLastSync] = useState(null);

      const fetchData = useCallback(async () => {
        setLoading(true); setError(null);
        try {
          const range = encodeURIComponent(`${SHEETS_CONFIG.SHEET_NAME}!A2:DP`);
          const url   = `https://sheets.googleapis.com/v4/spreadsheets/${SHEETS_CONFIG.SPREADSHEET_ID}/values/${range}?key=${SHEETS_CONFIG.API_KEY}`;
          const res   = await fetch(url);
          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err?.error?.message || "Gagal mengambil data dari Sheets");
          }
          const json = await res.json();
          const rows = (json.values || [])
            .map((row, i) => rowToMasjid(row, i + 1))
            .filter(m => !m.statusProses || m.statusProses === "Selesai" || m.statusProses === "Selesai (FORM INPUT)");
          setData(rows);
          setLastSync(new Date());
        } catch(e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, []);

      // Fetch pertama saat mount
      useEffect(() => { fetchData(); }, [fetchData]);

      // ── v4.9: Auto-refresh setiap 5 menit ──────────────────
      useEffect(() => {
        const interval = setInterval(() => {
          fetchData();
        }, 5 * 60 * 1000);
        return () => clearInterval(interval);
      }, [fetchData]);

      return { data, loading, error, lastSync, refetch: fetchData };
    }

    // ════════════════════════════════════════════════════════════
    //  KOMPONEN: BADGE KONDISI
    // ════════════════════════════════════════════════════════════
    const KS = {
      "Baik":         { bg:"#dcfce7", color:"#15803d", dot:"#22c55e" },
      "Sedang":       { bg:"#fef9c3", color:"#a16207", dot:"#eab308" },
      "Rusak Ringan": { bg:"#ffedd5", color:"#c2410c", dot:"#f97316" },
      "Rusak Berat":  { bg:"#fee2e2", color:"#b91c1c", dot:"#ef4444" },
    };
    function KondisiBadge({ kondisi }) {
      const s = KS[kondisi] || { bg:"#f3f4f6", color:"#6b7280", dot:"#9ca3af" };
      return (
        <span style={{ display:"inline-flex", alignItems:"center", gap:5,
          background:s.bg, color:s.color, fontSize:11, fontWeight:600,
          padding:"3px 9px", borderRadius:20 }}>
          <span style={{ width:6, height:6, borderRadius:"50%", background:s.dot, display:"inline-block" }}/>
          {kondisi || "—"}
        </span>
      );
    }

    function FR({ label, value, mono=false, full=false }) {
      if (!value) return null;
      return (
        <div style={{ display:"flex", gap:10, marginBottom:7, alignItems:"flex-start",
          flexDirection: full ? "column" : "row" }}>
          <span style={{ fontSize:12, color:"#9ca3af", minWidth: full ? 0 : 140, flexShrink:0, paddingTop:1 }}>{label}</span>
          <span style={{ fontSize:13, color:"#1a1a1a", lineHeight:1.5, flex:1,
            fontFamily: mono ? "'Courier New',monospace" : "inherit", wordBreak:"break-word" }}>{value}</span>
        </div>
      );
    }

    function AccordionSeksi({ icon, judul, badge, children, defaultOpen=false }) {
      const [open, setOpen] = useState(defaultOpen);
      const ref = useRef(null);
      const handleToggle = () => {
        const willOpen = !open;
        setOpen(willOpen);
        if (willOpen) setTimeout(() => ref.current?.scrollIntoView({ behavior:"smooth", block:"start" }), 80);
      };
      return (
        <div ref={ref} style={{ borderBottom:"1px solid #e2d9c8" }}>
          <button onClick={handleToggle} style={{
            width:"100%", display:"flex", alignItems:"center", gap:12,
            padding:"14px 20px", background: open ? "#f8f4ed" : "white",
            border:"none", cursor:"pointer", textAlign:"left", transition:"background .2s",
          }}>
            <span style={{ width:32, height:32, borderRadius:"50%", flexShrink:0,
              background: open ? "#1B4332" : "#f0e8d8",
              display:"flex", alignItems:"center", justifyContent:"center",
              fontSize:15, transition:"background .2s" }}>{icon}</span>
            <span style={{ flex:1, fontFamily:"'Playfair Display',serif", fontSize:14, fontWeight:700, color:"#1B4332" }}>{judul}</span>
            {badge && <span style={{ fontSize:11, padding:"2px 8px", borderRadius:20,
              background:"#e8f5e9", color:"#1B4332", fontWeight:600, marginRight:6 }}>{badge}</span>}
            <span style={{ color:"#1B4332", transform: open?"rotate(180deg)":"rotate(0deg)", transition:"transform .25s", fontSize:12 }}>▼</span>
          </button>
          <div style={{ maxHeight: open ? 9999 : 0, overflow:"hidden", transition:"max-height .5s ease" }}>
            <div style={{ padding:"4px 20px 18px 64px" }}>{children}</div>
          </div>
        </div>
      );
    }

    function FotoGrid({ label, urlString, icon }) {
      const urls = (urlString || "").split(",").map(u => u.trim()).filter(Boolean);
      if (urls.length === 0) return null;
      const toViewUrl = (thumbUrl) => {
        const m = thumbUrl.match(/[?&]id=([^&]+)/);
        return m ? `https://drive.google.com/file/d/${m[1]}/view` : thumbUrl;
      };
      return (
        <div style={{ marginBottom:12 }}>
          <div style={{ fontSize:11, color:"#9ca3af", marginBottom:6, display:"flex", alignItems:"center", gap:5 }}>
            <span>{icon} {label}</span>
            <span style={{ background:"#f0e8d8", color:"#1B4332", fontWeight:700, fontSize:10, borderRadius:20, padding:"1px 6px" }}>{urls.length} foto</span>
          </div>
          <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
            {urls.map((url, i) => (
              <a key={i} href={toViewUrl(url)} target="_blank" rel="noreferrer"
                title={`${label} ${i+1} — klik untuk buka`} style={{ display:"block", flexShrink:0 }}>
                <img src={url} alt={`${label} ${i+1}`}
                  style={{ width:90, height:68, objectFit:"cover", borderRadius:7, border:"1px solid #e2d9c8", display:"block" }}
                  onError={e => { e.target.parentNode.style.display="none"; }}
                />
              </a>
            ))}
          </div>
        </div>
      );
    }

    function cetakProfil(masjid) {
      const tgl = new Date().toLocaleDateString("id-ID", { weekday:"long", year:"numeric", month:"long", day:"numeric" });
      const isMusholla = masjid.lokasiSurvey?.toUpperCase().includes("MUSHOLLA");
      const r = (label, value) => value ? `<tr><td style="padding:5px 10px;font-size:12px;color:#6b7280;width:160px;vertical-align:top;">${label}</td><td style="padding:5px 10px;font-size:12px;color:#1a1a1a;">: ${value}</td></tr>` : "";
      const s = (judul, isi) => `<div style="margin-bottom:16px;"><div style="background:#1B4332;color:white;padding:5px 12px;font-size:12px;font-weight:700;border-radius:6px;margin-bottom:6px;">${judul}</div><table style="width:100%;border-collapse:collapse;">${isi}</table></div>`;
      const koordinatTeks = masjid.koordinatLS && masjid.koordinatBT ? `LS: ${masjid.koordinatLS}  |  BT: ${masjid.koordinatBT}` : "";
      const html = `<style>@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap');body{font-family:'DM Sans',sans-serif;color:#1a1a1a;}@media print{@page{size:A4;margin:15mm;}}</style>
        <div style="max-width:720px;margin:0 auto;">
          <div style="background:#1B4332;color:white;padding:20px 24px;border-radius:12px;margin-bottom:20px;display:flex;align-items:center;gap:16px;">
            <div style="font-size:48px;">🕌</div>
            <div>
              <div style="font-size:10px;color:#D4A853;font-weight:700;letter-spacing:1px;margin-bottom:4px;">PROFIL ${isMusholla?"MUSHOLLA":"MASJID"} · KEC. PILANGKENCENG, KAB. MADIUN</div>
              <div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:700;line-height:1.2;">${masjid.namaMasjid}</div>
              <div style="font-size:12px;color:rgba(255,255,255,.75);margin-top:4px;">${masjid.desa} · Dicetak: ${tgl}</div>
            </div>
          </div>
          ${s("IDENTITAS & LOKASI", r("Nama",masjid.namaMasjid)+r("Jenis",[masjid.lokasiSurvey,masjid.tipologi].filter(Boolean).join(" — "))+r("ID SIMAS",masjid.idSimas)+r("Afiliasi",masjid.afiliasi)+r("Tahun Berdiri",masjid.tahunBerdiri)+r("Desa",masjid.desa)+r("Alamat",masjid.alamat)+r("Koordinat GPS",koordinatTeks)+r("Email",masjid.email)+r("Media Sosial",masjid.medsos))}
          ${s("ADMINISTRASI", r("SK Takmir",masjid.skTakmir)+r("SK Ditandatangani oleh",masjid.skLevel)+r("Luas Tanah",masjid.luasTanah?masjid.luasTanah+" m²":"")+r("Luas Bangunan",masjid.luasBangunan?masjid.luasBangunan+" m²":"")+r("Daya Tampung",masjid.dayaTampung?masjid.dayaTampung+" orang":""))}
          ${s("PENGURUS & PETUGAS", r("Ketua Takmir",masjid.namaKetua)+r("Sekretaris",masjid.namaSekretaris)+r("Pengurus Lain",masjid.pengurusLain)+r("Imam",masjid.namaImamGabung)+r("Muadzin",masjid.namaMuadzinGabung)+r("Khotib",masjid.namaKhotibGabung)+r("Marbot",masjid.namaMarbotGabung))}
          ${s("STATUS TANAH & WAKAF", r("Status Tanah",masjid.statusTanah)+r("Nomor Sertifikat",masjid.nomorSertifWakaf)+r("Tgl. Sertifikat",masjid.tglSertifWakaf)+r("No. AIW",masjid.nomorAIW)+r("Tgl. AIW",masjid.tglAIW)+r("Nama Wakif",masjid.namaWakif)+r("Nama Nadzir",masjid.namaNadzir))}
          ${s("SURVEYOR", r("Nama Surveyor",masjid.namaSurveyor))}
          <div style="margin-top:24px;padding-top:14px;border-top:2px solid #e2d9c8;font-size:10px;color:#9ca3af;text-align:center;line-height:1.8;">Direktori Masjid & Musholla · Kecamatan Pilangkenceng, Kabupaten Madiun<br/>Kerjasama: KUA Kec. Pilangkenceng · BKM · PW DMI · APRI & IPARI · Kanwil Kemenag Jatim</div>
        </div>`;
      const pa = document.getElementById("print-area");
      pa.innerHTML = html; pa.style.display = "block";
      window.print();
      setTimeout(() => { pa.style.display = "none"; pa.innerHTML = ""; }, 1500);
    }

    //  FOTO MANAGER MODAL
    // ════════════════════════════════════════════════════════════
    const FOTO_KATEGORI = [
      { key:"depan",        label:"Tampak Depan",     icon:"🏛️" },
      { key:"dalam",        label:"Dalam Masjid",     icon:"🕌" },
      { key:"wudhu",        label:"Tempat Wudhu",     icon:"💧" },
      { key:"wc",           label:"Kamar Mandi/WC",   icon:"🚿" },
      { key:"lain",         label:"Foto Lainnya",     icon:"📸" },
      { key:"sertifWakaf",  label:"Sertifikat Wakaf", icon:"📄" },
      { key:"fotoAIW",      label:"Akta Ikrar Wakaf", icon:"📜" },
      { key:"sertifKiblat", label:"Sertif. Kiblat",   icon:"🧭" },
    ];
    const FOTO_KEY_TO_PROP = {
      depan:"urlFotoDepan", dalam:"urlFotoDalam", wudhu:"urlFotoWudhu",
      wc:"urlFotoWC", lain:"urlFotoLain", sertifWakaf:"urlFotoSertifWakaf",
      fotoAIW:"urlFotoAIW", sertifKiblat:"urlFotoKiblat",
    };

    // v4.9: toThumb pakai fixImgUrl yang sama
    const toThumb  = (url) => fixImgUrl(url);
    const toViewUrl = (url) => {
      const m = url.match(/[?&]id=([^&]+)/);
      return m ? `https://drive.google.com/file/d/${m[1]}/view` : url;
    };

    function FotoManagerModal({ masjid, adminSession, onClose, onFotoUpdated }) {
      const [activeKat, setActiveKat] = useState("depan");
      const [localUrls, setLocalUrls] = useState(() => {
        const init = {};
        FOTO_KATEGORI.forEach(k => {
          init[k.key] = (masjid[FOTO_KEY_TO_PROP[k.key]] || "").split(",").map(u => u.trim()).filter(Boolean);
        });
        return init;
      });
      const [uploading, setUploading] = useState(false);
      const [deleting,  setDeleting]  = useState(null);
      const [toast,     setToast]     = useState(null);
      const fileInputRef = useRef(null);

      const showToast = (ok, text) => { setToast({ ok, text }); setTimeout(() => setToast(null), 3500); };

      const handleFileChange = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        setUploading(true);
        for (const file of files) {
          const isPdfKat = ["sertifWakaf","fotoAIW"].includes(activeKat);
          if (isPdfKat && file.type !== "application/pdf") { showToast(false, `${file.name}: hanya file PDF.`); continue; }
          if (!isPdfKat && !file.type.startsWith("image/")) { showToast(false, `${file.name}: hanya file gambar.`); continue; }
          if (file.size > 5*1024*1024) { showToast(false, `${file.name}: maks 5MB.`); continue; }
          const base64 = await new Promise((res,rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result.split(",")[1]);
            r.onerror = () => rej(new Error("Gagal baca file"));
            r.readAsDataURL(file);
          }).catch(err => { showToast(false, err.message); return null; });
          if (!base64) continue;
          try {
            const resp = await fetchWithTimeout(WEBAPP_URL, {
              method:"POST", headers:{"Content-Type":"text/plain"},
              body: JSON.stringify({ action:"uploadFoto", token:adminSession.token, idSimas:masjid.idSimas, kategori:activeKat, fileName:file.name, mimeType:file.type, base64, mode:"append" }),
            });
            const json = await resp.json();
            if (json.ok) {
              setLocalUrls(prev => ({ ...prev, [activeKat]: [...prev[activeKat], json.fileUrl] }));
              showToast(true, `${file.name} berhasil diupload.`);
              if (onFotoUpdated) onFotoUpdated(activeKat, json.updatedUrl);
            } else { showToast(false, json.error || "Upload gagal."); }
          } catch(err) { showToast(false, err.message || "Gagal menghubungi server."); }
        }
        setUploading(false);
        if (fileInputRef.current) fileInputRef.current.value = "";
      };

      const handleDelete = async (url) => {
        if (!window.confirm("Hapus foto ini dari Drive & Spreadsheet?")) return;
        setDeleting(url);
        try {
          const resp = await fetchWithTimeout(WEBAPP_URL, {
            method:"POST", headers:{"Content-Type":"text/plain"},
            body: JSON.stringify({ action:"deleteFoto", token:adminSession.token, idSimas:masjid.idSimas, kategori:activeKat, fileUrl:url }),
          });
          const json = await resp.json();
          if (json.ok) {
            setLocalUrls(prev => ({ ...prev, [activeKat]: prev[activeKat].filter(u => u !== url) }));
            showToast(true, "Foto berhasil dihapus.");
            if (onFotoUpdated) onFotoUpdated(activeKat, json.updatedUrl);
          } else { showToast(false, json.error || "Hapus gagal."); }
        } catch(err) { showToast(false, err.message || "Gagal menghubungi server."); }
        finally { setDeleting(null); }
      };

      const activeUrls = localUrls[activeKat] || [];
      const activeInfo = FOTO_KATEGORI.find(k => k.key === activeKat);

      return (
        <div onClick={e => e.stopPropagation()} style={{ position:"fixed", inset:0, zIndex:2200, background:"rgba(0,0,0,.65)", backdropFilter:"blur(4px)", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"16px", overflowY:"auto" }}>
          <div style={{ width:"100%", maxWidth:680, background:"#FAFAF7", borderRadius:18, overflow:"hidden", margin:"auto", boxShadow:"0 32px 80px rgba(0,0,0,.3)", animation:"fadeIn .2s ease" }}>
            <div style={{ background:"#1B4332", padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"white" }}>📷 Kelola Foto</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.85)", marginTop:2 }}>{masjid.namaMasjid}</div>
              </div>
              <button onClick={onClose} style={{ background:"rgba(255,255,255,.12)", border:"none", color:"white", width:32, height:32, borderRadius:"50%", cursor:"pointer", fontSize:16 }}>✕</button>
            </div>
            <div style={{ display:"flex", flexWrap:"wrap", borderBottom:"2px solid #e2d9c8", background:"white", padding:"4px 4px 0", gap:2 }}>
              {FOTO_KATEGORI.map(k => {
                const count = localUrls[k.key]?.length || 0;
                return (
                  <button key={k.key} onClick={() => setActiveKat(k.key)} style={{
                    padding:"8px 10px", border:"none", cursor:"pointer", fontSize:11, fontWeight:600,
                    fontFamily:"'DM Sans',sans-serif", background: activeKat===k.key ? "#f0f7f4" : "none",
                    whiteSpace:"nowrap", color: activeKat===k.key ? "#1B4332" : "#9ca3af",
                    borderBottom: activeKat===k.key ? "2px solid #1B4332" : "2px solid transparent",
                    borderRadius:"6px 6px 0 0", marginBottom:-2,
                  }}>
                    {k.icon} {k.label}
                    {count > 0 && <span style={{ marginLeft:4, background:"#1B4332", color:"white", fontSize:9, fontWeight:700, borderRadius:20, padding:"1px 5px" }}>{count}</span>}
                  </button>
                );
              })}
            </div>
            <div style={{ padding:"16px 20px", minHeight:280 }}>
              <div style={{ marginBottom:16 }}>
                {/* Input galeri (multiple) */}
                <input ref={fileInputRef} type="file" accept={["sertifWakaf","fotoAIW"].includes(activeKat) ? "application/pdf" : "image/*"} multiple onChange={handleFileChange} style={{ display:"none" }} id="foto-upload-input"/>
                {/* Input kamera langsung (capture, single) */}
                <input type="file" accept="image/*" capture="environment" onChange={handleFileChange} style={{ display:"none" }} id="foto-capture-input"/>

                {["sertifWakaf","fotoAIW"].includes(activeKat) ? (
                  <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                    <label htmlFor="foto-upload-input" style={{ display:"inline-flex", alignItems:"center", gap:8, padding:"10px 18px", borderRadius:10, background: uploading ? "#9ca3af" : "#1B4332", color:"white", cursor: uploading ? "not-allowed" : "pointer", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif", pointerEvents: uploading ? "none" : "auto" }}>
                      {uploading ? "⏳ Mengupload..." : `📁 Pilih File PDF ${activeInfo?.label}`}
                    </label>
                    <span style={{ fontSize:11, color:"#9ca3af" }}>PDF · maks 5MB</span>
                  </div>
                ) : (
                  <div style={{ display:"flex", alignItems:"center", gap:10, flexWrap:"wrap" }}>
                    <label htmlFor="foto-capture-input" style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"10px 18px", borderRadius:10, background: uploading ? "#9ca3af" : "#1B4332", color:"white", cursor: uploading ? "not-allowed" : "pointer", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif", pointerEvents: uploading ? "none" : "auto" }}>
                      📷 Ambil Foto
                    </label>
                    <label htmlFor="foto-upload-input" style={{ display:"inline-flex", alignItems:"center", gap:7, padding:"10px 18px", borderRadius:10, background: uploading ? "#9ca3af" : "white", color: uploading ? "white" : "#1B4332", border:"1.5px solid #1B4332", cursor: uploading ? "not-allowed" : "pointer", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif", pointerEvents: uploading ? "none" : "auto" }}>
                      🖼️ Pilih dari Galeri
                    </label>
                    {uploading && <span style={{ fontSize:12, color:"#9ca3af" }}>⏳ Mengupload...</span>}
                    {!uploading && <span style={{ fontSize:11, color:"#9ca3af" }}>JPG/PNG/WebP · maks 5MB</span>}
                  </div>
                )}
              </div>
              {activeUrls.length === 0 ? (
                <div style={{ textAlign:"center", padding:"40px 20px", color:"#9ca3af", fontSize:13, background:"#f8f4ed", borderRadius:12, border:"2px dashed #e2d9c8" }}>
                  {activeInfo?.icon} Belum ada foto {activeInfo?.label}.<br/><span style={{ fontSize:11 }}>Klik tombol Upload di atas.</span>
                </div>
              ) : (
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(140px, 1fr))", gap:10 }}>
                  {activeUrls.map((url, i) => {
                    const isDel = deleting === url;
                    return (
                      <div key={i} style={{ position:"relative", borderRadius:10, overflow:"hidden", border:"1px solid #e2d9c8", background:"#f8f4ed" }}>
                        <a href={toViewUrl(url)} target="_blank" rel="noreferrer">
                          <img src={toThumb(url)} alt={`foto ${i+1}`}
                            style={{ width:"100%", height:110, objectFit:"cover", display:"block" }}
                            onError={e => { e.target.src=""; e.target.style.background="#e2d9c8"; }}
                          />
                        </a>
                        <button onClick={() => handleDelete(url)} disabled={isDel} title="Hapus foto" style={{ position:"absolute", top:5, right:5, width:24, height:24, borderRadius:"50%", background: isDel ? "rgba(100,100,100,.7)" : "rgba(220,38,38,.85)", border:"none", color:"white", cursor: isDel ? "not-allowed" : "pointer", fontSize:12, fontWeight:700, display:"flex", alignItems:"center", justifyContent:"center", boxShadow:"0 1px 4px rgba(0,0,0,.3)" }}>
                          {isDel ? "⏳" : "✕"}
                        </button>
                        <div style={{ padding:"4px 6px", fontSize:10, color:"#9ca3af", textAlign:"center" }}>foto {i+1}</div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
            {toast && (
              <div style={{ margin:"0 20px 16px", padding:"10px 14px", borderRadius:8, fontSize:13, background: toast.ok ? "#dcfce7" : "#fee2e2", color: toast.ok ? "#15803d" : "#b91c1c", animation:"fadeIn .2s ease" }}>
                {toast.ok ? "✅ " : "⚠️ "}{toast.text}
              </div>
            )}
            <div style={{ padding:"12px 20px", borderTop:"1px solid #e2d9c8", display:"flex", justifyContent:"flex-end" }}>
              <button onClick={onClose} style={{ padding:"9px 24px", borderRadius:10, background:"#1B4332", color:"white", border:"none", cursor:"pointer", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif" }}>Selesai</button>
            </div>
          </div>
        </div>
      );
    }

      const [result,    setResult]    = useState(null);
      const [openSeksi, setOpenSeksi] = useState(0);
      const [showFoto,  setShowFoto]  = useState(false);
      const [localMasjidFoto, setLocalMasjidFoto] = useState(masjid);

      const getChanges = () => {
        const initial = buildInitial();
        const changes = {};
        editableFields().forEach(f => {
          if (f.superOnly && !isSuper) return;
          if (f.type === "checkbox") {
            if (!!values[f.key] !== !!initial[f.key] && f.apiField)
              changes[f.apiField] = values[f.key] ? "Ada" : "Tidak Ada";
          } else {
            const n = (values[f.key] || "").trim(), o = (initial[f.key] || "").trim();
            if (n !== o && f.apiField) changes[f.apiField] = n;
          }
        });
        return changes;
      };

      const handleSave = async () => {
        const changes = getChanges();
        if (!Object.keys(changes).length) { setResult({ ok:false, message:"Tidak ada perubahan." }); return; }
        setLoading(true); setResult(null);
        try {
          const payload = { action:"updateBatch", token:adminSession.token, changes };
          if (masjid.idSimas?.trim()) payload.idSimas = masjid.idSimas;
          else { payload.namaMasjidFallback = masjid.namaMasjid; payload.desaFallback = masjid.desa || ""; }
          const res = await fetchWithTimeout(WEBAPP_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(payload) });
          const json = await res.json();
          if (json.ok) {
            const updatedFields = {};
            editableFields().forEach(f => { if (f.apiField && changes[f.apiField] !== undefined) updatedFields[f.key] = changes[f.apiField]; });
            setResult({ ok:true, message: json.message + (json.pdfStatus==="ok" ? " PDF diperbarui." : "") });
            setTimeout(() => { onSaved(updatedFields); onClose(); }, 1500);
          } else { setResult({ ok:false, message: json.error || "Gagal menyimpan." }); }
        } catch(e) { setResult({ ok:false, message:"Gagal menghubungi server: "+e.message }); }
        finally { setLoading(false); }
      };

      const changedCount = Object.keys(getChanges()).length;
      const inpStyle = { width:"100%", padding:"8px 11px", borderRadius:8, border:"1.5px solid #e2d9c8", fontSize:13, fontFamily:"'DM Sans',sans-serif", outline:"none", background:"white", color:"#1a1a1a", transition:"border-color .2s" };

      // ── Logika disable field wakaf berdasarkan status tanah ──
      const statusTanah = values["statusTanah"] || "";
      const isWakafBersertif  = statusTanah === "Wakaf Bersertifikat";
      const isWakafBelum      = statusTanah === "Wakaf Belum Bersertifikat";
      // SHM dan Tanah Kas Desa → semua field wakaf dinonaktifkan
      const isTanahNonWakaf   = statusTanah === "SHM" || statusTanah === "Tanah Kas Desa";
      const wakafOnlyFields   = ["nomorSertifWakaf","tglSertifWakaf","nomorAIW","tglAIW","namaWakif","namaNadzir"];
      const aiwOnlyFields     = ["nomorAIW","tglAIW","namaWakif","namaNadzir"];

      const isFieldDisabled = (key) => {
        if (!wakafOnlyFields.includes(key)) return false;
        if (isTanahNonWakaf) return true;
        if (isWakafBelum && !aiwOnlyFields.includes(key)) return true;
        return false;
      };

      return (
        <>
        <div onClick={e => e.stopPropagation()} style={{ position:"fixed", inset:0, zIndex:2100, background:"rgba(0,0,0,.6)", backdropFilter:"blur(4px)", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"16px", overflowY:"auto" }}>
          <div style={{ width:"100%", maxWidth:640, background:"#FAFAF7", borderRadius:18, overflow:"hidden", margin:"auto", boxShadow:"0 32px 80px rgba(0,0,0,.3)", animation:"fadeIn .2s ease" }}>

            <div style={{ background:"#1B4332", padding:"16px 20px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"white" }}>✏️ Edit Data Masjid</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.85)", marginTop:2 }}>{masjid.namaMasjid} · {adminSession?.nama}</div>
              </div>
              <div style={{ display:"flex", gap:8, alignItems:"center" }}>
                <button onClick={() => setShowFoto(true)} style={{ padding:"6px 12px", borderRadius:20, background:"rgba(212,168,83,.2)", border:"1px solid rgba(212,168,83,.4)", color:"#D4A853", cursor:"pointer", fontSize:11, fontWeight:600, fontFamily:"'DM Sans',sans-serif" }}>📷 Kelola Foto</button>
                <button onClick={onClose} style={{ background:"rgba(255,255,255,.12)", border:"none", color:"white", width:32, height:32, borderRadius:"50%", cursor:"pointer", fontSize:16 }}>✕</button>
              </div>
            </div>

            {(!masjid.idSimas || !masjid.idSimas.trim()) && (
              <div style={{ background:"#eff6ff", borderBottom:"1px solid #bfdbfe", padding:"9px 20px", fontSize:12, color:"#1e40af", display:"flex", alignItems:"flex-start", gap:6 }}>
                <span style={{ fontSize:14 }}>ℹ️</span>
                <span><strong>ID SIMAS belum terisi.</strong> Data tetap bisa disimpan menggunakan nama masjid sebagai pengenal.</span>
              </div>
            )}
            {changedCount > 0 && (
              <div style={{ background:"#fffbeb", borderBottom:"1px solid #fde68a", padding:"8px 20px", fontSize:12, color:"#92400e" }}>
                ✏️ {changedCount} field diubah — belum disimpan
              </div>
            )}

            <div style={{ maxHeight:"60vh", overflowY:"auto" }}>
              {SEKSI.map((seksi, si) => {
                const visibleFields = seksi.fields.filter(f => !f.superOnly || isSuper || f.showReadOnly);
                if (!visibleFields.length) return null;
                return (
                  <div key={si} style={{ borderBottom:"1px solid #e2d9c8" }}>
                    <button onClick={() => setOpenSeksi(openSeksi===si ? -1 : si)} style={{ width:"100%", padding:"12px 20px", background: openSeksi===si ? "#f8f4ed" : "white", border:"none", cursor:"pointer", textAlign:"left", fontSize:13, fontWeight:600, color:"#1B4332", fontFamily:"'DM Sans',sans-serif", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      {seksi.judul}
                      <span style={{ fontSize:11, color:"#9ca3af" }}>{openSeksi===si ? "▲" : "▼"}</span>
                    </button>
                    {openSeksi === si && (
                      <div style={{ padding:"12px 20px 16px", display:"grid", gridTemplateColumns:"1fr 1fr", gap:"10px 16px" }}>
                        {visibleFields.map(f => {
                          const isReadOnly  = f.superOnly && !isSuper;
                          const isCheckbox  = f.type === "checkbox";
                          const checked     = !!values[f.key];
                          const fieldDisabled = isFieldDisabled(f.key);

                          return (
                            <div key={f.key} style={{ gridColumn: f.full ? "1/-1" : "auto" }}>
                              <label style={{ fontSize:11, color: fieldDisabled ? "#c0c4cc" : f.superOnly ? (isSuper ? "#b45309" : "#6b7280") : "#6b7280", fontWeight:500, display:"block", marginBottom:4 }}>
                                {f.label}
                                {f.superOnly && isSuper && <span style={{ marginLeft:4, fontSize:10, color:"#d97706" }}>👑 Super</span>}
                                {isReadOnly && <span style={{ marginLeft:4, fontSize:10, color:"#9ca3af" }}>🔒</span>}
                              </label>
                              {isReadOnly ? (
                                <div style={{ width:"100%", padding:"8px 11px", borderRadius:8, border:"1.5px solid #e2d9c8", fontSize:13, background:"#f3f4f6", color:(masjid[f.key]||"") ? "#374151" : "#c0c4cc", fontFamily:"'DM Sans',sans-serif", minHeight:36, wordBreak:"break-all" }}>
                                  {masjid[f.key] || <span style={{ fontStyle:"italic", color:"#c0c4cc" }}>—</span>}
                                </div>
                              ) : fieldDisabled ? (
                                <div style={{ width:"100%", padding:"8px 11px", borderRadius:8, border:"1.5px solid #e2d9c8", fontSize:13, background:"#f3f4f6", color:"#c0c4cc", fontFamily:"'DM Sans',sans-serif", minHeight:36, fontStyle:"italic" }}>
                                  — (tidak tersedia untuk {statusTanah})
                                </div>
                              ) : f.type === "select" ? (
                                <select value={values[f.key] || ""} onChange={e => setValues(v => ({ ...v, [f.key]: e.target.value }))}
                                  style={{ ...inpStyle, borderColor:(values[f.key]||"") !== (masjid[f.key]||"") ? "#D4A853" : "#e2d9c8", background: f.superOnly ? "#fffbeb" : "white", cursor:"pointer" }}>
                                  <option value="">— Pilih —</option>
                                  {(f.options||[]).map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                </select>
                              ) : isCheckbox ? (
                                <div onClick={() => setValues(v => ({ ...v, [f.key]: !v[f.key] }))}
                                  style={{ display:"flex", alignItems:"center", gap:10, cursor:"pointer", padding:"8px 12px", borderRadius:8, border:"1.5px solid", borderColor: checked ? "#22c55e" : "#e2d9c8", background: checked ? "#dcfce7" : "#f9fafb", transition:"all .18s", userSelect:"none" }}>
                                  <div style={{ width:38, height:22, borderRadius:11, flexShrink:0, background: checked ? "#22c55e" : "#d1d5db", position:"relative", transition:"background .2s" }}>
                                    <div style={{ position:"absolute", top:3, left: checked ? 19 : 3, width:16, height:16, borderRadius:"50%", background:"white", boxShadow:"0 1px 3px rgba(0,0,0,.25)", transition:"left .18s" }}/>
                                  </div>
                                  <span style={{ fontSize:13, fontWeight:600, color: checked ? "#15803d" : "#9ca3af" }}>
                                    {checked ? "✓ Ada" : "— Tidak Ada"}
                                  </span>
                                </div>
                              ) : (
                                <input value={values[f.key] !== undefined ? values[f.key] : ""} onChange={e => setValues(v => ({ ...v, [f.key]: e.target.value }))}
                                  placeholder={f.placeholder || ""}
                                  style={{ ...inpStyle, borderColor:(values[f.key]||"") !== (masjid[f.key]||"") ? "#D4A853" : "#e2d9c8", background: f.superOnly ? "#fffbeb" : "white" }}
                                />
                              )}
                            </div>
                          );
                        })}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>

            {result && (
              <div style={{ margin:"12px 20px 0", background: result.ok ? "#dcfce7" : "#fee2e2", color: result.ok ? "#15803d" : "#b91c1c", borderRadius:8, padding:"10px 14px", fontSize:13 }}>
                {result.ok ? "✅ " : "⚠️ "}{result.message}
              </div>
            )}

            <div style={{ padding:"16px 20px", display:"flex", gap:10, borderTop:"1px solid #e2d9c8" }}>
              <button onClick={onClose} style={{ flex:1, padding:"11px", borderRadius:10, border:"1.5px solid #e2d9c8", background:"white", color:"#6b7280", cursor:"pointer", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif" }}>Batal</button>
              <button onClick={() => {
                if (!masjid.idSimas?.trim() && changedCount > 0) {
                  if (!window.confirm("⚠️ ID SIMAS masih kosong!\n\nData akan disimpan menggunakan Nama Masjid.\n\nLanjutkan?")) return;
                }
                handleSave();
              }} disabled={loading || changedCount === 0} style={{ flex:2, padding:"11px", borderRadius:10, border:"none", background: changedCount > 0 ? "#1B4332" : "#e2d9c8", color: changedCount > 0 ? "white" : "#9ca3af", cursor: (loading || changedCount===0) ? "not-allowed" : "pointer", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif", transition:"all .2s" }}>
                {loading ? "⏳ Menyimpan..." : changedCount > 0 ? `💾 Simpan (${changedCount} perubahan)` : "Tidak ada perubahan"}
              </button>
            </div>
          </div>
        </div>

        {showFoto && (
          <FotoManagerModal
            masjid={localMasjidFoto}
            adminSession={adminSession}
            onClose={() => setShowFoto(false)}
            onFotoUpdated={(kategori, updatedUrl) => {
              const propKey = { depan:"urlFotoDepan", dalam:"urlFotoDalam", wudhu:"urlFotoWudhu", wc:"urlFotoWC", lain:"urlFotoLain", sertifWakaf:"urlFotoSertifWakaf", fotoAIW:"urlFotoAIW", sertifKiblat:"urlFotoKiblat" }[kategori];
              if (propKey) { const updated = { ...localMasjidFoto, [propKey]: updatedUrl }; setLocalMasjidFoto(updated); if (onSaved) onSaved({ [propKey]: updatedUrl }); }
            }}
          />
        )}
        </>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  v4.9: TAMBAH MASJID MODAL — form tambah data baru
    //  Semua level admin bisa akses
    // ════════════════════════════════════════════════════════════
    const DAFTAR_DESA = ["BULU","DAWUHAN","DUREN","GANDUL","KEDUNGBANTENG","KEDUNGMARON","KEDUNGREJO","KENONGOREJO","KREBET","LUWORO","MUNENG","NGALE","NGENGOR","PILANGKENCENG","PULEREJO","PURWOREJO","SUMBERGANDU","WONOAYU"];

    function TambahMasjidModal({ adminSession, onClose, onBerhasil }) {
      const [form, setForm] = useState({
        lokasiSurvey: "MASJID",
        namaMasjid:   "",
        desa:         "",
        tipologi:     "",
        afiliasi:     "",
        tahunBerdiri: "",
        alamat:       "",
        kondisiBgn:   "",
        statusTanah:  "",
      });
      const [loading, setLoading] = useState(false);
      const [result,  setResult]  = useState(null); // { ok, message }
      const [step,    setStep]    = useState(1);    // 1=form, 2=proses, 3=selesai

      const setF = (key, val) => setForm(prev => ({ ...prev, [key]: val }));

      const isValid = form.namaMasjid.trim() && form.desa && form.tipologi.trim() && form.lokasiSurvey;

      const handleSubmit = async () => {
        if (!isValid) { setResult({ ok:false, message:"Nama Masjid, Desa, Tipologi, dan Lokasi Survey wajib diisi." }); return; }
        setLoading(true); setStep(2); setResult(null);
        try {
          const payload = {
            action:       "tambahMasjid",
            token:        adminSession.token,
            namaMasjid:   form.namaMasjid.trim(),
            desa:         form.desa,
            tipologi:     form.tipologi.trim(),
            lokasiSurvey: form.lokasiSurvey,
            afiliasi:     form.afiliasi,
            tahunBerdiri: form.tahunBerdiri,
            alamat:       form.alamat.trim(),
            kondisiBgn:   form.kondisiBgn,
            statusTanah:  form.statusTanah,
          };
          const res  = await fetchWithTimeout(WEBAPP_URL, { method:"POST", headers:{"Content-Type":"text/plain"}, body:JSON.stringify(payload) });
          const json = await res.json();
          if (json.ok) {
            setStep(3);
            setResult({ ok:true, message: json.message, pdfUrl: json.pdfUrl, folderUrl: json.folderUrl });
            if (onBerhasil) onBerhasil();
          } else {
            setStep(1);
            setResult({ ok:false, message: json.error || "Gagal menyimpan data." });
          }
        } catch(e) {
          setStep(1);
          setResult({ ok:false, message:"Gagal menghubungi server: " + e.message });
        } finally {
          setLoading(false);
        }
      };

      const inp = { width:"100%", padding:"9px 12px", borderRadius:9, border:"1.5px solid #e2d9c8", fontSize:13, fontFamily:"'DM Sans',sans-serif", outline:"none", background:"white", color:"#1a1a1a", boxSizing:"border-box" };
      const lbl = { fontSize:12, color:"#6b7280", fontWeight:500, display:"block", marginBottom:4 };

      return (
        <div onClick={e => e.stopPropagation()} style={{ position:"fixed", inset:0, zIndex:2100, background:"rgba(0,0,0,.6)", backdropFilter:"blur(4px)", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"16px", overflowY:"auto" }}>
          <div style={{ width:"100%", maxWidth:560, background:"#FAFAF7", borderRadius:18, overflow:"hidden", margin:"auto", boxShadow:"0 32px 80px rgba(0,0,0,.3)", animation:"fadeIn .2s ease" }}>

            {/* Header */}
            <div style={{ background:"linear-gradient(135deg,#1B4332,#2d6a4f)", padding:"18px 22px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, color:"white" }}>➕ Tambah Data Baru</div>
                <div style={{ fontSize:11, color:"rgba(212,168,83,.85)", marginTop:2 }}>Masjid / Musholla · Kec. Pilangkenceng</div>
              </div>
              <button onClick={onClose} style={{ background:"rgba(255,255,255,.12)", border:"none", color:"white", width:32, height:32, borderRadius:"50%", cursor:"pointer", fontSize:16 }}>✕</button>
            </div>

            {/* Step 2: Processing */}
            {step === 2 && (
              <div style={{ padding:"50px 24px", textAlign:"center" }}>
                <div style={{ fontSize:52, marginBottom:16 }}>⏳</div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:700, color:"#1B4332", marginBottom:8 }}>Sedang Diproses...</div>
                <div style={{ fontSize:13, color:"#6b7280", lineHeight:1.7 }}>
                  Menyimpan data ke Sheet<br/>
                  Membuat folder Google Drive<br/>
                  Membuat file PDF profil
                </div>
                <div style={{ marginTop:20, height:4, background:"#f0ebe0", borderRadius:2, overflow:"hidden" }}>
                  <div style={{ height:"100%", background:"#1B4332", borderRadius:2, animation:"shimmer 1.5s infinite", backgroundSize:"200% 100%", backgroundImage:"linear-gradient(90deg,#1B4332 25%,#2d6a4f 50%,#1B4332 75%)" }}/>
                </div>
              </div>
            )}

            {/* Step 3: Selesai */}
            {step === 3 && result?.ok && (
              <div style={{ padding:"36px 24px", textAlign:"center" }}>
                <div style={{ fontSize:52, marginBottom:12 }}>✅</div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:700, color:"#1B4332", marginBottom:8 }}>Berhasil Ditambahkan!</div>
                <div style={{ fontSize:14, color:"#6b7280", marginBottom:20, lineHeight:1.6 }}>{result.message}</div>
                <div style={{ display:"flex", gap:10, justifyContent:"center", flexWrap:"wrap", marginBottom:24 }}>
                  {result.pdfUrl && (
                    <a href={result.pdfUrl} target="_blank" rel="noreferrer"
                      style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"9px 16px", borderRadius:10, background:"#1B4332", color:"white", textDecoration:"none", fontSize:13, fontWeight:600 }}>
                      📄 Lihat PDF
                    </a>
                  )}
                  {result.folderUrl && (
                    <a href={result.folderUrl} target="_blank" rel="noreferrer"
                      style={{ display:"inline-flex", alignItems:"center", gap:6, padding:"9px 16px", borderRadius:10, background:"#e8f5e9", color:"#1B4332", textDecoration:"none", fontSize:13, fontWeight:600 }}>
                      📁 Buka Folder Drive
                    </a>
                  )}
                </div>
                <div style={{ background:"#fffbeb", border:"1px solid #fde68a", borderRadius:10, padding:"12px 16px", fontSize:12, color:"#92400e", textAlign:"left", marginBottom:20 }}>
                  💡 <strong>Langkah selanjutnya:</strong> Buka album, cari data yang baru ditambahkan, klik <strong>✏️ Edit Data</strong> untuk melengkapi informasi lainnya (pengurus, jamaah, wakaf, foto, dll).
                </div>
                <button onClick={onClose} style={{ width:"100%", padding:"12px", borderRadius:10, border:"none", background:"#1B4332", color:"white", fontSize:14, fontWeight:600, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>
                  Tutup & Refresh Album
                </button>
              </div>
            )}

            {/* Step 1: Form */}
            {step === 1 && (
              <div style={{ padding:"20px 22px" }}>
                {/* Info */}
                <div style={{ background:"#f0f7f4", border:"1px solid #c6e6d8", borderRadius:10, padding:"10px 14px", fontSize:12, color:"#1B4332", marginBottom:18, lineHeight:1.6 }}>
                  ℹ️ Isi <strong>4 field wajib</strong> di bawah. Data detail (pengurus, jamaah, foto, dll) bisa dilengkapi setelah data tersimpan melalui fitur <strong>Edit Data</strong>.
                </div>

                {/* Lokasi Survey */}
                <div style={{ marginBottom:14 }}>
                  <label style={lbl}>Lokasi Survey <span style={{ color:"#ef4444" }}>*</span></label>
                  <div style={{ display:"flex", gap:8 }}>
                    {["MASJID","MUSHOLLA"].map(opt => (
                      <button key={opt} type="button" onClick={() => setF("lokasiSurvey", opt)}
                        style={{ flex:1, padding:"10px", borderRadius:9, border:"1.5px solid", borderColor: form.lokasiSurvey===opt ? "#1B4332" : "#e2d9c8", background: form.lokasiSurvey===opt ? "#1B4332" : "white", color: form.lokasiSurvey===opt ? "white" : "#374151", cursor:"pointer", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif", transition:"all .15s" }}>
                        {opt === "MASJID" ? "🕌 MASJID" : "🏠 MUSHOLLA"}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Nama Masjid */}
                <div style={{ marginBottom:14 }}>
                  <label style={lbl}>Nama {form.lokasiSurvey} <span style={{ color:"#ef4444" }}>*</span></label>
                  <input value={form.namaMasjid} onChange={e => setF("namaMasjid", e.target.value)}
                    placeholder={`Nama ${form.lokasiSurvey} (huruf kapital)`}
                    style={{ ...inp, borderColor: form.namaMasjid.trim() ? "#1B4332" : "#e2d9c8" }}
                  />
                </div>

                {/* Desa */}
                <div style={{ marginBottom:14 }}>
                  <label style={lbl}>Desa <span style={{ color:"#ef4444" }}>*</span></label>
                  <div style={{ position:"relative" }}>
                    <span style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", fontSize:11, pointerEvents:"none", color:"#6b7280" }}>▼</span>
                    <select value={form.desa} onChange={e => setF("desa", e.target.value)}
                      style={{ ...inp, paddingRight:28, cursor:"pointer", borderColor: form.desa ? "#1B4332" : "#e2d9c8" }}>
                      <option value="">— Pilih Desa —</option>
                      {DAFTAR_DESA.map(d => <option key={d} value={d}>{d}</option>)}
                    </select>
                  </div>
                </div>

                {/* Tipologi */}
                <div style={{ marginBottom:14 }}>
                  <label style={lbl}>Tipologi <span style={{ color:"#ef4444" }}>*</span></label>
                  <div style={{ position:"relative" }}>
                    <span style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", fontSize:11, pointerEvents:"none", color:"#6b7280" }}>▼</span>
                    <select value={form.tipologi} onChange={e => setF("tipologi", e.target.value)}
                      style={{ ...inp, paddingRight:28, cursor:"pointer", borderColor: form.tipologi ? "#1B4332" : "#e2d9c8" }}>
                      <option value="">— Pilih Tipologi —</option>
                      <option value="Jami">Jami</option>
                      <option value="Bersejarah">Bersejarah</option>
                      <option value="Agung">Agung</option>
                      <option value="Raya">Raya</option>
                      <option value="Kampung">Kampung</option>
                    </select>
                  </div>
                </div>

                {/* Divider — field opsional */}
                <div style={{ borderTop:"1px dashed #e2d9c8", margin:"18px 0 14px", display:"flex", alignItems:"center", gap:8 }}>

                      <select value={form.kondisiBgn} onChange={e => setF("kondisiBgn", e.target.value)} style={{ ...inp, paddingRight:28, cursor:"pointer" }}>

                        <option>Baik</option>
                        <option>Sedang</option>
                        <option>Rusak Ringan</option>
                        <option>Rusak Berat</option>

                    </div>

                  <div>
                    <label style={lbl}>Status Tanah</label>

                      <select value={form.statusTanah} onChange={e => setF("statusTanah", e.target.value)} style={{ ...inp, paddingRight:28, cursor:"pointer" }}>
                        <option value="">— Pilih —</option>
                        <option>Wakaf Bersertifikat</option>
                        <option>Wakaf Belum Bersertifikat</option>
                        <option>SHM</option>
                        <option>Tanah Kas Desa</option>

                {/* Peringatan field wajib */}
                {!isValid && (
                  <div style={{ background:"#fff7ed", border:"1px solid #fed7aa", borderRadius:8, padding:"8px 12px", fontSize:12, color:"#c2410c", marginBottom:12 }}>
                    ⚠️ Nama {form.lokasiSurvey}, Desa, dan Tipologi wajib diisi.
                  </div>
                )}

                {result && !result.ok && (
                  <div style={{ background:"#fee2e2", color:"#b91c1c", borderRadius:8, padding:"10px 14px", fontSize:13, marginBottom:14 }}>
                    ⚠️ {result.message}
                  </div>
                )}

                <div style={{ display:"flex", gap:10, paddingTop:8, borderTop:"1px solid #e2d9c8" }}>
                  <button onClick={onClose} style={{ flex:1, padding:"11px", borderRadius:10, border:"1.5px solid #e2d9c8", background:"white", color:"#6b7280", cursor:"pointer", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif" }}>Batal</button>
                  <button onClick={handleSubmit} disabled={!isValid || loading}
                    style={{ flex:2, padding:"11px", borderRadius:10, border:"none", background: isValid ? "#1B4332" : "#e2d9c8", color: isValid ? "white" : "#9ca3af", cursor: (!isValid||loading) ? "not-allowed" : "pointer", fontSize:13, fontWeight:600, fontFamily:"'DM Sans',sans-serif", transition:"all .2s" }}>
                    {loading ? "⏳ Menyimpan..." : "➕ Simpan & Buat Folder + PDF"}
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    function KartuMasjid({ masjid, onClick }) {
      const [hover, setHover] = useState(false);
      const isMusholla = masjid.lokasiSurvey?.toUpperCase().includes("MUSHOLLA");
      return (
        <div onClick={() => onClick(masjid)} onMouseEnter={() => setHover(true)} onMouseLeave={() => setHover(false)}
          style={{ background:"white", borderRadius:14, overflow:"hidden", cursor:"pointer", border:"1px solid #e8e0d0", boxShadow: hover ? "0 10px 32px rgba(27,67,50,.15)" : "0 2px 12px rgba(0,0,0,.06)", transform: hover ? "translateY(-4px)" : "translateY(0)", transition:"all .22s ease", fontFamily:"'DM Sans',sans-serif" }}>
          <div style={{ position:"relative", height:176, background:"#e8e0d0", overflow:"hidden" }}>
            {masjid.fotoUtama ? (
              <img src={masjid.fotoUtama} alt={masjid.namaMasjid}
                style={{ width:"100%", height:"100%", objectFit:"cover", transform: hover ? "scale(1.05)" : "scale(1)", transition:"transform .4s ease" }}
                onError={e => { e.target.style.display="none"; }}
              />
            ) : (
              <div style={{ width:"100%", height:"100%", display:"flex", alignItems:"center", justifyContent:"center", fontSize:52, opacity:.25 }}>🕌</div>
            )}
            <div style={{ position:"absolute", inset:0, background:"linear-gradient(to top,rgba(27,67,50,.5) 0%,transparent 60%)" }}/>
            <div style={{ position:"absolute", top:10, left:10, background:"rgba(27,67,50,.85)", backdropFilter:"blur(4px)", borderRadius:20, padding:"3px 10px", fontSize:10, fontWeight:700, color:"#D4A853", letterSpacing:".5px" }}>
              {isMusholla ? "MUSHOLLA" : "MASJID"}
            </div>
            <div style={{ position:"absolute", top:10, right:10 }}><KondisiBadge kondisi={masjid.kondisiBgn}/></div>
            {masjid.jumlahFoto && Number(masjid.jumlahFoto) > 0 && (
              <div style={{ position:"absolute", bottom:8, right:10, fontSize:11, color:"rgba(255,255,255,.85)", display:"flex", alignItems:"center", gap:3 }}>📷 {masjid.jumlahFoto}</div>
            )}
            {masjid.latLng && <div style={{ position:"absolute", bottom:8, left:10, fontSize:11, color:"rgba(255,255,255,.75)" }}>🗺️</div>}
          </div>
          <div style={{ padding:"12px 14px" }}>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:15, fontWeight:700, color:"#1B4332", lineHeight:1.3, marginBottom:3 }}>{masjid.namaMasjid}</div>
            <div style={{ fontSize:11, color:"#9ca3af", marginBottom:9 }}>📍 {masjid.desa} · {masjid.tahunBerdiri || "—"}</div>
            <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:10 }}>
              {masjid.afiliasi?.includes("NU") && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20, background:"#ecfdf5", color:"#047857", fontWeight:600 }}>NU</span>}
              {masjid.afiliasi?.includes("Muhammadiyah") && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20, background:"#eff6ff", color:"#1d4ed8", fontWeight:600 }}>Muhammadiyah</span>}
              {(masjid.statusTanah?.includes("Bersertifikat") || masjid.nomorSertifWakaf) && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20, background:"#f0fdf4", color:"#166534", fontWeight:600 }}>Wakaf ✓</span>}
              {masjid.statusTanah === "Tanah Kas Desa" && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20, background:"#fef9c3", color:"#a16207", fontWeight:600 }}>Kas Desa</span>}
              {masjid.tpqAnak?.toLowerCase().startsWith("ada") && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20, background:"#fdf4ff", color:"#7e22ce", fontWeight:600 }}>TPQ</span>}
              {masjid.kondisiBgn?.includes("Rusak") && <span style={{ fontSize:10, padding:"2px 7px", borderRadius:20, background:"#fff7ed", color:"#c2410c", fontWeight:600 }}>⚠️ Perlu Perhatian</span>}
            </div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", paddingTop:8, borderTop:"1px solid #f3f4f6" }}>
              <div style={{ fontSize:11, color:"#9ca3af" }}>👥 Jumat: {masjid.jamaahJumat ? "±"+masjid.jamaahJumat : "—"}</div>
              <span style={{ fontSize:11, color:"#1B4332", fontWeight:600 }}>Detail →</span>
            </div>
          </div>
        </div>
      );
    }

    const SURVEYOR_LIST = ["AHSANUL MUAHID, S.Ag","M ROZIF ABDULLOH,S.H.i","ZULAICHAH","MIFTAHUL ANWAR, A.Md","NUR ISMAWATI","SITI MUBAROKAH","FATCHUL AZIZ","MOH CLISON","M. KHOIRUL MUNTOHA AGIL, S.Ag","MUCHARROM","ZAINAL ABIDIN","SITI ZULAIKA, S.H.I"];

    function TabAlbum({ data, loading, error, onSelect }) {
      const [search,         setSearch]         = useState("");
      const [filterDesa,     setFilterDesa]     = useState("");
      const [filterKlas,     setFilterKlas]     = useState("");
      const [filterKondisi,  setFilterKondisi]  = useState("");
      const [filterSurveyor, setFilterSurveyor] = useState("");
      const [showFilter,     setShowFilter]     = useState(false);

      const desaList    = useMemo(() => [...new Set(data.map(m => m.desa).filter(Boolean))].sort(), [data]);
      const klasList    = useMemo(() => [...new Set(data.map(m => m.lokasiSurvey).filter(Boolean))].sort(), [data]);
      const kondisiList = ["Baik","Sedang","Rusak Ringan","Rusak Berat"];

      const filtered = useMemo(() => data.filter(m => {
        const q = search.toLowerCase();
        if (q && !m.namaMasjid.toLowerCase().includes(q) && !m.desa.toLowerCase().includes(q) && !m.idSimas.toLowerCase().includes(q)) return false;
        if (filterDesa     && m.desa         !== filterDesa)    return false;
        if (filterKlas     && m.lokasiSurvey !== filterKlas)    return false;
        if (filterKondisi  && m.kondisiBgn   !== filterKondisi) return false;
        if (filterSurveyor && (m.namaSurveyor||"").trim().toUpperCase() !== filterSurveyor.toUpperCase()) return false;
        return true;
      }), [data, search, filterDesa, filterKlas, filterKondisi, filterSurveyor]);

      const af = [filterDesa,filterKlas,filterKondisi,filterSurveyor].filter(Boolean).length;
      const reset = () => { setSearch(""); setFilterDesa(""); setFilterKlas(""); setFilterKondisi(""); setFilterSurveyor(""); };

      return (
        <div>
          <div style={{ display:"flex", gap:10, marginBottom:12, flexWrap:"wrap", alignItems:"center" }}>
            <div style={{ position:"relative", flex:1, minWidth:200 }}>
              <span style={{ position:"absolute", left:10, top:"50%", transform:"translateY(-50%)", fontSize:14 }}>🔍</span>
              <input value={search} onChange={e => setSearch(e.target.value)}
                placeholder="Cari nama masjid, desa, atau ID SIMAS..."
                style={{ width:"100%", padding:"8px 12px 8px 32px", borderRadius:24, border:"1px solid #e2d9c8", background:"white", fontSize:13, outline:"none", color:"#1a1a1a" }}/>
            </div>
            <button onClick={() => setShowFilter(!showFilter)} style={{ padding:"8px 14px", borderRadius:24, border:"1px solid #e2d9c8", background: af>0 ? "#1B4332" : "white", color: af>0 ? "white" : "#1B4332", cursor:"pointer", fontSize:12, fontWeight:600 }}>
              ⚙ Filter {af>0 && `(${af})`}
            </button>
          </div>
          {showFilter && (
            <div style={{ background:"white", borderRadius:12, padding:"12px 14px", marginBottom:12, border:"1px solid #e2d9c8", display:"flex", gap:10, flexWrap:"wrap", alignItems:"center" }}>
              {[
                { label:"Desa",       value:filterDesa,      set:setFilterDesa,      opts:[["","Semua Desa"],       ...desaList.map(d=>[d,d])] },
                { label:"Klasifikasi",value:filterKlas,      set:setFilterKlas,      opts:[["","Semua Klasifikasi"],...klasList.map(k=>[k,k])] },
                { label:"Kondisi",    value:filterKondisi,   set:setFilterKondisi,   opts:[["","Semua Kondisi"],    ...kondisiList.map(k=>[k,k])] },
                { label:"Surveyor",   value:filterSurveyor,  set:setFilterSurveyor,  opts:[["","Semua Surveyor"],   ...SURVEYOR_LIST.map(s=>[s,s])] },
              ].map(f => (
                <div key={f.label} style={{ position:"relative" }}>
                  <span style={{ position:"absolute", right:10, top:"50%", transform:"translateY(-50%)", fontSize:11, pointerEvents:"none", color:"#6b7280" }}>▼</span>
                  <select value={f.value} onChange={e => f.set(e.target.value)}
                    style={{ padding:"7px 28px 7px 12px", borderRadius:8, fontSize:13, border:"1px solid #e8e0d0", background:"white", color:"#374151", cursor:"pointer", outline:"none", minWidth:150 }}>
                    {f.opts.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                  </select>
                </div>
              ))}
              {af>0 && <button onClick={reset} style={{ padding:"7px 14px", borderRadius:8, border:"1px solid #fca5a5", background:"#fef2f2", color:"#dc2626", fontSize:13, cursor:"pointer", fontWeight:500 }}>✕ Reset</button>}
            </div>
          )}
          <div style={{ fontSize:12, color:"#9ca3af", marginBottom:14 }}>
            Menampilkan <strong style={{ color:"#1B4332" }}>{filtered.length}</strong> dari {data.length} data
          </div>
          {error && <div style={{ background:"#fef2f2", border:"1px solid #fca5a5", borderRadius:12, padding:"14px 18px", color:"#dc2626", fontSize:13, marginBottom:16 }}><strong>Gagal memuat:</strong> {error}</div>}
          {loading && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>
              {[1,2,3,4,5,6].map(i => (
                <div key={i} style={{ background:"white", borderRadius:14, overflow:"hidden", border:"1px solid #e8e0d0" }}>
                  <div style={{ height:176, background:"linear-gradient(90deg,#f0ebe0 25%,#e8e0d0 50%,#f0ebe0 75%)", backgroundSize:"200% 100%", animation:"shimmer 1.5s infinite" }}/>
                  <div style={{ padding:"12px 14px" }}>
                    {[80,60,90].map((w,j) => <div key={j} style={{ height:12, background:"#f0ebe0", borderRadius:6, marginBottom:8, width:w+"%" }}/>)}
                  </div>
                </div>
              ))}
            </div>
          )}
          {!loading && !error && filtered.length === 0 && (
            <div style={{ textAlign:"center", padding:"60px 20px", color:"#9ca3af" }}>
              <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
              <div style={{ fontSize:16, fontWeight:500, marginBottom:4 }}>Tidak ditemukan</div>
              <button onClick={reset} style={{ marginTop:14, padding:"8px 20px", borderRadius:8, border:"none", background:"#1B4332", color:"white", fontSize:13, cursor:"pointer" }}>Reset</button>
            </div>
          )}
          {!loading && !error && filtered.length > 0 && (
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))", gap:16 }}>
              {filtered.map(m => <KartuMasjid key={m.id} masjid={m} onClick={onSelect}/>)}
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  TAB PETA
    // ════════════════════════════════════════════════════════════
    function TabPeta({ data, onSelect }) {
      const mapRef = useRef(null), leafletRef = useRef(null), markersRef = useRef([]);
      const denganLL = useMemo(() => data.filter(m => m.latLng), [data]);
      const tanpaLL  = useMemo(() => data.filter(m => !m.latLng), [data]);
      useEffect(() => {
        if (!mapRef.current || leafletRef.current) return;
        const map = L.map(mapRef.current, { center: SHEETS_CONFIG.CENTER, zoom: 13 });
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>', maxZoom:19 }).addTo(map);
        leafletRef.current = map;
        return () => { map.remove(); leafletRef.current = null; };
      }, []);
      useEffect(() => {
        const map = leafletRef.current;
        if (!map) return;
        markersRef.current.forEach(m => m.remove()); markersRef.current = [];
        denganLL.forEach(masjid => {
          const isMusholla = masjid.lokasiSurvey?.toUpperCase().includes("MUSHOLLA");
          const k = masjid.kondisiBgn || "";
          const warna = k.includes("Rusak Berat") ? "#ef4444" : k.includes("Rusak Ringan") ? "#f97316" : k.includes("Sedang") ? "#eab308" : "#1B4332";
          const icon = L.divIcon({ html:`<div style="width:32px;height:32px;border-radius:50% 50% 50% 0;background:${warna};border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,.3);transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;"><span style="transform:rotate(45deg);font-size:13px;">${isMusholla?"🏠":"🕌"}</span></div>`, className:"", iconSize:[32,32], iconAnchor:[16,32], popupAnchor:[0,-36] });
          const fotoHtml = masjid.fotoUtama ? `<img src="${masjid.fotoUtama}" style="width:100%;height:88px;object-fit:cover;border-radius:8px;margin-bottom:8px;" onerror="this.style.display='none'"/>` : "";
          const popup = L.popup({ maxWidth:230 }).setContent(`<div style="font-family:'DM Sans',sans-serif;min-width:190px;">${fotoHtml}<div style="font-size:10px;color:#D4A853;font-weight:700;letter-spacing:.5px;margin-bottom:2px;">${isMusholla?"MUSHOLLA":"MASJID"}</div><div style="font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:#1B4332;margin-bottom:4px;">${masjid.namaMasjid}</div><div style="font-size:11px;color:#6b7280;margin-bottom:8px;">📍 ${masjid.desa}</div><div style="display:flex;justify-content:space-between;align-items:center;"><span style="font-size:11px;color:#6b7280;">Jumat: ${masjid.jamaahJumat?"±"+masjid.jamaahJumat:"—"}</span><button onclick="window.__pilih(${masjid.id})" style="font-size:11px;padding:4px 10px;background:#1B4332;color:white;border:none;border-radius:12px;cursor:pointer;font-weight:600;">Detail →</button></div></div>`);
          const marker = L.marker(masjid.latLng, { icon }).addTo(map).bindPopup(popup);
          markersRef.current.push(marker);
        });
        if (denganLL.length > 1) map.fitBounds(L.latLngBounds(denganLL.map(m => m.latLng)), { padding:[40,40] });
      }, [denganLL]);
      useEffect(() => { window.__pilih = (id) => { const m = data.find(x => x.id===id); if(m) onSelect(m); }; return () => { delete window.__pilih; }; }, [data, onSelect]);
      return (
        <div>
          <div style={{ display:"flex", gap:12, flexWrap:"wrap", marginBottom:12, background:"white", borderRadius:12, padding:"10px 14px", border:"1px solid #e2d9c8", alignItems:"center" }}>
            <span style={{ fontSize:12, color:"#6b7280", fontWeight:500 }}>Legenda:</span>
            {[["#1B4332","Baik"],["#eab308","Sedang"],["#f97316","Rusak Ringan"],["#ef4444","Rusak Berat"]].map(([c,l]) => (
              <span key={l} style={{ display:"flex", alignItems:"center", gap:5, fontSize:12 }}>
                <span style={{ width:10, height:10, borderRadius:"50%", background:c, display:"inline-block" }}/>{l}
              </span>
            ))}
            <span style={{ marginLeft:"auto", fontSize:12, color:"#9ca3af" }}>🗺️ {denganLL.length}/{data.length} ada koordinat</span>
          </div>
          <div ref={mapRef} style={{ width:"100%", height:520, borderRadius:16, overflow:"hidden", border:"1px solid #e2d9c8", boxShadow:"0 4px 20px rgba(0,0,0,.08)" }}/>
          {tanpaLL.length > 0 && (
            <div style={{ marginTop:14, background:"#fffbeb", border:"1px solid #fde68a", borderRadius:12, padding:"12px 16px" }}>
              <div style={{ fontSize:13, fontWeight:600, color:"#92400e", marginBottom:6 }}>⚠️ {tanpaLL.length} belum ada koordinat GPS:</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {tanpaLL.map(m => <button key={m.id} onClick={() => onSelect(m)} style={{ fontSize:11, padding:"3px 10px", borderRadius:20, border:"1px solid #fbbf24", background:"white", color:"#92400e", cursor:"pointer" }}>{m.namaMasjid}</button>)}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ════════════════════════════════════════════════════════════
    //  TAB STATISTIK
    // ════════════════════════════════════════════════════════════
    function StatBar({ value, max, color="#1B4332" }) {
      const pct = max > 0 ? Math.round((value/max)*100) : 0;
      return (
        <div style={{ display:"flex", alignItems:"center", gap:8 }}>
          <div style={{ flex:1, height:8, background:"#f0ebe0", borderRadius:4, overflow:"hidden" }}>
            <div style={{ width:pct+"%", height:"100%", background:color, borderRadius:4, transition:"width .6s ease" }}/>
          </div>
          <span style={{ fontSize:12, fontWeight:600, color, minWidth:24, textAlign:"right" }}>{value}</span>
        </div>
      );
    }

    function TabStatistik({ data }) {
      const totalMasjid   = data.filter(m => !m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")).length;
      const totalMusholla = data.filter(m =>  m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")).length;
      const totalJamaah   = data.reduce((s,m) => s + (parseInt(m.jamaahJumat)||0), 0);
      const bersertif     = data.filter(m => m.statusTanah?.includes("Bersertifikat") || !!m.nomorSertifWakaf).length;
      const punyaTPQ      = data.filter(m => m.tpqAnak?.toLowerCase().startsWith("ada")).length;
      const rusak         = data.filter(m => m.kondisiBgn?.includes("Rusak")).length;
      const punyaLL       = data.filter(m => m.latLng).length;
      const perDesa = useMemo(() => {
        const map = {};
        data.forEach(m => {
          if (!m.desa) return;
          if (!map[m.desa]) map[m.desa] = { desa:m.desa, total:0, masjid:0, musholla:0, jamaah:0, bersertif:0, rusak:0, tpq:0 };
          map[m.desa].total++;
          if (m.lokasiSurvey?.toUpperCase().includes("MUSHOLLA")) map[m.desa].musholla++; else map[m.desa].masjid++;
          map[m.desa].jamaah += parseInt(m.jamaahJumat)||0;

    function TabKiblat() {
      const KA_LAT=21.4225, KA_LNG=39.8263, DEF_LAT=-7.6101, DEF_LNG=111.4926;
      const [kLat,setKLat]=useState(DEF_LAT.toString()), [kLng,setKLng]=useState(DEF_LNG.toString()), [kResult,setKResult]=useState(null);
      const hitungKiblat=()=>{const lat=parseFloat(kLat),lng=parseFloat(kLng);if(isNaN(lat)||isNaN(lng))return;const dLng=(KA_LNG-lng)*Math.PI/180,latR=lat*Math.PI/180,kaLatR=KA_LAT*Math.PI/180,y=Math.sin(dLng)*Math.cos(kaLatR),x=Math.cos(latR)*Math.sin(kaLatR)-Math.sin(latR)*Math.cos(kaLatR)*Math.cos(dLng);let az=Math.atan2(y,x)*180/Math.PI;az=(az+360)%360;const arahMata=az<=22.5?"Utara":az<=67.5?"Timur Laut":az<=112.5?"Timur":az<=157.5?"Tenggara":az<=202.5?"Selatan":az<=247.5?"Barat Daya":az<=292.5?"Barat":"Barat Laut";setKResult({az:az.toFixed(2),arah:arahMata});};
      const [rTgl,setRTgl]=useState(()=>new Date().toISOString().slice(0,10)), [rLng,setRLng]=useState(DEF_LNG.toString()), [rResult,setRResult]=useState(null);
      const getDeklinasi=doy=>23.45*Math.sin((360/365*(doy-81))*Math.PI/180);
      const getEOT=doy=>{const B=(360/365*(doy-81))*Math.PI/180;return 9.87*Math.sin(2*B)-7.53*Math.cos(B)-1.5*Math.sin(B);};
      const getDOY=dateStr=>{const d=new Date(dateStr),s=new Date(d.getFullYear(),0,0);return Math.floor((d-s)/86400000);};
      const hitungRashdul=()=>{const lng=parseFloat(rLng);if(isNaN(lng)||!rTgl)return;const doy=getDOY(rTgl),dekl=getDeklinasi(doy),eot=getEOT(doy);if(Math.abs(dekl)>KA_LAT+0.5){setRResult({error:true,dekl:dekl.toFixed(2)});return;}const selisihBujur=(lng-KA_LNG)/15,totalMenit=720-eot+selisihBujur*60,jamWIB=totalMenit/60,jam=Math.floor(jamWIB),menit=Math.floor((jamWIB-jam)*60),detik=Math.round(((jamWIB-jam)*60-menit)*60),pad=n=>String(n).padStart(2,"0"),waktu=`${pad(jam)}:${pad(menit)}:${pad(detik)} WIB`,tglStr=new Date(rTgl).toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});setRResult({waktu,tglStr,dekl:dekl.toFixed(2),eot:eot.toFixed(2),error:false});};

      const CompassSVG=({az})=>{const r=az*Math.PI/180,cx=60,cy=60,R=50,nx=cx+R*Math.sin(r),ny=cy-R*Math.cos(r),tx=cx-18*Math.sin(r),ty=cy+18*Math.cos(r);return(<svg width="120" height="120" viewBox="0 0 120 120" style={{flexShrink:0}}><circle cx={cx} cy={cy} r={R} fill="rgba(255,255,255,.08)" stroke="rgba(212,168,83,.4)" strokeWidth="1"/>{["U","T","S","B"].map((d,i)=>{const a=i*Math.PI/2;return<text key={d} x={cx+44*Math.sin(a)} y={cy-44*Math.cos(a)+4} textAnchor="middle" fill="rgba(255,255,255,.6)" fontSize="9" fontFamily="DM Sans">{d}</text>;})}<line x1={cx} y1={cy} x2={nx} y2={ny} stroke="#D4A853" strokeWidth="3" strokeLinecap="round"/><line x1={cx} y1={cy} x2={tx} y2={ty} stroke="rgba(255,255,255,.3)" strokeWidth="2" strokeLinecap="round"/><circle cx={cx} cy={cy} r={5} fill="#D4A853"/></svg>);};
      const tahun=rTgl?new Date(rTgl).getFullYear():new Date().getFullYear();
